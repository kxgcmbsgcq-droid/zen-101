eerling.\n\nToen de jongeman even naar buiten stapte, dacht Kosen: \"Nu is dit mijn kans om zijn scherpe blik te ontlopen,\" en hij schreef haastig, met een geest vrij van afleiding: \"Het Eerste Beginsel.\"\n\n\"Een meesterwerk,\" oordeelde de leerling.","t":["humor","paradox"],"m":2,"ess":"Kosen schreef de karakters voor 'Het Eerste Beginsel' steeds opnieuw terwijl zijn leerling elke poging afkraakte. Pas toen de leerling even weg was, slaagde Kosen — en de leerling moest het erkennen.\n\nDe aanwezigheid van de criticus was het probleem. Niet omdat kritiek slecht is, maar omdat scheppen en oordelen niet tegelijk kunnen bestaan. Het eerste beginsel — van kalligrafie, van Zen, van alles — is: verdwijn uit je eigen weg. Zodra je stopt met proberen perfect te zijn voor een ander, verschijnt wat altijd al in je zat."},
{"n":20,"en":"A Mother's Advice","nl":"Het advies van een moeder","e":"Jiun, a Shingon master, was a well-known Sanskrit scholar of the Tokugawa era. When he was young he used to deliver lectures to his brother students.\n\nHis mother heard about this and wrote him a letter:\n\n\"Son, I do not think you became a devotee of the Buddha because you desired to turn into a walking dictionary for others. There is no end to information and commentation, glory and honor. I wish you would stop this lecture business. Shut yourself up in a little temple in a remote part of the mountain. Devote your time to meditation and in this way attain true realization.\"","d":"Jiun, een Shingon-meester, was een bekende Sanskrietgeleerde uit het Tokugawa-tijdperk. Toen hij jong was, gaf hij lezingen aan zijn medestudenten.\n\nZijn moeder hoorde hiervan en schreef hem een brief:\n\n\"Zoon, ik geloof niet dat jij een toegewijde van de Boeddha bent geworden omdat je een wandelend woordenboek voor anderen wilde worden. Informatie en commentaar, roem en eer kennen geen einde. Ik zou willen dat je met dit lezing-geven ophield. Sluit jezelf op in een klein tempeltje in een afgelegen deel van het gebergte. Wijd je tijd aan meditatie en bereik zo ware verlichting.\"","t":["wijsheid","compassie"],"m":1,"ess":"Jiun was een geleerde die lezingen gaf en bewonderd werd. Zijn moeder schreef hem één brief: stop met een wandelend woordenboek te zijn. Ga mediteren.\n\nDe moeder zag wat de zoon niet zag: kennis verzamelen is niet hetzelfde als begrijpen. Er is geen einde aan informatie, maar er is een punt waarop meer informatie je verder van de kern brengt. Soms is de wijste stem die van iemand die geen soetra heeft gelezen maar wel de valkuil ziet van wie er duizend heeft gelezen."},
{"n":21,"en":"The Sound of One Hand","nl":"Het geluid van één hand","e":"The master of Kennin temple was Mokurai, Silent Thunder. He had a little protégé named Toyo who was only twelve years old. Toyo saw the older disciples visit the master's room each morning and evening to receive instruction in sanzen or personal guidance in which they were given koans to stop mind-wandering.\n\nToyo wished to do sanzen also.\n\n\"Wait a while,\" said Mokurai. \"You are too young.\"\n\nBut the child insisted, so the teacher finally consented.\n\nIn the evening little Toyo went at the proper time to the threshold of Mokurai's sanzen room. He struck the gong to announce his presence, bowed respectfully three times outside the door, and went to sit before the master in respectful silence.\n\n\"You can hear the sound of two hands when they clap together,\" said Mokurai. \"Now show me the sound of one hand.\"\n\nToyo bowed and went to his room to consider this problem. From his window he could hear the music of the geishas. \"Ah, I have it!\" he proclaimed.\n\nThe next evening, when his teacher asked him to illustrate the sound of one hand, Toyo began to play the music of the geishas.\n\n\"No, no,\" said Mokurai. \"That will never do. That is not the sound of one hand. You've not got it at all.\"\n\nThinking that such music might interrupt, Toyo moved his abode to a quiet place. He meditated again. \"What can the sound of one hand be?\" He happened to hear some water dripping. \"I have it,\" imagined Toyo.\n\nWhen he next appeared before his teacher, Toyo imitated dripping water.\n\n\"What is that?\" asked Mokurai. \"That is the sound of dripping water, but not the sound of one hand. Try again.\"\n\nIn vain Toyo meditated to hear the sound of one hand. He heard the sighing of the wind. But the sound was rejected.\n\nHe heard the cry of an owl. This also was refused.\n\nThe sound of one hand was not the locusts.\n\nFor more than ten times Toyo visited Mokurai with different sounds. All were wrong. For almost a year he pondered what the sound of one hand might be.\n\nAt last little Toyo entered true meditation and transcended all sounds. \"I could collect no more,\" he explained later, \"so I reached the soundless sound.\"\n\nToyo had realized the sound of one hand.","d":"De meester van de Kennin-tempel was Mokurai, Stille Donder. Hij had een kleine beschermeling genaamd Toyo, die pas twaalf jaar oud was. Toyo zag hoe de oudere leerlingen elke ochtend en avond de kamer van de meester bezochten voor onderricht in sanzen — persoonlijke begeleiding waarbij hun koans werden gegeven om het dwalen van de geest te stoppen.\n\nToyo wilde ook sanzen doen.\n\n\"Wacht nog even,\" zei Mokurai. \"Je bent te jong.\"\n\nMaar het kind hield aan, zodat de leraar uiteindelijk instemde.\n\n's Avonds ging de kleine Toyo op het juiste tijdstip naar de drempel van Mokurai's sanzen-kamer. Hij sloeg de gong om zijn aanwezigheid aan te kondigen, boog drie keer eerbiedig voor de deur en ging in eerbiedig stilzwijgen voor de meester zitten.\n\n\"Je kunt het geluid van twee handen horen als ze samen klappen,\" zei Mokurai. \"Laat me nu het geluid van één hand horen.\"\n\nToyo boog en ging naar zijn kamer om dit vraagstuk te overdenken. Vanuit zijn raam kon hij de muziek van de geisha's horen. \"Ah, ik heb het!\" riep hij uit.\n\nDe volgende avond, toen zijn leraar hem vroeg het geluid van één hand te laten horen, begon Toyo de muziek van de geisha's te spelen.\n\n\"Nee, nee,\" zei Mokurai. \"Dat gaat niet. Dat is niet het geluid van één hand. Je hebt het nog helemaal niet.\"\n\nIn de veronderstelling dat zulke muziek hem zou afleiden, verplaatste Toyo zijn verblijf naar een stille plek. Hij mediteerde opnieuw. \"Wat kan het geluid van één hand zijn?\" Toevallig hoorde hij water druppelen. \"Ik heb het,\" stelde Toyo zich voor.\n\nToen hij de volgende keer voor zijn leraar verscheen, bootste Toyo druppend water na.\n\n\"Wat is dat?\" vroeg Mokurai. \"Dat is het geluid van druppend water, maar niet het geluid van één hand. Probeer het opnieuw.\"\n\nTevergeefs mediteerde Toyo om het geluid van één hand te horen. Hij hoorde het zuchten van de wind. Maar dat geluid werd verworpen.\n\nHij hoorde de kreet van een uil. Ook dat werd geweigerd.\n\nHet geluid van één hand was niet dat van de sprinkhanen.\n\nMeer dan tien keer bezocht Toyo Mokurai met verschillende geluiden. Alle waren fout. Bijna een jaar lang peinsde hij over wat het geluid van één hand kon zijn.\n\nUiteindelijk betrad de kleine Toyo ware meditatie en steeg hij uit boven alle geluiden. \"Ik kon niets meer verzamelen,\" legde hij later uit, \"en zo bereikte ik het geluidloze geluid.\"\n\nToyo had het geluid van één hand gerealiseerd.","t":["verlichting","paradox"],"m":4,"ess":"Toyo was twaalf en wilde het geluid van één hand horen. Hij probeerde alles: geisha-muziek, druppelend water, wind, een uil, krekels. Allemaal afgewezen.\n\nPas na bijna een jaar stopte hij met zoeken naar geluiden en bereikte hij het geluidloze geluid. Elk antwoord dat hij kon bedenken was per definitie fout, want het geluid van één hand is geen geluid — het is het moment waarop het zoekende verstand stilvalt. De koan is niet het raadsel. Het raadsel ben jij, en de oplossing is dat er niets op te lossen valt."},
{"n":22,"en":"My Heart Burns Like Fire","nl":"Mijn hart brandt als vuur","e":"Soyen Shaku, the first Zen teacher to come to America, said: \"My heart burns like fire but my eyes are as cold as dead ashes.\" He made the following rules which he practiced every day of his life.\n\nIn the morning before dressing, light incense and meditate.\n\nRetire at a regular hour. Partake of food at regular intervals. Eat with moderation and never to the point of satisfaction.\n\nReceive a guest with the same attitude you have when alone. When alone, maintain the same attitude you have in receiving guests.\n\nWatch what you say, and whatever you say, practice it.\n\nWhen an opportunity comes do not let it pass by, yet always think twice before acting.\n\nDo not regret the past. Look to the future.\n\nHave the fearless attitude of a hero and the loving heart of a child.\n\nUpon retiring, sleep as if you had entered your last sleep. Upon awakening, leave your bed behind you instantly as if you had cast away a pair of old shoes.","d":"Soyen Shaku, de eerste Zen-leraar die naar Amerika kwam, zei: \"Mijn hart brandt als vuur, maar mijn ogen zijn zo koud als dode as.\" Hij stelde de volgende regels op, die hij elke dag van zijn leven in praktijk bracht.\n\n's Ochtends voor het aankleden: steek wierook aan en mediteer.\n\nGa op een vast uur naar bed. Neem voedsel op vaste tijden. Eet met mate en nooit tot het punt van verzadiging.\n\nOntvang een gast met dezelfde houding die je hebt wanneer je alleen bent. Wanneer je alleen bent, behoud dezelfde houding die je hebt bij het ontvangen van gasten.\n\nLet op wat je zegt, en wat je ook zegt, breng het in praktijk.\n\nWanneer een kans zich voordoet, laat haar niet voorbijgaan, maar denk altijd twee keer na voor je handelt.\n\nBetreur het verleden niet. Kijk naar de toekomst.\n\nHeb de onverschrokken houding van een held en het liefdevolle hart van een kind.\n\nBij het naar bed gaan: slaap alsof je je laatste slaap ingaat. Bij het ontwaken: verlaat je bed ogenblikkelijk alsof je een paar oude schoenen weggooit.","t":["paradox","kracht"],"m":2,"ess":"Soyen Shaku's leefregels lezen als een handleiding voor het dagelijks leven: sta op, mediteer, eet met mate, behandel gasten als jezelf alleen, en jezelf alleen als een gast.\n\n'Mijn hart brandt als vuur maar mijn ogen zijn als dode as.' De paradox is de kern: volledige passie van binnen, volledige kalmte van buiten. Niet omdat je je vuur onderdrukt, maar omdat vuur dat gecontroleerd brandt krachtiger is dan vuur dat wild om zich heen slaat."},
{"n":23,"en":"Eshun's Departure","nl":"Eshuns vertrek","e":"When Eshun, the Zen nun, was past sixty and about to leave this world, she asked some monks to pile up wood in the yard.\n\nSeating herself firmly in the center of the funeral pyre, she had it set fire around the edges.\n\n\"O nun!\" shouted one monk, \"is it hot in there?\"\n\n\"Such a matter would concern only a stupid person like yourself,\" answered Eshun.\n\nThe flames arose, and she passed away.","d":"Toen Eshun, de Zen-non, de zestig gepasseerd was en op het punt stond deze wereld te verlaten, vroeg ze enkele monniken hout op te stapelen in de tuin.\n\nZe nam vastberaden plaats in het midden van de brandstapel en liet hem aan de randen in brand steken.\n\n\"O non!\" riep een monnik, \"is het heet daarbinnen?\"\n\n\"Zo'n kwestie zou alleen een dom persoon als jij bezighouden,\" antwoordde Eshun.\n\nDe vlammen rezen op, en zij stierf.","t":["dood","kracht"],"m":1,"ess":"Eshun zette zich neer op haar eigen brandstapel en stak het vuur aan. Toen een monnik vroeg of het heet was, antwoordde ze: 'Zoiets zou alleen een dwaas bezighouden.'\n\nHaar dood was geen daad van wanhoop maar van soevereiniteit. Ze koos het moment, de methode, en weigerde tot het laatst om het zinloze te beantwoorden. De vraag 'is het heet?' mist het punt op dezelfde manier waarop de meeste vragen over leven en dood het punt missen: ze gaan over de omstandigheden, niet over de essentie."},
{"n":24,"en":"Reciting Sutras","nl":"Soetra's reciteren","e":"A farmer requested a Tendai priest to recite sutras for his wife, who had died. After the recitation was over the farmer asked: \"Do you think my wife will gain merit from this?\"\n\n\"Not only your wife, but all sentient beings will benefit from the recitation of sutras,\" answered the priest.\n\n\"If you say all sentient beings will benefit,\" said the farmer, \"my wife may be very weak and others will take advantage of her, getting the benefit she should have. So please recite sutras just for her.\"\n\nThe priest explained that it was the desire of a Buddhist to offer blessings and wish merit for every living being.\n\n\"That is a fine teaching,\" concluded the farmer, \"but please make one exception. I have a neighbor who is rough and mean to me. Just exclude him from all those sentient beings.\"","d":"Een boer vroeg een Tendai-priester soetra's te reciteren voor zijn gestorven vrouw. Na afloop van de recitatie vroeg de boer: \"Denkt u dat mijn vrouw er verdienste door zal verwerven?\"\n\n\"Niet alleen uw vrouw, maar alle voelende wezens zullen baat hebben bij het reciteren van soetra's,\" antwoordde de priester.\n\n\"Als u zegt dat alle voelende wezens er baat bij zullen hebben,\" zei de boer, \"dan is mijn vrouw misschien erg zwak en zullen anderen haar voorbijstreven en de verdienste opstrijken die haar toekomt. Wilt u de soetra's dan alstublieft alleen voor haar reciteren?\"\n\nDe priester legde uit dat het de wens van een boeddhist is zegeningen aan te bieden en verdienste te wensen voor elk levend wezen.\n\n\"Dat is een mooie lering,\" besloot de boer, \"maar wilt u één uitzondering maken? Ik heb een buurman die ruw en gemeen tegen me is. Sluit hem gewoon uit van al die voelende wezens.\"","t":["eenvoud","humor"],"m":1,"ess":"De boer wilde dat de verdienste van de soetra-recitatie alleen naar zijn vrouw ging. De priester legde uit dat alle wezens ervan profiteren. 'Goed,' zei de boer, 'maar sluit mijn buurman uit.'\n\nDe humor verbergt een diepe waarheid: wij willen het universele persoonlijk maken. Compassie met uitzonderingen is geen compassie. De boer begreep het boeddhisme intellectueel — alle wezens — maar zijn hart maakte er meteen een boekhouding van. Zo werkt het menselijk verlangen: zelfs in vrijgevigheid zoeken we controle."},
{"n":25,"en":"Three Days More","nl":"Nog drie dagen","e":"Suiwo, the disciple of Hakuin, was a good teacher. During one summer seclusion period, a pupil came to him from a southern island of Japan.\n\nSuiwo gave him the problem: \"Hear the sound of one hand.\"\n\nThe pupil remained three years but could not pass this test. One night he came in tears to Suiwo. \"I must return south in shame and embarrassment,\" he said, \"for I cannot solve my problem.\"\n\n\"Wait one week more and meditate constantly,\" advised Suiwo. Still no enlightenment came to the pupil. \"Try for another week,\" said Suiwo. The pupil obeyed, but in vain.\n\n\"Still another week.\" Yet this was of no avail. In despair the student begged to be released, but Suiwo requested another meditation of five days. They were without result. Then he said: \"Meditate for three days longer, then if you fail to attain enlightenment, you had better kill yourself.\"\n\nOn the second day the pupil was enlightened.","d":"Suiwo, de leerling van Hakuin, was een goed leraar. Tijdens een zomerretraiteperiode kwam een leerling naar hem toe van een zuidelijk eiland van Japan.\n\nSuiwo gaf hem het vraagstuk: \"Hoor het geluid van één hand.\"\n\nDe leerling bleef drie jaar maar kon deze test niet doorstaan. Op een avond kwam hij huilend naar Suiwo. \"Ik moet beschaamd en verlegen terugkeren naar het zuiden,\" zei hij, \"want ik kan mijn vraagstuk niet oplossen.\"\n\n\"Wacht nog één week en mediteer voortdurend,\" adviseerde Suiwo. Toch kwam er geen verlichting bij de leerling. \"Probeer het nog een week,\" zei Suiwo. De leerling gehoorzaamde, maar tevergeefs.\n\n\"Nog een week.\" Maar ook dat had geen effect. Wanhopig smeekte de leerling om te worden vrijgelaten, maar Suiwo verzocht hem nog vijf dagen te mediteren. Die leverden niets op. Toen zei hij: \"Mediteer nog drie dagen langer; als je er dan niet in slaagt verlichting te bereiken, kun je maar beter jezelf doden.\"\n\nOp de tweede dag werd de leerling verlicht.","t":["verlichting","kracht"],"m":2,"ess":"De leerling worstelde drie jaar met het geluid van één hand. Suiwo gaf hem steeds kortere termijnen: een week, nog een week, vijf dagen, drie dagen — 'en als je dan niet verlicht bent, dood jezelf dan maar.'\n\nOp de tweede dag van de laatste drie brak het door. De deadline was geen wreedheid maar chirurgie: pas toen het verstand geen uitweg meer had — niet meer tijd, niet terug, geen excuus — liet het los. Verlichting komt niet door harder proberen maar door het moment waarop je niets meer te verliezen hebt."},
{"n":26,"en":"Trading Dialogue for Lodging","nl":"Debat als logeergeld","e":"Provided he makes and wins an argument about Buddhism with those who live there, any wandering monk can remain in a Zen temple. If he is defeated, he has to move on.\n\nIn a temple in the northern part of Japan two brother monks were dwelling together. The elder one was learned, but the younger one was stupid and had but one eye.\n\nA wandering monk came and asked for lodging, properly challenging them to a debate about the sublime teaching. The elder brother, tired that day from much studying, told the younger one to take his place. \"Go and request the dialogue in silence,\" he cautioned.\n\nSo the young monk and the stranger went to the shrine and sat down.\n\nShortly afterwards the traveler rose and went in to the elder brother and said: \"Your young brother is a wonderful fellow. He defeated me.\"\n\n\"Relate the dialogue to me,\" said the elder one.\n\n\"Well,\" explained the traveler, \"first I held up one finger, representing Buddha, the enlightened one. So he held up two fingers, signifying Buddha and his teaching. I held up three fingers, representing Buddha, his teaching, and his followers, living the harmonious life. Then he shook his clenched fist in my face, indicating that all three come from one realization. Thus he won and so I have no right to remain here.\" With this, the traveler left.\n\n\"Where is that fellow?\" asked the younger one, running in to his elder brother.\n\n\"I understand you won the debate.\"\n\n\"Won nothing. I'm going to beat him up.\"\n\n\"Tell me the subject of the debate,\" asked the elder one.\n\n\"Why, the minute he saw me he held up one finger, insulting me by insinuating that I have only one eye. Since he was a stranger I thought I would be polite to him, so I held up two fingers, congratulating him that he has two eyes. Then the impolite wretch held up three fingers, suggesting that between us we only have three eyes. So I got mad and started to punch him, but he ran out and that ended it!\"","d":"Op voorwaarde dat hij een debat over het boeddhisme aangaat met de bewoners en dat wint, mag elke rondtrekkende monnik in een Zen-tempel verblijven. Als hij verliest, moet hij verder trekken.\n\nIn een tempel in het noorden van Japan woonden twee broeder-monniken samen. De oudste was geleerd, maar de jongste was dom en had maar één oog.\n\nEen rondtrekkende monnik kwam om onderdak vragen en daagde hen naar behoren uit tot een debat over de verheven leer. De oudste broeder, die dag moe van veel studeren, stuurde de jongste in zijn plaats. \"Ga het gesprek in stilte voeren,\" waarschuwde hij.\n\nDe jonge monnik en de vreemdeling gingen dus naar het heiligdom en namen plaats.\n\nKort daarna stond de reiziger op, ging naar de oudste broeder en zei: \"Jouw jonge broeder is een wonderlijk iemand. Hij heeft me verslagen.\"\n\n\"Vertel me hoe het gesprek verliep,\" zei de oudste.\n\n\"Welnu,\" legde de reiziger uit, \"eerst hield ik één vinger omhoog, als teken van Boeddha, de verlichte. Hij hield toen twee vingers omhoog, als teken van Boeddha en zijn leer. Ik hield drie vingers omhoog, als teken van Boeddha, zijn leer en zijn volgelingen die in harmonie leven. Toen schudde hij zijn gebalde vuist voor mijn gezicht, ten teken dat alle drie uit één verwerkelijking voortkomen. Daarmee won hij, en dus heb ik geen recht hier te blijven.\" Hierop vertrok de reiziger.\n\n\"Waar is die kerel?\" vroeg de jongste, terwijl hij naar zijn oudste broeder rende.\n\n\"Ik begrijp dat jij het debat hebt gewonnen.\"\n\n\"Gewonnen? Niks gewonnen. Ik ga hem in elkaar slaan.\"\n\n\"Vertel me waar het debat over ging,\" vroeg de oudste.\n\n\"Nou, zodra hij me zag, hield hij één vinger omhoog — hij beledigde me door te suggereren dat ik maar één oog heb. Omdat hij een vreemdeling was, dacht ik dat ik beleefd moest zijn, dus hield ik twee vingers omhoog om hem te feliciteren dat hij twee ogen heeft. Toen hield die onbeleefde schurk drie vingers omhoog, om aan te geven dat we samen maar drie ogen hebben. Dus werd ik kwaad en begon ik hem te slaan, maar hij rende weg — en daarmee was het afgelopen!\"","t":["humor","meester"],"m":4,"ess":"Twee broers — één geleerd, één dom met één oog — moesten een debat voeren. De geleerde was moe en stuurde de domme. De reiziger verloor het 'debat' en vertrok. Maar beide kanten hadden een compleet ander gesprek gevoerd.\n\nDe reiziger zag diepe Zen-symboliek in drie opgestoken vingers. De broer met één oog dacht dat hij beledigd werd. Dezelfde gebaren, twee totaal verschillende werkelijkheden. Dit is de kern: communicatie is geen overdracht van betekenis maar een spiegel. Wat je ziet zegt meer over jou dan over wat er getoond wordt."},
{"n":27,"en":"The Voice of Happiness","nl":"De stem van geluk","e":"After Bankei had passed away, a blind man who lived near the master's temple told a friend:\n\n\"Since I am blind, I cannot watch a person's face, so I must judge his character by the sound of his voice. Ordinarily when I hear someone congratulate another upon his happiness or success, I also hear a secret tone of envy. When condolence is expressed for the misfortune of another, I hear pleasure and satisfaction, as if the one condoling was really glad there was something left to gain in his own world.\n\n\"In all my experience, however, Bankei's voice was always sincere. Whenever he expressed happiness, I heard nothing but happiness, and whenever he expressed sorrow, sorrow was all I heard.\"","d":"Nadat Bankei was heengegaan, vertelde een blinde man die vlakbij de tempel van de meester woonde aan een vriend:\n\n\"Omdat ik blind ben, kan ik iemands gezicht niet zien, en moet ik zijn karakter beoordelen op de klank van zijn stem. Gewoonlijk, als ik iemand hoor feliciteren met het geluk of succes van een ander, hoor ik ook een verborgen ondertoon van afgunst. Wanneer deelneming wordt betuigd bij het ongeluk van een ander, hoor ik genoegen en voldoening, alsof degene die troost bood eigenlijk blij was dat er in zijn eigen wereld nog iets te winnen viel.\n\n\"In al mijn ervaring echter was Bankei's stem altijd oprecht. Wanneer hij geluk uitsprak, hoorde ik niets dan geluk, en wanneer hij verdriet uitsprak, was verdriet het enige dat ik hoorde.\"","t":["eenvoud","natuur"],"m":1,"ess":"Een blinde man beoordeelde mensen op hun stem. Bij felicitaties hoorde hij altijd een ondertoon van jaloezie. Bij condoleances een zweem van tevredenheid. Maar Bankei's stem was altijd zuiver: vreugde bij vreugde, verdriet bij verdriet.\n\nDe blinde hoorde wat zienden missen: de kloof tussen wat mensen zeggen en wat ze voelen. Bankei's bijzonderheid was niet dat hij goed was, maar dat hij heel was — geen verschil tussen binnen en buiten. Dat is zeldzamer dan verlichting: een mens zonder masker."},
{"n":28,"en":"Open Your Own Treasure House","nl":"Open je eigen schatkamer","e":"Daiju visited the master Baso in China. Baso asked: \"What do you seek?\"\n\n\"Enlightenment,\" replied Daiju.\n\n\"You have your own treasure house. Why do you search outside?\" Baso asked.\n\nDaiju inquired: \"Where is my treasure house?\"\n\nBaso answered: \"What you are asking is your treasure house.\"\n\nDaiju was enlightened! Ever after he urged his friends: \"Open your own treasure house and use those treasures.\"","d":"Daiju bezocht de meester Baso in China. Baso vroeg: \"Wat zoekt u?\"\n\n\"Verlichting,\" antwoordde Daiju.\n\n\"U hebt uw eigen schatkamer. Waarom zoekt u buiten?\" vroeg Baso.\n\nDaiju vroeg: \"Waar is mijn schatkamer?\"\n\nBaso antwoordde: \"Wat u mij vraagt, dát is uw schatkamer.\"\n\nDaiju was verlicht! Van toen af drong hij bij zijn vrienden aan: \"Open je eigen schatkamer en gebruik die schatten.\"","t":["verlichting","wijsheid"],"m":1,"ess":"Daiju zocht verlichting bij meester Baso. 'Je hebt je eigen schatkamer,' zei Baso. 'Waarom zoek je buiten jezelf?'\n\nDe schat die je zoekt is het zoeken zelf — of preciezer, degene die zoekt. Elke stap naar buiten is een stap bij de bron vandaan. Dit is geen abstract filosofisch punt maar de meest praktische les die er is: alles wat je nodig hebt om te begrijpen wie je bent, heb je al. De tragedie is niet dat de schat verborgen is, maar dat je hem niet herkent omdat je te druk bent met zoeken."},
{"n":29,"en":"No Water, No Moon","nl":"Geen water, geen maan","e":"When the nun Chiyono studied Zen under Bukko of Engaku she was unable to attain the fruits of meditation for a long time.\n\nAt last one moonlit night she was carrying water in an old pail bound with bamboo. The bamboo broke and the bottom fell out of the pail, and at that moment Chiyono was set free!\n\nIn commemoration, she wrote a poem:\n\nIn this way and that I tried to save the old pail\nSince the bamboo strip was weakening and about to break\nUntil at last the bottom fell out.\nNo more water in the pail!\nNo more moon in the water!","d":"Toen de non Chiyono Zen studeerde onder Bukko van Engaku, was ze lange tijd niet in staat de vruchten van meditatie te bereiken.\n\nOp een avond bij maanlicht droeg ze water in een oude emmer omwonden met bamboe. Het bamboe brak en de bodem viel eruit — en op dat moment werd Chiyono bevrijd!\n\nTer herinnering schreef ze een gedicht:\n\nOp deze en die manier probeerde ik de oude emmer te redden\nOmdat de bamboereep verzwakte en op het punt stond te breken\nTotdat ten slotte de bodem eruit viel.\nGeen water meer in de emmer!\nGeen maan meer in het water!","t":["verlichting","natuur"],"m":1,"ess":"Chiyono studeerde jaren zonder resultaat. Op een maanverlichte nacht brak de bodem uit haar oude emmer. Het water viel weg, de weerspiegeling van de maan verdween — en in dat moment was ze vrij.\n\nHet water was haar vasthouden, de emmer haar verstand, de maan de verlichting die ze probeerde te vangen. Zolang ze het water vasthield, zag ze alleen een reflectie. Toen alles wegviel — geen water, geen maan — bleef alleen de echte maan over. Soms moet alles breken voordat je ziet wat er altijd al was."},
{"n":30,"en":"Calling Card","nl":"Visitekaartje","e":"Keichu, the great Zen teacher of the Meiji era, was the head of Tofuku, a cathedral in Kyoto. One day the governor of Kyoto called upon him for the first time.\n\nHis attendant presented the card of the governor, which read: Kitagaki, Governor of Kyoto.\n\n\"I have no business with such a fellow,\" said Keichu to his attendant. \"Tell him to get out of here.\"\n\nThe attendant carried the card back with apologies. \"That was my error,\" said the governor, and with a pencil he scratched out the words Governor of Kyoto. \"Ask your teacher again.\"\n\n\"Oh, is that Kitagaki?\" exclaimed the teacher when he saw the card. \"I want to see that fellow.\"","d":"Keichu, de grote Zen-leraar van het Meiji-tijdperk, was het hoofd van Tofuku, een kathedraal in Kyoto. Op een dag bracht de gouverneur van Kyoto hem voor het eerst een bezoek.\n\nZijn bediende bood het kaartje van de gouverneur aan, waarop stond: Kitagaki, Gouverneur van Kyoto.\n\n\"Ik heb niets te maken met zo iemand,\" zei Keichu tegen zijn bediende. \"Zeg hem dat hij hier weg moet.\"\n\nDe bediende bracht het kaartje terug met zijn verontschuldigingen. \"Dat was mijn vergissing,\" zei de gouverneur, en met een potlood streepte hij de woorden Gouverneur van Kyoto door. \"Vraag uw leraar nogmaals.\"\n\n\"O, is dat Kitagaki?\" riep de leraar uit toen hij het kaartje zag. \"Die wil ik graag zien.\"","t":["humor","ego"],"m":1,"ess":"Keichu weigerde de gouverneur te ontvangen toen hij zijn visitekaartje zag: 'Kitagaki, Gouverneur van Kyoto.' Pas toen Kitagaki zijn titel doorstreepte, was hij welkom.\n\nJe titel is niet wie je bent — het is je kostuum. Keichu wilde de mens ontmoeten, niet de functie. In Zen tel je voor wat je bent als je alles aflegt. De gouverneur die zijn titel doorstreepte begreep iets dat de meeste machthebbers nooit leren: je rang is je zwaarste last, niet je grootste bezit."},
{"n":31,"en":"Everything Is Best","nl":"Alles is het beste","e":"When Banzan was walking through a market he overheard a conversation between a butcher and his customer.\n\n\"Give me the best piece of meat you have,\" said the customer.\n\n\"Everything in my shop is the best,\" replied the butcher. \"You cannot find here any piece of meat that is not the best.\"\n\nAt these words Banzan became enlightened.","d":"Toen Banzan door een markt liep, hoorde hij een gesprek tussen een slager en zijn klant.\n\n\"Geef me het beste stuk vlees dat u hebt,\" zei de klant.\n\n\"Alles in mijn winkel is het beste,\" antwoordde de slager. \"U kunt hier geen enkel stuk vlees vinden dat niet het beste is.\"\n\nBij deze woorden werd Banzan verlicht.","t":["wijsheid","eenvoud"],"m":1,"ess":"Een klant vroeg om het beste stuk vlees. De slager antwoordde: 'Alles in mijn winkel is het beste.' Banzan werd verlicht.\n\nEr is geen hiërarchie in de werkelijkheid. Elk moment, elk ding, elk wezen is al het beste dat het kan zijn — niet in vergelijking met iets anders, maar op zichzelf. De slager sprak geen filosofie maar een feit: als je stopt met rangschikken, verdwijnt het tekort. Het probleem is nooit het vlees. Het probleem is de vraag."},
{"n":32,"en":"Inch Time Foot Gem","nl":"Een duim tijd, een voet edelsteen","e":"A lord asked Takuan, a Zen Teacher, to suggest how he might pass the time. He felt his days very long attending his office and sitting stiffly to receive the homage of others.\n\nTakuan wrote eight Chinese characters and gave them to the man:\n\nNot twice this day\nInch time foot gem.\nThis day will not come again.\nEach minute is worth a priceless gem.","d":"Een heer vroeg Takuan, een Zen-leraar, te suggereren hoe hij de tijd kon doorbrengen. Hij vond zijn dagen erg lang, aanwezig op zijn kantoor en stijf zittend om de hulde van anderen in ontvangst te nemen.\n\nTakuan schreef acht Chinese karakters en gaf ze aan de man:\n\nNiet tweemaal deze dag\nEen duim tijd — een voet edelsteen.\nDeze dag keert niet terug.\nElke minuut is een onschatbaar juweel waard.","t":["wijsheid","dood"],"m":1,"ess":"Takuan schreef acht karakters voor een verveelde heer: 'Deze dag komt niet terug. Elke minuut is een onbetaalbaar juweel.'\n\nDe heer voelde zijn dagen als eindeloos — niet uit overvloed maar uit leegte. Verveling is geen tekort aan activiteit maar aan aanwezigheid. Wie elke minuut als een juweel behandelt, verveelt zich nooit — niet omdat het leven spannender wordt, maar omdat je eindelijk ziet wat er altijd al was."},
{"n":33,"en":"Mokusen's Hand","nl":"De hand van Mokusen","e":"Mokusen Hiki was living in a temple in the province of Tamba. One of his adherents complained of the stinginess of his wife.\n\nMokusen visited the adherent's wife and showed her his clenched fist before her face.\n\n\"What do you mean by that?\" asked the surprised woman.\n\n\"Suppose my fist were always like that. What would you call it?\" he asked.\n\n\"Deformed,\" replied the woman.\n\nThen he opened his hand flat in her face and asked: \"Suppose it were always like that. What then?\"\n\n\"Another kind of deformity,\" said the wife.\n\n\"If you understand that much,\" finished Mokusen, \"you are a good wife.\" Then he left.\n\nAfter his visit, this wife helped her husband to distribute as well as to save.","d":"Mokusen Hiki woonde in een tempel in de provincie Tamba. Een van zijn volgelingen klaagde over de gierigheid van zijn vrouw.\n\nMokusen bezocht de vrouw van de volgeling en hield zijn gebalde vuist voor haar gezicht.\n\n\"Wat bedoelt u daarmee?\" vroeg de verraste vrouw.\n\n\"Stel dat mijn vuist altijd zo was. Hoe zou u dat noemen?\" vroeg hij.\n\n\"Misvormd,\" antwoordde de vrouw.\n\nToen opende hij zijn hand plat voor haar gezicht en vroeg: \"Stel dat hij altijd zo was. Wat dan?\"\n\n\"Een andere soort misvorming,\" zei de vrouw.\n\n\"Als u dat begrijpt,\" besloot Mokusen, \"bent u een goede vrouw.\" Daarna vertrok hij.\n\nNa zijn bezoek hielp deze vrouw haar man zowel uit te delen als te sparen.","t":["meester","wijsheid"],"m":1,"ess":"Mokusen toonde de vrekkige vrouw een gebalde vuist: altijd dicht is misvormd. Toen een open hand: altijd open is ook misvormd. Ze begreep het.\n\nHet gaat niet om gierigheid versus vrijgevigheid, maar om starheid. Wie alleen vasthoudt is verkrampt. Wie alleen weggeeft is leeg. De wijsheid zit in de beweging tussen open en dicht — weten wanneer je vasthouden moet en wanneer loslaten. Een hand die beide kan is een gezonde hand."},
{"n":34,"en":"A Smile in His Lifetime","nl":"Een glimlach in zijn leven","e":"Mokugen was never known to smile until his last day on earth. When his time came to pass away he said to his faithful ones: \"You have studied under me for more than ten years. Show me your real interpretation of Zen. Whoever expresses this most clearly shall be my successor and receive my robe and bowl.\"\n\nEveryone watched Mokugen's severe face, but no one answered.\n\nEncho, a disciple who had been with his teacher for a long time, moved near the bedside. He pushed forward the medicine cup a few inches. That was his answer to the command.\n\nThe teacher's face became even more severe. \"Is that all you understand?\" he asked.\n\nEncho reached out and moved the cup back again.\n\nA beautiful smile broke over the features of Mokugen. \"You rascal,\" he told Encho. \"You worked with me ten years and have not yet seen my whole body. Take the robe and bowl. They belong to you.\"","d":"Mokugen had nog nooit geglimlacht tot zijn laatste dag op aarde. Toen zijn tijd om heen te gaan was aangebroken, zei hij tegen zijn trouwe leerlingen: \"U heeft meer dan tien jaar onder mij gestudeerd. Toon mij uw werkelijke interpretatie van Zen. Wie dit het duidelijkst uitdrukt, zal mijn opvolger zijn en mijn gewaad en kom ontvangen.\"\n\nIedereen keek naar Mokuguns ernstige gezicht, maar niemand antwoordde.\n\nEncho, een leerling die zijn leraar al lange tijd vergezelde, bewoog zich naar het bed. Hij schoof de medicijnkom een paar centimeter naar voren. Dat was zijn antwoord op het bevel.\n\nHet gezicht van de leraar werd nog ernstiger. \"Is dat alles wat u begrijpt?\" vroeg hij.\n\nEncho stak zijn hand uit en schoof de kom terug.\n\nEen mooie glimlach brak door over de trekken van Mokugen. \"Rakker,\" zei hij tegen Encho. \"U heeft tien jaar met mij gewerkt en heeft mijn hele lichaam nog niet gezien. Neem het gewaad en de kom. Ze zijn van u.\"","t":["kracht","meester"],"m":2,"ess":"Mokugen glimlachte nooit in zijn hele leven — tot zijn laatste moment. Encho schoof de medicijnkom een paar centimeter naar voren. Mokugen fronste. Encho schoof hem terug. Mokugen glimlachte.\n\nHet antwoord op 'toon me je begrip van Zen' was geen woord maar een gebaar, en het was niet het naar voren schuiven maar het terugzetten. Alles precies laten zoals het is — dat is het. Encho bewees dat hij niets hoefde toe te voegen of te veranderen. De glimlach van Mokugen was herkenning: eindelijk iemand die het begrijpt door niets te doen."},
{"n":35,"en":"Every-Minute Zen","nl":"Zen elke minuut","e":"Zen students are with their masters at least ten years before they presume to teach others. Nan-in was visited by Tenno, who, having passed his apprenticeship, had become a teacher. The day happened to be rainy, so Tenno wore wooden clogs and carried an umbrella. After greeting him Nan-in remarked: \"I suppose you left your wooden clogs in the vestibule. I want to know if your umbrella is on the right or left side of the clogs.\"\n\nTenno, confused, had no instant answer. He realized that he was unable to carry his Zen every minute. He became Nan-in's pupil, and he studied six more years to accomplish his every-minute Zen.","d":"Zen-leerlingen zijn minstens tien jaar bij hun meesters voordat ze zich aanmatigen anderen te onderwijzen. Nan-in ontving een bezoek van Tenno, die, na zijn leertijd te hebben doorlopen, leraar was geworden. Het was die dag toevallig regenachtig, dus droeg Tenno houten klompen en had een paraplu bij zich. Na hem te hebben begroet merkte Nan-in op: \"Ik neem aan dat u uw houten klompen in de vestibule hebt gelaten. Ik wil weten of uw paraplu rechts of links van de klompen staat.\"\n\nTenno, in verwarring gebracht, had geen direct antwoord. Hij besefte dat hij zijn Zen niet elke minuut kon vasthouden. Hij werd Nan-ins leerling, en studeerde nog zes jaar om zijn Zen-van-elke-minuut te bereiken.","t":["eenvoud","paradox"],"m":1,"ess":"Nan-in vroeg Tenno of zijn paraplu links of rechts van zijn klompen stond. Tenno wist het niet. Hij studeerde nog zes jaar.\n\nZen elke minuut betekent niet mediteren elke minuut, maar aanwezig zijn elke minuut — ook bij waar je je paraplu neerzet. De meeste mensen leven in hun hoofd terwijl hun lichaam op automatische piloot staat. Tenno was een erkend leraar, maar hij was niet wakker genoeg om zijn eigen paraplu te kennen. Verlichting die stopt bij de tempeldeur is geen verlichting."},
{"n":36,"en":"Flower Shower","nl":"Bloemenregen","e":"Subhuti was Buddha's disciple. He was able to understand the potency of emptiness, the viewpoint that nothing exists except in its relationship of subjectivity and objectivity.\n\nOne day Subhuti, in a mood of sublime emptiness, was sitting under a tree. Flowers began to fall about him.\n\n\"We are praising you for your discourse on emptiness,\" the gods whispered to him.\n\n\"But I have not spoken of emptiness,\" said Subhuti.\n\n\"You have not spoken of emptiness, we have not heard emptiness,\" responded the gods. \"This is the true emptiness.\" And blossoms showered upon Subhuti as rain.","d":"Subhuti was een leerling van de Boeddha. Hij was in staat de kracht van de leegte te begrijpen — het inzicht dat niets bestaat behalve in zijn verhouding van subject en object.\n\nOp een dag zat Subhuti, in een stemming van verheven leegte, onder een boom. Bloemen begonnen om hem heen te vallen.\n\n\"Wij prijzen u om uw vertoog over de leegte,\" fluisterden de goden hem toe.\n\n\"Maar ik heb niet over de leegte gesproken,\" zei Subhuti.\n\n\"U hebt niet over de leegte gesproken, wij hebben de leegte niet gehoord,\" antwoordden de goden. \"Dit is de ware leegte.\" En bloesems regende neer op Subhuti als regen.","t":["verlichting","paradox"],"m":1,"ess":"Subhuti zat onder een boom in volmaakte leegte. Bloemen vielen uit de hemel. De goden prezen zijn lezing over leegte. 'Maar ik heb niet over leegte gesproken,' zei Subhuti. 'Je hebt niet gesproken, wij hebben niet gehoord — dát is ware leegte.'\n\nDe diepste waarheid kan niet uitgesproken worden. Zodra je 'leegte' zegt, is het geen leegte meer maar een concept. Subhuti onderwees juist door niets te onderwijzen. De bloemenregen was geen beloning maar erkenning: de stilte was de leer."},
{"n":37,"en":"Publishing the Sutras","nl":"De soetra's uitgeven","e":"Tetsugen, a devotee of Zen in Japan, decided to publish the sutras, which at that time were available only in Chinese. The books were to be printed with wood blocks in an edition of seven thousand copies, a tremendous undertaking.\n\nTetsugen began by traveling and collecting donations for this purpose. A few sympathizers would give him a hundred pieces of gold, but most of the time he received only small coins. He thanked each donor with equal gratitude. After ten years Tetsugen had enough money to begin his task.\n\nIt happened that at that time the Uji River overflowed. Famine followed. Tetsugen took the funds he had collected for the books and spent them to save others from starvation. Then he began again his work of collecting.\n\nSeveral years afterwards an epidemic spread over the country. Tetsugen again gave away what he had collected, to help his people.\n\nFor a third time he started his work, and after twenty years his wish was fulfilled. The printing blocks which produced the first edition of sutras can be seen today in the Obaku monastery in Kyoto.\n\nThe Japanese tell their children that Tetsugen made three sets of sutras, and that the first two invisible sets surpass even the last.","d":"Tetsugen, een Zen-volgeling in Japan, besloot de soetra's te publiceren, die in die tijd alleen in het Chinees beschikbaar waren. De boeken zouden met houtblokken worden gedrukt in een oplage van zevenduizend exemplaren — een geweldige onderneming.\n\nTetsugen begon met reizen en giften inzamelen voor dit doel. Af en toe gaf iemand hem honderd goudstukken, maar meestal ontving hij alleen kleine munten. Elke gever bedankte hij met gelijke dankbaarheid. Na tien jaar had Tetsugen genoeg geld om zijn taak te beginnen.\n\nHet gebeurde dat de rivier de Uji op dat moment overstroomde. Hongersnood volgde. Tetsugen nam de middelen die hij voor de boeken had bijeengebracht en besteedde ze om anderen van de hongerdood te redden. Daarna begon hij opnieuw met inzamelen.\n\nEnkele jaren later verspreidde een epidemie zich over het land. Tetsugen gaf opnieuw weg wat hij had ingezameld, om zijn mensen te helpen.\n\nVoor de derde keer begon hij zijn werk, en na twintig jaar werd zijn wens vervuld. De drukblokken waarmee de eerste editie van de soetra's werd gedrukt zijn vandaag de dag te zien in het Obaku-klooster in Kyoto.\n\nDe Japanners vertellen hun kinderen dat Tetsugen drie sets soetra's heeft gemaakt, en dat de eerste twee onzichtbare sets zelfs de laatste overtreffen.","t":["compassie","wijsheid"],"m":2,"ess":"Tetsugen verzamelde twintig jaar geld om soetra's te drukken. Twee keer gaf hij alles weg — eerst bij een overstroming, dan bij een epidemie. De derde keer lukte het.\n\nDe Japanners vertellen hun kinderen dat Tetsugen drie sets soetra's maakte, en dat de eerste twee onzichtbare sets de gedrukte overtreffen. De ware leer staat niet op papier. Tetsugen's twee 'mislukkingen' waren zijn grootste publicaties — niet in inkt maar in daad. Compassie is de soetra die geen drukpers nodig heeft."},
{"n":38,"en":"Gisho's Work","nl":"Het werk van Gisho","e":"Gisho was ordained as a nun when she was just ten years old. She received training just as the little boys did. When she reached the age of sixteen she traveled from one Zen master to another, studying with them all.\n\nShe remained three years with Unzan, six years with Gukei, but was unable to obtain a clear vision. At last she went to the master Inzan.\n\nInzan showed her no distinction at all on account of her sex. He scolded her like a thunderstorm. He cuffed her to awaken her inner nature.\n\nGisho remained with Inzan thirteen years, and then she found that which she was seeking!\n\nIn her honor, Inzan wrote a poem:\n\nThis nun studied thirteen years under my guidance.\nIn the evening she considered the deepest koans,\nIn the morning she was wrapped in other koans.\nThe Chinese nun Tetsuma surpassed all before her,\nAnd since Mujaku none has been so genuine as this Gisho!\nYet there are many more gates for her to pass through.\nShe should receive still more blows from my iron fist.","d":"Gisho werd tot non gewijd toen ze net tien jaar oud was. Ze ontving dezelfde training als de kleine jongens. Toen ze de leeftijd van zestien bereikte, reisde ze van de ene Zen-meester naar de andere en studeerde bij hen allen.\n\nZe bleef drie jaar bij Unzan, zes jaar bij Gukei, maar was niet in staat een heldere visie te verkrijgen. Ten slotte ging ze naar de meester Inzan.\n\nInzan maakte vanwege haar geslacht geen enkel onderscheid. Hij berispte haar als een onweersbui. Hij sloeg haar om haar innerlijke natuur te wekken.\n\nGisho bleef dertien jaar bij Inzan, en toen vond ze datgene wat ze zocht!\n\nTer ere van haar schreef Inzan een gedicht:\n\nDeze non studeerde dertien jaar onder mijn begeleiding.\n's Avonds overwoog ze de diepste koans,\n's Ochtends was ze gewikkeld in andere koans.\nDe Chinese non Tetsuma overtrof allen vóór haar,\nEn sinds Mujaku is niemand zo oprecht geweest als deze Gisho!\nToch zijn er nog vele poorten die ze door moet.\nZe zou nog meer slagen van mijn ijzeren vuist moeten ontvangen.","t":["kracht","meester"],"m":2,"ess":"Gisho studeerde dertien jaar bij Inzan. Hij behandelde haar niet anders dan de mannelijke studenten — schreeuwde tegen haar, sloeg haar. En juist daardoor vond ze wat ze zocht.\n\nInzans weigering om onderscheid te maken op basis van geslacht was geen wreedheid maar respect. Wie iemand spaart omdat ze een vrouw is, ontzegt haar de volledige training. Gisho had al bij twee andere meesters gestudeerd zonder resultaat. Het was de hamer, niet de zachte hand, die haar doorbraak bracht."},
{"n":39,"en":"Sleeping in the Daytime","nl":"Overdag slapen","e":"The master Soyen Shaku passed from this world when he was sixty-one years of age. Fulfilling his life's work, he left a great teaching, far richer than that of most Zen masters. His pupils used to sleep in the daytime during midsummer, and while he overlooked this he himself never wasted a minute.\n\nWhen he was but twelve years old he was already studying Tendai philosophical speculation. One summer day the air had been so sultry that little Soyen stretched his legs and went to sleep while his teacher was away.\n\nThree hours passed when, suddenly waking, he heard his master enter, but it was too late. There he lay, sprawled across the doorway.\n\n\"I beg your pardon, I beg your pardon,\" his teacher whispered, stepping carefully over Soyen's body as if it were that of some distinguished guest. After this, Soyen never slept again in the afternoon.","d":"De meester Soyen Shaku verliet deze wereld op eenenzestigjarige leeftijd. Door zijn levenswerk te voltooien liet hij een grote lering na, veel rijker dan die van de meeste Zen-meesters. Zijn leerlingen sliepen overdag gewoonlijk tijdens het hoogzomer, en hoewel hij dit door de vingers zag, verspilde hij zelf nooit een minuut.\n\nToen hij slechts twaalf jaar oud was, bestudeerde hij al de Tendai-filosofische speculatie. Op een zomerdag was de lucht zo benauwd geweest dat de kleine Soyen zijn benen strekte en in slaap viel terwijl zijn leraar weg was.\n\nEr gingen drie uur voorbij, toen hij plotseling wakker schrok en zijn meester hoorde binnenkomen — maar het was te laat. Daar lag hij, uitgestrekt dwars over de drempel.\n\n\"Neemt u mij niet kwalijk, neemt u mij niet kwalijk,\" fluisterde zijn leraar, terwijl hij zorgvuldig over Soyens lichaam stapte alsof het dat van een vooraanstaande gast was. Hierna sliep Soyen nooit meer in de namiddag.","t":["humor","eenvoud"],"m":2,"ess":"De jonge Soyen viel in slaap toen zijn meester weg was. Bij terugkomst stapte de meester zorgvuldig over hem heen, fluisterend 'neem me niet kwalijk,' alsof Soyen een eregast was. Soyen sliep nooit meer overdag.\n\nGeen berisping, geen straf — alleen respect. De meester behandelde de slapende leerling met meer waardigheid dan hij verdiende, en juist dat was de les. Schaamte die van binnenuit komt is krachtiger dan elke straf van buitenaf. Soms is de zachtste reactie de strengste leraar."},
{"n":40,"en":"In Dreamland","nl":"In dromenland","e":"\"Our schoolmaster used to take a nap every afternoon,\" related a disciple of Soyen Shaku. \"We children asked him why he did it and he told us: 'I go to dreamland to meet the old sages just as Confucius did.' When Confucius slept, he would dream of ancient sages and later tell his followers about them.\n\n\"It was extremely hot one day so some of us took a nap. Our schoolmaster scolded us. 'We went to dreamland to meet the ancient sages the same as Confucius did,' we explained. 'What was the message from those sages?' our schoolmaster demanded. One of us replied: 'We went to dreamland and met the sages and asked them if our schoolmaster came there every afternoon, but they said they had never seen any such fellow.'\"","d":"\"Onze schoolmeester deed elke middag een dutje,\" vertelde een leerling van Soyen Shaku. \"Wij kinderen vroegen hem waarom hij dat deed, en hij zei ons: 'Ik ga naar dromenland om de oude wijzen te ontmoeten, net zoals Confucius deed.' Wanneer Confucius sliep, droomde hij van oude wijzen en vertelde zijn volgelingen later over hen.\n\n\"Op een dag was het buitengewoon heet, dus deden sommigen van ons een dutje. Onze schoolmeester berispte ons. 'Wij gingen naar dromenland om de oude wijzen te ontmoeten, net zoals Confucius deed,' legden we uit. 'Wat was de boodschap van die wijzen?' eiste onze schoolmeester. Een van ons antwoordde: 'Wij gingen naar dromenland en ontmoetten de wijzen en vroegen hen of onze schoolmeester daar elke middag kwam, maar zij zeiden dat ze zo iemand nooit hadden gezien.'\"","t":["humor","paradox"],"m":1,"ess":"De schoolmeester beweerde dat hij in dromenland de oude wijzen bezocht, net als Confucius. Toen de kinderen hetzelfde probeerden en de wijzen 'vroegen' of de schoolmeester ooit langskwam, zeiden die: 'Nooit gezien.'\n\nKinderen doorzien pretentie instinctief. De schoolmeester gebruikte Confucius als excuus voor zijn dutje en de kinderen hielden hem dezelfde spiegel voor. Humor is in Zen geen bijzaak maar een zwaard: het snijdt door opgeblazenheid heen sneller dan welk argument ook."},
{"n":41,"en":"Joshu's Zen","nl":"Joshu's Zen","e":"Joshu began the study of Zen when he was sixty years old and continued until he was eighty, when he realized Zen.\n\nHe taught from the age of eighty until he was one hundred and twenty.\n\nA student once asked him: \"If I haven't anything in my mind, what shall I do?\"\n\nJoshu replied: \"Throw it out.\"\n\n\"But if I haven't anything, how can I throw it out?\" continued the questioner.\n\n\"Well,\" said Joshu, \"then carry it out.\"","d":"Joshu begon de studie van Zen toen hij zestig jaar oud was en ging door tot hij tachtig was, toen hij Zen verwerkelijkte.\n\nHij gaf les vanaf zijn tachtigste tot hij honderdtwintig was.\n\nEen student vroeg hem ooit: \"Als ik niets in mijn geest heb, wat moet ik dan doen?\"\n\nJoshu antwoordde: \"Gooi het weg.\"\n\n\"Maar als ik niets heb, hoe kan ik het dan weggooien?\" vervolgde de vraagsteller.\n\n\"Wel,\" zei Joshu, \"draag het dan naar buiten.\"","t":["eenvoud","wijsheid"],"m":1,"ess":"Joshu begon pas op zijn zestigste met Zen, bereikte verlichting op zijn tachtigste, en onderwees tot zijn honderdtwintigste. Een leerling zei: 'Ik heb niets in mijn geest.' Joshu: 'Gooi het weg.' 'Maar ik heb niets!' 'Draag het dan naar buiten.'\n\nZelfs 'niets hebben' is iets — het is een concept dat je vasthoudt. De leerling was gehecht aan zijn leegte, trots op zijn niets. Joshu liet hem zien dat ook leegte een last wordt als je het draagt. De ultieme vrijheid is niet 'niets hebben' maar zelfs dat niets niet vasthouden."},
{"n":42,"en":"The Dead Man's Answer","nl":"Het antwoord van de dode man","e":"When Mamiya, who later became a well-known preacher, went to a teacher for personal guidance, he was asked to explain the sound of one hand.\n\nMamiya concentrated upon what the sound of one hand might be. \"You are not working hard enough,\" his teacher told him. \"You are too attached to food, wealth, things, and that sound. It would be better if you died. That would solve the problem.\"\n\nThe next time Mamiya appeared before his teacher he was again asked what he had to show regarding the sound of one hand. Mamiya at once fell over as if he were dead.\n\n\"You are dead all right,\" observed the teacher, \"But how about that sound?\"\n\n\"I haven't solved that yet,\" replied Mamiya, looking up.\n\n\"Dead men do not speak,\" said the teacher. \"Get out!\"","d":"Toen Mamiya, die later een bekende prediker werd, naar een leraar ging voor persoonlijke begeleiding, werd hem gevraagd het geluid van één hand te verklaren.\n\nMamiya concentreerde zich op wat het geluid van één hand zou kunnen zijn. \"Je werkt niet hard genoeg,\" zei zijn leraar. \"Je bent te gehecht aan voedsel, rijkdom, dingen, en dat geluid. Het zou beter zijn als je stierf. Dat zou het probleem oplossen.\"\n\nDe volgende keer dat Mamiya voor zijn leraar verscheen, werd hem opnieuw gevraagd wat hij te tonen had betreffende het geluid van één hand. Mamiya viel onmiddellijk neer alsof hij dood was.\n\n\"Je bent dood genoeg,\" merkte de leraar op, \"maar hoe zit het met dat geluid?\"\n\n\"Dat heb ik nog niet opgelost,\" antwoordde Mamiya, omhoogkijkend.\n\n\"Dode mannen spreken niet,\" zei de leraar. \"Eruit!\"","t":["paradox","humor"],"m":1,"ess":"Mamiya deed alsof hij dood was om de koan op te lossen. 'Je bent goed dood,' zei zijn meester, 'maar hoe zit het met het geluid van één hand?' 'Dat heb ik nog niet opgelost,' antwoordde Mamiya. 'Dode mensen praten niet. Eruit!'\n\nJe kunt verlichting niet faken. Mamiya probeerde een shortcut — als ik doe alsof ik mijn ego heb losgelaten, telt dat toch? Maar de meester doorzag het meteen. Het antwoord op een koan is geen truc maar een transformatie. Wie nog kan antwoorden vanuit zijn oude zelf, is niet veranderd."},
{"n":43,"en":"Zen in a Beggar's Life","nl":"Zen in het leven van een bedelaar","e":"Tosui was a well-known Zen teacher of his time. He had lived in several temples and taught in various provinces.\n\nThe last temple he visited accumulated so many adherents that Tosui told them he was going to quit the lecture business entirely. He advised them to disperse and to go wherever they desired. After that no one could find any trace of him.\n\nThree years later one of his disciples discovered him living with some beggars under a bridge in Kyoto. He at once implored Tosui to teach him.\n\n\"If you can do as I do for even a couple of days, I might,\" Tosui replied.\n\nSo the former disciple dressed as a beggar and spent a day with Tosui. The following day one of the beggars died. Tosui and his pupil carried the body off at midnight and buried it on a mountainside. After that they returned to their shelter under the bridge.\n\nTosui slept soundly the remainder of the night, but the disciple could not sleep. When morning came Tosui said: \"We do not have to beg food today. Our dead friend has left some over there.\" But the disciple was unable to eat a single bite of it.\n\n\"I have said you could not do as I,\" concluded Tosui. \"Get out of here and do not bother me again.\"","d":"Tosui was een bekende Zen-leraar van zijn tijd. Hij had in verscheidene tempels gewoond en in diverse provincies les gegeven.\n\nDe laatste tempel die hij bezocht trok zoveel aanhangers aan dat Tosui hun zei dat hij volledig zou stoppen met het lezing-geven. Hij adviseerde hen uiteen te gaan en te gaan waar ze maar wilden. Daarna kon niemand enig spoor van hem vinden.\n\nDrie jaar later ontdekte een van zijn leerlingen hem levend bij een aantal bedelaars onder een brug in Kyoto. Hij smeekte Tosui onmiddellijk hem les te geven.\n\n\"Als jij een paar dagen kunt doen wat ik doe, misschien wel,\" antwoordde Tosui.\n\nDus kleedde de voormalige leerling zich als bedelaar en bracht een dag door met Tosui. De volgende dag stierf een van de bedelaars. Tosui en zijn leerling droegen het lichaam om middernacht weg en begroeven het op een berghelling. Daarna keerden ze terug naar hun onderkomen onder de brug.\n\nTosui sliep de rest van de nacht vast, maar de leerling kon niet slapen. Toen de ochtend aanbrak zei Tosui: \"We hoeven vandaag niet om eten te bedelen. Onze dode vriend heeft wat achtergelaten, daar.\" Maar de leerling was niet in staat er ook maar één hap van te eten.\n\n\"Ik heb gezegd dat jij niet kon doen wat ik doe,\" besloot Tosui. \"Ga hier weg en val me niet meer lastig.\"","t":["eenvoud","compassie"],"m":2,"ess":"Tosui verliet zijn tempel, zijn studenten, zijn status, en ging onder een brug leven met bedelaars. Toen een oud-leerling hem vond en smeekte om les, zei Tosui: 'Leef twee dagen zoals ik.' De leerling kon niet eens het eten van een dode bedelaar aanraken.\n\nDe kloof tussen begrijpen en leven is de enige kloof die telt. De leerling begreep Zen intellectueel maar zijn lichaam weigerde. Tosui onderwees niet door woorden maar door de onmogelijke vraag: kun je alles loslaten, ook je walging, ook je comfort, ook je idee van wie je bent?"},
{"n":44,"en":"The Thief Who Became a Disciple","nl":"De dief die leerling werd","e":"One evening as Shichiri Kojun was reciting sutras a thief with a sharp sword entered, demanding either his money or his life.\n\nShichiri told him: \"Do not disturb me. You can find the money in that drawer.\" Then he resumed his recitation.\n\nA little while afterwards he stopped and called: \"Don't take it all. I need some to pay taxes with tomorrow.\"\n\nThe intruder gathered up most of the money and started to leave. \"Thank a person when you receive a gift,\" Shichiri added. The man thanked him and made off.\n\nA few days afterwards the fellow was caught and confessed, among others, the offense against Shichiri. When Shichiri was called as a witness he said: \"This man is no thief, at least as far as I am concerned. I gave him the money and he thanked me for it.\"\n\nAfter he had finished his prison term, the man went to Shichiri and became his disciple.","d":"Op een avond, terwijl Shichiri Kojun soetra's reciteerde, betrad een dief met een scherp zwaard de kamer en eiste zijn geld of zijn leven.\n\nShichiri zei hem: \"Stoor me niet. U kunt het geld in die la vinden.\" Daarna hervatte hij zijn recitatie.\n\nEven later stopte hij en riep: \"Neem niet alles. Ik heb morgen wat nodig om belasting mee te betalen.\"\n\nDe indringer raapte het grootste deel van het geld bijeen en wilde vertrekken. \"Bedank een persoon als u een geschenk ontvangt,\" voegde Shichiri eraan toe. De man bedankte hem en maakte zich uit de voeten.\n\nEnkele dagen later werd de man gevangen en bekende, onder andere, de overtreding jegens Shichiri. Toen Shichiri als getuige werd opgeroepen, zei hij: \"Deze man is geen dief, althans voor zover het mij betreft. Ik heb hem het geld gegeven en hij heeft mij ervoor bedankt.\"\n\nNadat hij zijn gevangenisstraf had uitgezeten, ging de man naar Shichiri en werd zijn leerling.","t":["compassie","meester"],"m":2,"ess":"Een dief brak in bij Shichiri die soetra's zat te reciteren. 'Het geld ligt in die la. Neem niet alles, ik moet morgen belasting betalen.' De dief bedankte hem en vertrok. Later werd hij Shichiri's leerling.\n\nShichiri behandelde de dief niet als dief maar als gast. Geen angst, geen oordeel, geen onderbreking van zijn praktijk. Die houding — volledige kalmte in het aangezicht van gevaar — was een krachtiger les dan duizend soetra's. De dief stal geld maar ontving iets dat niet te stelen is: een voorbeeld van hoe een mens kan zijn."},
{"n":45,"en":"Right and Wrong","nl":"Goed en kwaad","e":"When Bankei held his seclusion-weeks of meditation, pupils from many parts of Japan came to attend. During one of these gatherings a pupil was caught stealing. The matter was reported to Bankei with the request that the culprit be expelled. Bankei ignored the case.\n\nLater the pupil was caught in a similar act, and again Bankei disregarded the matter. This angered the other pupils, who drew up a petition asking for the dismissal of the thief, stating that otherwise they would leave in a body.\n\nWhen Bankei had read the petition he called everyone before him. \"You are wise brothers,\" he told them. \"You know what is right and what is not right. You may go somewhere else to study if you wish, but this poor brother does not even know right from wrong. Who will teach him if I do not? I am going to keep him here even if all the rest of you leave.\"\n\nA torrent of tears cleansed the face of the brother who had stolen. All desire to steal had vanished.","d":"Wanneer Bankei zijn weken van meditatie en afzondering hield, kwamen leerlingen uit alle delen van Japan om erbij te zijn. Tijdens een van deze bijeenkomsten werd een leerling betrapt op stelen. De zaak werd aan Bankei gemeld met het verzoek de schuldige te verwijderen. Bankei negeerde de zaak.\n\nLater werd de leerling op een soortgelijke daad betrapt, en opnieuw sloeg Bankei er geen acht op. Dit maakte de andere leerlingen woedend; zij stelden een petitie op waarin zij om de wegzending van de dief vroegen, en verklaarden dat zij anders gezamenlijk zouden vertrekken.\n\nNadat Bankei de petitie had gelezen, riep hij iedereen voor zich. \"U bent wijze broeders,\" zei hij tegen hen. \"U weet wat goed is en wat niet goed is. U mag ergens anders gaan studeren als u wilt, maar deze arme broeder weet niet eens het verschil tussen goed en kwaad. Wie zal hem onderwijzen als ik het niet doe? Ik ga hem hier houden, ook als al de rest van u vertrekt.\"\n\nEen stroom van tranen spoelde het gezicht van de broeder die had gestolen schoon. Alle verlangen om te stelen was verdwenen.","t":["wijsheid","meester"],"m":2,"ess":"Een leerling stal herhaaldelijk. Andere studenten eisten zijn uitzetting. Bankei weigerde: 'Jullie weten het verschil tussen goed en kwaad. Hij niet. Wie leert het hem als ik het niet doe?'\n\nBankei koos het moeilijkste: niet de groep tevreden stellen maar de persoon helpen die het het meest nodig had. De tranen van de dief waren geen berouw uit schaamte maar uit herkenning — eindelijk iemand die hem niet opgaf. Ware compassie is niet populair. Het kiest de moeilijkste persoon, niet de makkelijkste oplossing."},
{"n":46,"en":"How Grass and Trees Become Enlightened","nl":"Hoe gras en bomen verlicht worden","e":"During the Kamakura period, Shinkan studied Tendai six years and Zen seven years; then he went to China and contemplated Zen for thirteen years more.\n\nWhen he returned to Japan many desired to interview him and asked obscure questions. But when Shinkan received visitors, which was infrequently, he seldom answered their questions.\n\nOne day a fifty-year-old student of enlightenment said to Shinkan: \"I have studied the Tendai school of thought since I was a little boy, but one thing in it I cannot understand. Tendai claims that even the grass and trees will become enlightened. To me this seems very strange.\"\n\n\"Of what use is it to discuss how grass and trees become enlightened?\" asked Shinkan. \"The question is how you yourself can become so. Did you ever consider that?\"\n\n\"I never thought of it in that way,\" marveled the old man.\n\n\"Then go home and think it over,\" finished Shinkan.","d":"Tijdens de Kamakura-periode studeerde Shinkan zes jaar Tendai en zeven jaar Zen; daarna reisde hij naar China en bespiegelde hij nog dertien jaar over Zen.\n\nToen hij terugkeerde naar Japan wilden velen hem spreken en stelden hem duistere vragen. Maar wanneer Shinkan bezoekers ontving, hetgeen zelden gebeurde, beantwoordde hij hun vragen nauwelijks.\n\nOp een dag zei een vijftigjarige student van verlichting tegen Shinkan: \"Ik heb de Tendai-denkschool bestudeerd sinds ik een kleine jongen was, maar één ding erin begrijp ik niet. Tendai beweert dat zelfs het gras en de bomen verlicht zullen worden. Dit lijkt mij zeer vreemd.\"\n\n\"Wat heeft het voor nut om te bespreken hoe gras en bomen verlicht worden?\" vroeg Shinkan. \"De vraag is hoe u zelf verlicht kunt worden. Heeft u daar ooit over nagedacht?\"\n\n\"Zo heb ik er nooit over gedacht,\" verwonderde de oude man zich.\n\n\"Ga dan naar huis en denk erover na,\" besloot Shinkan.","t":["natuur","verlichting"],"m":2,"ess":"Een man van vijftig vroeg hoe gras en bomen verlicht worden. Shinkan antwoordde: 'Wat heb je eraan om te discussiëren over hoe gras verlicht wordt? De vraag is hoe jíj verlicht wordt.'\n\nWe gebruiken filosofische vragen als schuilplaats. Zolang je debatteert over of gras een Boeddha-natuur heeft, hoef je niet naar je eigen natuur te kijken. De man had een heel leven gestudeerd maar de belangrijkste vraag nooit gesteld: niet wat is verlichting, maar wat houdt mij tegen?"},
{"n":47,"en":"The Stingy Artist","nl":"De vrekkige kunstenaar","e":"Gessen was an artist monk. Before he would start a drawing or painting he always insisted upon being paid in advance, and his fees were high. He was known as the \"Stingy Artist.\"\n\nA geisha once gave him a commission for a painting. \"How much can you pay?\" inquired Gessen.\n\n\"Whatever you charge,\" replied the girl, \"but I want you to do the work in front of me.\"\n\nSo on a certain day Gessen was called by the geisha. She was holding a feast for her patron. Gessen with fine brushwork did the painting. When it was completed he asked the highest sum of his time.\n\nHe received his pay. Then the geisha turned to her patron, saying: \"All this artist wants is money. His paintings are fine but his mind is dirty; money has caused it to become muddy. Drawn by such a filthy mind, his work is not fit to exhibit. It is just about good enough for one of my petticoats.\"\n\nRemoving her skirt, she asked Gessen to do another picture on the back of her petticoat.\n\n\"How much will you pay?\" asked Gessen.\n\n\"Oh, any amount,\" answered the girl.\n\nGessen named a fancy price, painted the picture in the manner requested, and went away.\n\nIt was learned later that Gessen had these reasons for desiring money:\n\nA ravaging famine often visited his province. The rich would not help the poor, so Gessen had a secret warehouse, unknown to anyone, which he kept filled with grain, prepared for these emergencies.\n\nFrom his village to the National Shrine the road was in very poor condition and many travelers suffered while traversing it. He desired to build a better road.\n\nHis teacher had passed away without realizing his wish to build a temple, and Gessen wished to complete this temple for him.\n\nAfter Gessen had accomplished his three wishes he threw away his brushes and artist's materials and, retiring to the mountains, never painted again.","d":"Gessen was een kunstenaar-monnik. Voordat hij aan een tekening of schilderij zou beginnen, stond hij er altijd op vooruit betaald te worden, en zijn tarieven waren hoog. Hij stond bekend als de \"Vrekkige Kunstenaar.\"\n\nEen geisha gaf hem ooit een opdracht voor een schilderij. \"Hoeveel kunt u betalen?\" vroeg Gessen.\n\n\"Wat u ook vraagt,\" antwoordde het meisje, \"maar ik wil dat u het werk voor mijn ogen doet.\"\n\nZo werd Gessen op een zekere dag door de geisha ontboden. Zij gaf een feestmaal voor haar patroon. Gessen vervaardigde het schilderij met fijn penseelwerk. Toen het voltooid was, vroeg hij de hoogste som van zijn tijd.\n\nHij ontving zijn betaling. Toen wendde de geisha zich tot haar patroon en zei: \"Het enige wat deze kunstenaar wil is geld. Zijn schilderijen zijn fraai, maar zijn geest is vuil; geld heeft hem modderig gemaakt. Geschilderd door zo'n vuile geest is zijn werk niet geschikt om tentoon te stellen. Het is net goed genoeg voor een van mijn onderjurken.\"\n\nHaar rok uittrekkend, vroeg zij Gessen een ander schilderij te maken op de achterkant van haar onderjurk.\n\n\"Hoeveel betaalt u?\" vroeg Gessen.\n\n\"O, een willekeurig bedrag,\" antwoordde het meisje.\n\nGessen noemde een forse prijs, schilderde het schilderij op de gevraagde wijze, en vertrok.\n\nLater werd bekend dat Gessen deze redenen had om geld te verlangen:\n\nEen verwoestende hongersnood bezocht zijn provincie regelmatig. De rijken wilden de armen niet helpen, zodat Gessen een geheime opslagplaats had, onbekend bij iedereen, die hij gevuld hield met graan, klaar voor noodgevallen.\n\nVan zijn dorp naar het Nationale Heiligdom was de weg in zeer slechte staat en veel reizigers leden eronder deze te begaan. Hij wilde een betere weg aanleggen.\n\nZijn leraar was gestorven zonder zijn wens een tempel te bouwen te hebben verwezenlijkt, en Gessen wilde deze tempel voor hem voltooien.\n\nNadat Gessen zijn drie wensen had vervuld, gooide hij zijn penselen en schildersmaterialen weg en, zich terugtrekkend in de bergen, schilderde hij nooit meer.","t":["kunst","gehechtheid"],"m":3,"ess":"Gessen vroeg altijd om betaling vooraf en eiste de hoogste prijzen. Men noemde hem de vrekkige kunstenaar. Maar in het geheim vulde hij een pakhuis met graan voor hongersnoden, bouwde een weg, en voltooide de tempel van zijn overleden leraar.\n\nToen zijn drie wensen vervuld waren, gooide hij zijn penselen weg en verdween in de bergen. Gessens 'gierigheid' was het tegenovergestelde: hij offerde zijn reputatie op voor het welzijn van anderen. Wie je bent is niet wat mensen over je zeggen — het is wat je doet als niemand kijkt."},
{"n":48,"en":"Accurate Proportion","nl":"Juiste verhoudingen","e":"Sen no Rikyu, a tea-master, wished to hang a flower basket on a column. He asked a carpenter to help him, directing the man to place it a little higher or lower, to the right or left, until he had found exactly the right spot. \"That's the place,\" said Sen no Rikyu finally.\n\nThe carpenter, to test the master, marked the spot and then pretended he had forgotten. \"Was this the place? Was this the place, perhaps?\" the carpenter kept asking, pointing to various places on the column.\n\nBut so accurate was the tea-master's sense of proportion that it was not until the carpenter reached the identical spot again that its location was approved.","d":"Sen no Rikyu, een theeceremoniemeester, wilde een bloemenmand aan een zuil ophangen. Hij vroeg een timmerman hem te helpen, en gaf de man aanwijzingen hem een beetje hoger of lager te plaatsen, meer naar rechts of naar links, tot hij precies de juiste plek had gevonden. \"Dat is de plek,\" zei Sen no Rikyu ten slotte.\n\nDe timmerman, om de meester op de proef te stellen, markeerde de plek en deed vervolgens alsof hij hem was vergeten. \"Was dit de plek? Was dit misschien de plek?\" bleef de timmerman vragen, terwijl hij naar verschillende plekken op de zuil wees.\n\nMaar zo nauwkeurig was het gevoel voor verhoudingen van de theeceremoniemeester, dat het niet eerder dan toen de timmerman opnieuw op precies dezelfde plek uitkwam, de locatie werd goedgekeurd.","t":["kunst","meester"],"m":1,"ess":"Sen no Rikyu liet een timmerman een bloemenmandje ophangen en corrigeerde millimeter voor millimeter tot het perfect was. De timmerman testte hem door te doen alsof hij de plek vergeten was — maar Rikyu accepteerde alleen de exacte plek.\n\nDit gaat niet over perfectiemanie maar over aanwezigheid. Rikyu's oog was zo getraind dat de juiste plek niet een mening was maar een feit. Die precisie komt niet van denken maar van jaren oefening tot het lichaam het weet. Meesterschap is wanneer het juiste antwoord geen keuze meer is maar een herkenning."},
{"n":49,"en":"Black-Nosed Buddha","nl":"De Boeddha met de zwarte neus","e":"A nun who was searching for enlightenment made a statue of Buddha and covered it with gold leaf. Wherever she went she carried this golden Buddha with her.\n\nYears passed and, still carrying her Buddha, the nun came to live in a small temple in a country where there were many Buddhas, each one with its own particular shrine.\n\nThe nun wished to burn incense before her golden Buddha. Not liking the idea of the perfume straying to the others, she devised a funnel through which the smoke would ascend only to her statue. This blackened the nose of the golden Buddha, making it especially ugly.","d":"Een non die op zoek was naar verlichting maakte een Boeddhabeeld en bekleedde het met goudblad. Overal waar zij ging droeg zij deze gouden Boeddha bij zich.\n\nDe jaren gingen voorbij en, nog steeds haar Boeddha met zich meedragend, vestigde de non zich in een kleine tempel in een land waar vele Boeddha's waren, elk met zijn eigen bijzonder heiligdom.\n\nDe non wilde wierook branden voor haar gouden Boeddha. Niet houdend van het idee dat het reukwerk naar de andere Boeddha's zou dwalen, bedacht zij een trechter waardoor de rook uitsluitend naar haar beeld zou opstijgen. Dit maakte de neus van de gouden Boeddha zwart, waardoor hij bijzonder lelijk werd.","t":["kunst","ego"],"m":1,"ess":"Een non bedekte haar Boeddhabeeld met goud en maakte een trechter zodat haar wierook alleen naar háár Boeddha ging. De trechter maakte de neus zwart.\n\nWie het heilige probeert te bezitten, maakt het lelijk. De non wilde verlichting alleen voor zichzelf — mijn Boeddha, mijn wierook, mijn verdienste. Maar het goddelijke laat zich niet privatiseren. De zwarte neus is wat er gebeurt als je het universele persoonlijk probeert te maken: je krijgt precies het tegenovergestelde van wat je zocht."},
{"n":50,"en":"Ryonen's Clear Realization","nl":"Ryonens heldere verwezenlijking","e":"The Buddhist nun known as Ryonen was born in 1797. She was a granddaughter of the famous Japanese warrior Shingen. Her poetical genius and alluring beauty were such that at seventeen she was serving the empress as one of the ladies of the court. Even at such a youthful age fame awaited her.\n\nThe beloved empress died suddenly and Ryonen's hopeful dreams vanished. She became acutely aware of the impermanency of life in this world. It was then that she desired to study Zen.\n\nHer relatives disagreed, however, and practically forced her into marriage. With a promise that she might become a nun after she had borne three children, Ryonen assented. Before she was twenty-five she had accomplished this condition. Then her husband and relatives could no longer dissuade her from her desire. She shaved her head, took the name of Ryonen, which means to realize clearly, and started on her pilgrimage.\n\nShe came to the city of Edo and asked Tetsugyu to accept her as a disciple. At one glance the master rejected her because she was too beautiful.\n\nRyonen then went to another master, Hakuo. Hakuo refused her for the same reason, saying that her beauty would only make trouble.\n\nRyonen obtained a hot iron and placed it against her face. In a few moments her beauty had vanished forever.\n\nHakuo then accepted her as a disciple.\n\nCommemorating this occasion, Ryonen wrote a poem on the back of a little mirror:\n\nIn the service of my Empress I burned incense to perfume my exquisite clothes,\nNow as a homeless mendicant I burn my face to enter a Zen temple.\n\nWhen Ryonen was about to pass from this world, she wrote another poem:\n\nSixty-six times have these eyes beheld the changing scene of autumn.\nI have said enough about moonlight,\nAsk no more.\nOnly listen to the voice of pines and cedars when no wind stirs.","d":"De boeddhistische non bekend als Ryonen werd geboren in 1797. Zij was een kleindochter van de beroemde Japanse krijger Shingen. Haar dichterlijk genie en betoverende schoonheid waren zodanig dat zij op haar zeventiende de keizerin diende als een van de hofdames. Zelfs op zo'n jeugdige leeftijd wachtte haar roem.\n\nDe geliefde keizerin stierf plotseling en Ryonens hoopvolle dromen vervlogen. Zij werd zich scherp bewust van de vergankelijkheid van het leven in deze wereld. Het was toen dat zij Zen wilde studeren.\n\nHaar familieleden waren het er echter niet mee eens en dwongen haar praktisch tot een huwelijk. Met de belofte dat zij non mocht worden nadat zij drie kinderen had gebaard, stemde Ryonen toe. Voor zij vijfentwintig was had zij aan deze voorwaarde voldaan. Toen konden haar man en familieleden haar niet langer van haar verlangen afbrengen. Zij schoor haar hoofd, nam de naam Ryonen — wat \"helder verwezenlijken\" betekent — en begon aan haar pelgrimstocht.\n\nZij kwam naar de stad Edo en vroeg Tetsugyu haar als leerling aan te nemen. Op één blik verwierp de meester haar omdat zij te mooi was.\n\nRyonen ging toen naar een andere meester, Hakuo. Hakuo weigerde haar om dezelfde reden, zeggend dat haar schoonheid slechts problemen zou veroorzaken.\n\nRyonen verkreeg een heet ijzer en plaatste het tegen haar gezicht. In een paar ogenblikken was haar schoonheid voor altijd verdwenen.\n\nHakuo aanvaardde haar toen als leerling.\n\nTer herdenking van deze gelegenheid schreef Ryonen een gedicht op de achterkant van een kleine spiegel:\n\nIn dienst van mijn Keizerin brandde ik wierook om mijn voortreffelijke kleren te parfumeren,\nNu als dakloze bedelaar verbrand ik mijn gezicht om een Zen-tempel binnen te gaan.\n\nToen Ryonen op het punt stond deze wereld te verlaten, schreef zij nog een gedicht:\n\nZesenzestig maal hebben deze ogen het wisselende tafereel van de herfst aanschouwd.\nIk heb genoeg gezegd over maanlicht,\nVraag niet meer.\nLuister slechts naar de stem van dennen en ceders wanneer er geen wind waait.","t":["verlichting","kracht"],"m":3,"ess":"Ryonen werd twee keer afgewezen als leerling — ze was te mooi. Ze brandde haar gezicht met een heet ijzer en werd eindelijk geaccepteerd.\n\nHaar daad was geen zelfhaat maar het ultieme loslaten. De meesters zagen haar schoonheid als obstakel, niet voor haar maar voor hen en de andere studenten. Ryonen begreep dat en elimineerde het probleem radicaal. Haar gedicht vertelt het hele verhaal: eerst verbrandde ze wierook om haar kleren te parfumeren voor de keizerin, nu haar gezicht om een tempel binnen te komen. Van ijdelheid naar vrijheid in één handeling."},
{"n":51,"en":"Sour Miso","nl":"Zure miso","e":"The cook monk Dairyo, at Bankei's monastery, decided that he would take good care of his old teacher's health and give him only fresh miso, a paste of soy beans mixed with wheat and yeast that often ferments. Bankei, noticing that he was being served better miso than his pupils, asked: \"Who is the cook today?\"\n\nDairyo was sent before him. Bankei learned that according to his age and position he should eat only fresh miso. So he said to the cook: \"Then you think I shouldn't eat at all.\" With this he entered his room and locked the door.\n\nDairyo, sitting outside the door, asked his teacher's pardon. Bankei would not answer. For seven days Dairyo sat outside and Bankei within.\n\nFinally in desperation an adherent called loudly to Bankei: \"You may be all right, old teacher, but this young disciple here has to eat. He cannot go without food forever!\"\n\nAt that Bankei opened the door. He was smiling. He told Dairyo: \"I insist on eating the same food as the least of my followers. When you become the teacher I do not want you to forget this.\"","d":"De kookmonnik Dairyo, in Bankei's klooster, besloot goed te zorgen voor de gezondheid van zijn oude leraar en hem alleen verse miso te geven — een pasta van sojabonen gemengd met tarwe en gist die vaak fermenteert. Bankei, die merkte dat hij betere miso geserveerd kreeg dan zijn leerlingen, vroeg: \"Wie kookt er vandaag?\"\n\nDairyo werd voor hem gebracht. Bankei vernam dat hij gezien zijn leeftijd en positie alleen verse miso zou moeten eten. Dus zei hij tegen de kok: \"Dan denk je dus dat ik helemaal niet zou moeten eten.\" Hierop ging hij zijn kamer in en sloot de deur op slot.\n\nDairyo, buiten de deur zittend, smeekte zijn leraar om vergiffenis. Bankei gaf geen antwoord. Zeven dagen lang zat Dairyo buiten en Bankei binnen.\n\nTen slotte riep een aanhanger in wanhoop luid naar Bankei: \"Met u gaat het misschien goed, oude leraar, maar deze jonge leerling hier moet e
