const K=[
{n:1,en:"Joshu's Dog",nl:"Joshu's Hond",e:"A monk asked Joshu, \"Has a dog the Buddha Nature?\"\nJoshu answered, \"Mu.\"\n\nMumon's Comment:\nTo realize Zen one has to pass through the barrier of the patriarchs. Enlightenment always comes after the road of thinking is blocked. If you do not pass through the barrier of the patriarchs or if your thinking road is not blocked, whatever you think, whatever you do, is like a tangling ghost. You may ask, \"What is a barrier of a patriarch?\" This one word, Mu, is it.\n\nMumon's Verse:\nThe dog, the Buddha Nature,\nThe pronouncement, perfect and final.\nBefore you say it has or has not,\nYou are a dead man on the spot.",d:"Een monnik vroeg Joshu: \"Heeft een hond de Boeddha-natuur?\"\nJoshu antwoordde: \"Mu.\"\n\nMumons commentaar:\nOm Zen te realiseren moet je door de barrière van de patriarchen. Verlichting komt altijd nadat de weg van het denken geblokkeerd is. Als je niet door de barrière gaat, of als je denkweg niet geblokkeerd is, is alles wat je denkt en doet als een ronddwalende geest. Je vraagt: \"Wat is de barrière van een patriarch?\" Dit ene woord, Mu, dat is het.\n\nMumons vers:\nDe hond, de Boeddha-natuur,\nDe uitspraak, volmaakt en definitief.\nVoordat je zegt dat het is of niet is,\nBen je ter plekke een dood mens.",t:["paradox","verlichting"],m:2},
{n:2,en:"Hyakujo's Fox",nl:"Hyakujo's Vos",e:"When Hyakujo delivered a certain series of sermons, an old man attended them, unseen by the monks. At the end of each talk, when the monks left, so did he. But one day he remained after they had gone, and Hyakujo asked him, \"Who are you?\"\n\nThe old man replied, \"I am not a human being, but I was a human in the days of Kashyapa Buddha. I was a Zen master then. One day a student asked me whether an enlightened man is subject to the law of causation. I answered that he is not. For this answer I became a fox for five hundred rebirths. Now I ask you: Is an enlightened man subject to the law of causation?\"\n\nHyakujo said, \"He does not ignore causation.\"\n\nAt these words the old man was enlightened.\n\nMumon's Verse:\nNot falling, not ignoring:\nTwo faces of one die.\nNot ignoring, not falling:\nA thousand errors, a million mistakes.",d:"Wanneer Hyakujo een reeks preken gaf, woonde een oude man deze bij, onzichtbaar voor de monniken. Na elke preek vertrok hij met hen. Maar op een dag bleef hij, en Hyakujo vroeg: \"Wie bent u?\"\n\nDe oude man antwoordde: \"Ik ben geen mens, maar was het wel in de tijd van Kashyapa Boeddha. Ik was toen een zen-meester. Een student vroeg mij of een verlichte onderworpen is aan de wet van oorzaak en gevolg. Ik antwoordde van niet. Door dit antwoord werd ik vijfhonderd levens lang een vos. Nu vraag ik u: Is een verlichte onderworpen aan de wet van oorzaak en gevolg?\"\n\nHyakujo zei: \"Hij negeert oorzaak en gevolg niet.\"\n\nBij deze woorden werd de oude man verlicht.\n\nMumons vers:\nNiet vallen, niet negeren:\nTwee zijden van één dobbelsteen.\nNiet negeren, niet vallen:\nDuizend fouten, een miljoen vergissingen.",t:["wijsheid","paradox"],m:3},
{n:3,en:"Gutei's Finger",nl:"Gutei's Vinger",e:"Gutei raised his finger whenever he was asked a question about Zen. A boy attendant began to imitate him in this way. When anyone asked the boy what his master had preached about, the boy would raise his finger.\n\nGutei heard about the boy's mischief. He seized him and cut off his finger. The boy cried and ran away. Gutei called and stopped him. When the boy turned his head to Gutei, Gutei raised up his own finger. In that instant the boy was enlightened.\n\nMumon's Comment:\nGutei's Zen is not about the finger. If you understand this, Tenryu, Gutei, the boy, and you yourself are all run through with one skewer.\n\nMumon's Verse:\nGutei cheapens the teaching of Tenryu,\nEmancipating the boy with a blade.\nCompared to the Chinese goddess who raised her hand\nTo split the mountain, this is nothing.",d:"Gutei stak zijn vinger op wanneer hem iets over Zen werd gevraagd. Een jongensknecht begon hem na te doen. Als iemand de jongen vroeg wat zijn meester predikte, stak de jongen zijn vinger op.\n\nGutei hoorde van het gedrag van de jongen. Hij greep hem en sneed zijn vinger af. De jongen huilde en rende weg. Gutei riep hem terug. Toen de jongen zich omdraaide, stak Gutei zijn eigen vinger op. Op dat moment werd de jongen verlicht.\n\nMumons commentaar:\nGutei's Zen gaat niet over de vinger. Als je dit begrijpt, zijn Tenryu, Gutei, de jongen en jijzelf allemaal aan één spies geregen.\n\nMumons vers:\nGutei maakt de leer van Tenryu goedkoop,\nBevrijdt de jongen met een lemmet.\nVergeleken met de Chinese godin die haar hand ophief\nOm de berg te splijten, is dit niets.",t:["meester","kracht"],m:2},
{n:4,en:"A Beardless Foreigner",nl:"Een Buitenlander Zonder Baard",e:"Wakuan complained when he saw a picture of bearded Bodhidharma: \"Why hasn't that fellow a beard?\"\n\nMumon's Comment:\nIf you want to study Zen, you must study it with your heart. When you attain realization, it must be true realization. When you yourself become Bodhidharma, then you may see him. But if you say you can see him in one glance, you have seen only one side.\n\nMumon's Verse:\nBefore a fool,\nDo not expound your dream.\nWhy has Bodhidharma no beard?\nWhat an absurd question!",d:"Wakuan klaagde toen hij een afbeelding zag van de bebaarde Bodhidharma: \"Waarom heeft die kerel geen baard?\"\n\nMumons commentaar:\nAls je Zen wilt bestuderen, moet je het met je hart bestuderen. Wanneer je realisatie bereikt, moet het ware realisatie zijn. Wanneer je zelf Bodhidharma wordt, dan mag je hem zien. Maar als je zegt dat je hem in één oogopslag kunt zien, heb je slechts één zijde gezien.\n\nMumons vers:\nVoor een dwaas,\nVertel niet je droom.\nWaarom heeft Bodhidharma geen baard?\nWat een absurde vraag!",t:["paradox","humor"],m:1},
{n:5,en:"Kyogen Mounts the Tree",nl:"Kyogen Klimt in de Boom",e:"Kyogen said: \"Zen is like a man hanging in a tree by his teeth over a precipice. His hands grasp no branch, his feet rest on no limb, and under the tree another person asks him, 'Why did Bodhidharma come to China from India?'\n\nIf the man in the tree does not answer, he fails; and if he does answer, he falls and loses his life. Now what shall he do?\"\n\nMumon's Verse:\nKyogen is truly an outrageous fool,\nSpreading poison freely.\nHe stops up the monks' mouths,\nLetting devil's eyes sprout from their dead bodies.",d:"Kyogen zei: \"Zen is als een man die aan zijn tanden in een boom hangt boven een afgrond. Zijn handen grijpen geen tak, zijn voeten rusten op geen richel, en onder de boom vraagt iemand hem: 'Waarom kwam Bodhidharma van India naar China?'\n\nAls de man in de boom niet antwoordt, faalt hij; en als hij antwoordt, valt hij en verliest zijn leven. Wat moet hij nu doen?\"\n\nMumons vers:\nKyogen is werkelijk een schandalige dwaas,\nVerspreidt vrijelijk gif.\nHij stopt de monden van de monniken,\nEn laat duivelogen ontspruiten uit hun dode lichamen.",t:["paradox","wijsheid"],m:2},
{n:6,en:"Buddha Twirls a Flower",nl:"Boeddha Draait een Bloem",e:"When Buddha was in Grdhrakuta mountain he turned a flower in his fingers and held it before his listeners. Every one was silent. Only Maha-Kashapa smiled at this revelation, though he tried to control the lines of his face.\n\nBuddha said: \"I have the eye of the true teaching, the heart of Nirvana, the true aspect of non-form, and the ineffable stride of Dharma. It is not expressed by words, but especially transmitted beyond teaching. This teaching I have given to Maha-Kashapa.\"\n\nMumon's Verse:\nHe blinks — and lo, another style!\nHad Maha-Kashapa not smiled,\nThe whole assembly would have been ashamed,\nAnd religion could not have been transmitted.",d:"Toen Boeddha op de berg Grdhrakuta was, draaide hij een bloem in zijn vingers en hield deze voor zijn toehoorders. Iedereen was stil. Alleen Maha-Kashapa glimlachte bij deze onthulling, hoewel hij de lijnen van zijn gezicht probeerde te beheersen.\n\nBoeddha zei: \"Ik heb het oog van de ware leer, het hart van Nirvana, het ware aspect van niet-vorm, en de onuitsprekelijke tred van Dharma. Het wordt niet uitgedrukt door woorden, maar speciaal overgedragen voorbij de leer. Deze leer heb ik aan Maha-Kashapa gegeven.\"\n\nMumons vers:\nHij knippert — en zie, een andere stijl!\nAls Maha-Kashapa niet had geglimlacht,\nZou de hele vergadering beschaamd zijn geweest,\nEn religie had niet overgedragen kunnen worden.",t:["stilte","verlichting"],m:2},
{n:7,en:"Joshu Washes the Bowl",nl:"Joshu Wast de Kom",e:"A monk told Joshu, \"I have just entered the monastery. Please teach me.\"\nJoshu asked, \"Have you eaten your rice porridge?\"\nThe monk replied, \"I have eaten.\"\nJoshu said, \"Then you had better wash your bowl.\"\nAt that moment the monk was enlightened.\n\nMumon's Comment:\nJoshu is the man who opens his mouth and shows his heart. If you can see through his teaching, you are a master of masters.\n\nMumon's Verse:\nIt is too clear and so it is hard to see.\nA dunce once searched for fire with a lighted lantern.\nHad he known what fire was,\nHe could have cooked his rice much sooner.",d:"Een monnik zei tegen Joshu: \"Ik ben net het klooster binnengekomen. Onderricht mij alstublieft.\"\nJoshu vroeg: \"Heb je je rijstpap gegeten?\"\nDe monnik antwoordde: \"Ik heb gegeten.\"\nJoshu zei: \"Was dan je kom.\"\nOp dat moment werd de monnik verlicht.\n\nMumons commentaar:\nJoshu is de man die zijn mond opent en zijn hart toont. Als je door zijn leer heen kunt kijken, ben je een meester der meesters.\n\nMumons vers:\nHet is te helder en daarom moeilijk te zien.\nEen domkop zocht eens naar vuur met een brandende lantaarn.\nHad hij geweten wat vuur was,\nDan had hij zijn rijst veel eerder kunnen koken.",t:["eenvoud","verlichting"],m:1},
{n:8,en:"Keichu's Wheel",nl:"Keichu's Wiel",e:"Gettan said to his students: \"Keichu, the first wheel-maker of China, made two wheels of fifty spokes each. Now, suppose you removed the nave uniting the spokes. What would become of the wheel? And had Keichu done this, could he be called the master wheel-maker?\"\n\nMumon's Verse:\nWhen the hubless wheel turns,\nMaster or no master can stop it.\nIt turns above heaven and below earth,\nSouth, north, east, and west.",d:"Gettan zei tegen zijn studenten: \"Keichu, de eerste wielmaker van China, maakte twee wielen van elk vijftig spaken. Stel nu dat je de naaf verwijderde die de spaken verbindt. Wat zou er van het wiel worden? En als Keichu dit had gedaan, kon hij dan de meester-wielmaker worden genoemd?\"\n\nMumons vers:\nWanneer het naafloze wiel draait,\nKan geen meester het stoppen.\nHet draait boven de hemel en onder de aarde,\nZuid, noord, oost en west.",t:["paradox","wijsheid"],m:1},
{n:9,en:"A Buddha Before History",nl:"Een Boeddha Vóór de Geschiedenis",e:"A monk asked Seijo: \"I understand that a Buddha who lived before recorded history sat in meditation for ten cycles of existence and could not realize the highest truth, and so could not become fully emancipated. Why was this so?\"\n\nSeijo replied: \"Your question is self-explanatory.\"\n\nThe monk asked: \"Why did he fail?\"\n\nSeijo said: \"Because he did not become a Buddha.\"\n\nMumon's Verse:\nI would rather soothe the superstition-free man\nThan liberate the other kind.\nEven the Buddha of infinite ages past\nCould not free the man bound by delusions.",d:"Een monnik vroeg Seijo: \"Ik begrijp dat een Boeddha die vóór de geschreven geschiedenis leefde, tien tijdperken in meditatie zat en de hoogste waarheid niet kon realiseren, en dus niet volledig bevrijd kon worden. Waarom was dit zo?\"\n\nSeijo antwoordde: \"Je vraag verklaart zichzelf.\"\n\nDe monnik vroeg: \"Waarom faalde hij?\"\n\nSeijo zei: \"Omdat hij geen Boeddha werd.\"\n\nMumons vers:\nIk zou liever de bijgeloofvrije mens troosten\nDan de andere soort bevrijden.\nZelfs de Boeddha van eindeloze tijdperken geleden\nKon de mens niet bevrijden die gebonden is door waanbeelden.",t:["paradox","verlichting"],m:2},
{n:10,en:"Seizei Alone and Poor",nl:"Seizei Alleen en Arm",e:"A monk named Seizei asked of Sozan: \"Seizei is alone and poor. Will you give him support?\"\n\nSozan asked: \"Seizei?\"\n\nSeizei responded: \"Yes, sir.\"\n\nSozan said: \"You have Zen, the best wine in China, and already have drunk three cups, and still you say that you have not yet moistened your lips.\"\n\nMumon's Verse:\nThe poorest man in China,\nThe bravest man in China,\nHe barely sustains himself,\nYet dares to rival the wealthiest.",d:"Een monnik genaamd Seizei vroeg aan Sozan: \"Seizei is alleen en arm. Wilt u hem ondersteunen?\"\n\nSozan vroeg: \"Seizei?\"\n\nSeizei antwoordde: \"Ja, meester.\"\n\nSozan zei: \"Je hebt Zen, de beste wijn van China, en hebt al drie bekers gedronken, en toch zeg je dat je je lippen nog niet bevochtigd hebt.\"\n\nMumons vers:\nDe armste man van China,\nDe dapperste man van China,\nHij houdt zichzelf nauwelijks staande,\nMaar durft de rijkste te evenaren.",t:["eenvoud","paradox"],m:1},
{n:11,en:"Joshu Examines a Monk",nl:"Joshu Onderzoekt een Monnik",e:"Joshu went to a hermit's cottage and asked, \"Is the master in? Is the master in?\"\nThe hermit raised his fist.\nJoshu said, \"The water is too shallow to anchor here,\" and went away.\n\nComing to another hermit's cottage, he asked again, \"Is the master in? Is the master in?\"\nThis hermit, too, raised his fist.\nJoshu said, \"Free to give, free to take, free to kill, free to save,\" and made a deep bow.\n\nMumon's Verse:\nThe raised fist was the same in both cases.\nWhy was one accepted, the other rejected?\nTell me, what is the difference?\nIf you can give a turning word, you will see that Joshu was free.",d:"Joshu ging naar het huisje van een kluizenaar en vroeg: \"Is de meester thuis? Is de meester thuis?\"\nDe kluizenaar hief zijn vuist.\nJoshu zei: \"Het water is te ondiep om hier te ankeren,\" en ging weg.\n\nBij het huisje van een andere kluizenaar vroeg hij weer: \"Is de meester thuis? Is de meester thuis?\"\nOok deze kluizenaar hief zijn vuist.\nJoshu zei: \"Vrij om te geven, vrij om te nemen, vrij om te doden, vrij om te redden,\" en maakte een diepe buiging.\n\nMumons vers:\nDe geheven vuist was in beide gevallen hetzelfde.\nWaarom werd de een aanvaard, de ander afgewezen?\nVertel me, wat is het verschil?\nAls je een keerpuntwoord kunt geven, zul je zien dat Joshu vrij was.",t:["meester","paradox"],m:2},
{n:12,en:"Zuigan Calls His Own Master",nl:"Zuigan Roept Zijn Eigen Meester",e:"Zuigan Gen Osho called out to himself every day, \"Master.\" Then he answered himself, \"Yes, sir.\" And after that he would say, \"Become sober.\" Then answer, \"Yes, sir.\" \"And after that,\" he continued, \"do not be deceived by others.\" \"Yes, sir; yes, sir,\" he answered.\n\nMumon's Verse:\nThose who search for the Way do not realize truth.\nThey only know their old discriminating consciousness.\nThis is the cause of the endless cycle of birth and death.\nThe fool calls it the original self.",d:"Zuigan Gen Osho riep elke dag tegen zichzelf: \"Meester.\" Dan antwoordde hij zichzelf: \"Ja, meester.\" En daarna zei hij: \"Word nuchter.\" Dan antwoordde hij: \"Ja, meester.\" \"En daarna,\" vervolgde hij, \"laat je niet misleiden door anderen.\" \"Ja, meester; ja, meester,\" antwoordde hij.\n\nMumons vers:\nZij die de Weg zoeken realiseren de waarheid niet.\nZe kennen alleen hun oude onderscheidende bewustzijn.\nDit is de oorzaak van de eindeloze cyclus van geboorte en dood.\nDe dwaas noemt het het oorspronkelijke zelf.",t:["ego","wijsheid"],m:1},
{n:13,en:"Tokusan Holds His Bowl",nl:"Tokusan Houdt Zijn Kom Vast",e:"Tokusan went to the dining room from the meditation hall holding his bowl. Seppo was on cooking duty. When he met Tokusan he said, \"The dinner drum is not yet beaten. Where are you going with your bowl?\"\n\nTokusan returned to his room.\n\nSeppo told Ganto about this. Ganto said, \"Old Tokusan does not understand the ultimate truth.\"\n\nTokusan heard this remark and asked Ganto to come to him. \"I have heard,\" he said, \"you do not approve my Zen.\" Ganto whispered his meaning. Tokusan said nothing.\n\nThe next day Tokusan delivered an entirely different kind of lecture. Ganto laughed and clapped his hands, saying, \"I see our old man understands the ultimate truth at last. None in China can outdo him.\"\n\nMumon's Verse:\nIf you understand the first, you understand the last.\nThe first and last are not one.",d:"Tokusan ging naar de eetzaal vanuit de meditatiehal met zijn kom. Seppo had kookdienst. Toen hij Tokusan tegenkwam zei hij: \"De dinertrom is nog niet geslagen. Waar ga je heen met je kom?\"\n\nTokusan keerde terug naar zijn kamer.\n\nSeppo vertelde Ganto hierover. Ganto zei: \"Oude Tokusan begrijpt de ultieme waarheid niet.\"\n\nTokusan hoorde dit en vroeg Ganto bij hem te komen. \"Ik heb gehoord,\" zei hij, \"dat je mijn Zen niet goedkeurt.\" Ganto fluisterde zijn bedoeling. Tokusan zei niets.\n\nDe volgende dag gaf Tokusan een geheel ander soort lezing. Ganto lachte en klapte in zijn handen: \"Ik zie dat onze oude man eindelijk de ultieme waarheid begrijpt. Niemand in China kan hem overtreffen.\"\n\nMumons vers:\nAls je het eerste begrijpt, begrijp je het laatste.\nHet eerste en het laatste zijn niet één.",t:["meester","verlichting"],m:3},
{n:14,en:"Nansen Cuts the Cat in Two",nl:"Nansen Snijdt de Kat in Tweeën",e:"Nansen saw the monks of the eastern and western halls fighting over a cat. He seized the cat and told the monks, \"If any of you say a good word, you can save the cat.\"\n\nNo one answered. So Nansen boldly cut the cat in two pieces.\n\nThat evening Joshu returned and Nansen told him about this. Joshu removed his sandals and, placing them on his head, walked out.\n\nNansen said, \"If you had been there, you could have saved the cat.\"\n\nMumon's Verse:\nHad Joshu been there,\nHe would have enforced the edict oppositely.\nJoshu snatches the sword\nAnd Nansen begs for his life.",d:"Nansen zag de monniken van de oostelijke en westelijke hallen vechten om een kat. Hij greep de kat en zei: \"Als iemand van jullie een goed woord zegt, kun je de kat redden.\"\n\nNiemand antwoordde. Dus sneed Nansen moedig de kat in twee stukken.\n\nDie avond keerde Joshu terug en Nansen vertelde hem hierover. Joshu deed zijn sandalen uit en plaatste ze op zijn hoofd, en liep naar buiten.\n\nNansen zei: \"Als jij er was geweest, had je de kat kunnen redden.\"\n\nMumons vers:\nWas Joshu er geweest,\nDan had hij het edict omgekeerd uitgevoerd.\nJoshu grijpt het zwaard\nEn Nansen smeekt om zijn leven.",t:["kracht","paradox"],m:2},
{n:15,en:"Tozan's Three Blows",nl:"Tozan's Drie Slagen",e:"Tozan went to Ummon. Ummon asked him where he had come from.\nTozan said, \"From Sato village.\"\nUmmon asked, \"In what temple did you remain for the summer?\"\nTozan replied, \"The temple of Hoji, south of the lake.\"\n\"When did you leave there?\" asked Ummon.\n\"The twenty-fifth of August,\" answered Tozan.\nUmmon said, \"I should give you three blows with a stick, but today I forgive you.\"\n\nMumon's Verse:\nBecause he set forth the viewpoint of the ultimate,\nThree blows for one word, how generous!\nSince he explains with the action of his tongue,\nWhatever he may say from now on is useless.",d:"Tozan ging naar Ummon. Ummon vroeg hem waar hij vandaan kwam.\nTozan zei: \"Uit het dorp Sato.\"\nUmmon vroeg: \"In welke tempel verbleef je de zomer?\"\nTozan antwoordde: \"De tempel van Hoji, ten zuiden van het meer.\"\n\"Wanneer vertrok je daar?\" vroeg Ummon.\n\"De vijfentwintigste augustus,\" antwoordde Tozan.\nUmmon zei: \"Ik zou je drie slagen met een stok moeten geven, maar vandaag vergeef ik je.\"\n\nMumons vers:\nOmdat hij het standpunt van het ultieme uiteenzette,\nDrie slagen voor één woord, hoe gul!\nAangezien hij uitlegt met de actie van zijn tong,\nIs alles wat hij vanaf nu zegt nutteloos.",t:["meester","humor"],m:2},
{n:16,en:"Bells and Robes",nl:"Klokken en Gewaden",e:"Ummon asked: \"The world is such a wide world, why do you answer a bell and don ceremonial robes?\"\n\nMumon's Verse:\nIf you follow rules and regulations, you tie yourself without a rope.\nIf you are free and unattached, you are a heretic and a devil.\nMind is the Buddha.\nBuddha is the mind.",d:"Ummon vroeg: \"De wereld is zo'n wijde wereld, waarom beantwoord je een bel en trek je ceremoniële gewaden aan?\"\n\nMumons vers:\nAls je regels en voorschriften volgt, bind je jezelf zonder touw.\nAls je vrij en ongehecht bent, ben je een ketter en een duivel.\nGeest is de Boeddha.\nBoeddha is de geest.",t:["paradox","eenvoud"],m:1},
{n:17,en:"The National Teacher's Three Calls",nl:"De Drie Roepen van de Rijksleraar",e:"The National Teacher called the attendant three times, and three times the attendant responded.\n\nThe National Teacher said, \"I have always been thinking I was ungrateful to you, but actually it is you who have been ungrateful to me.\"\n\nMumon's Verse:\nHe wore an iron yoke with no hole,\nHanding down the shame to his successors.\nIf you want to hold up the gate and the doors,\nYou must climb a mountain of swords with bare feet.",d:"De Rijksleraar riep zijn bediende drie keer, en drie keer antwoordde de bediende.\n\nDe Rijksleraar zei: \"Ik heb altijd gedacht dat ik ondankbaar tegenover jou was, maar eigenlijk ben jij degene die ondankbaar is tegenover mij.\"\n\nMumons vers:\nHij droeg een ijzeren juk zonder gat,\nGaf de schande door aan zijn opvolgers.\nAls je de poort en de deuren wilt stutten,\nMoet je op blote voeten een berg van zwaarden beklimmen.",t:["meester","stilte"],m:1},
{n:18,en:"Tozan's Three Pounds",nl:"Tozan's Drie Pond",e:"A monk asked Tozan, \"What is Buddha?\"\nTozan said, \"Three pounds of flax.\"\n\nMumon's Verse:\nBulging with flax—three pounds!\nClose were the words, but closer the meaning.\nAnyone who argues about right and wrong\nIs a person of right and wrong.",d:"Een monnik vroeg Tozan: \"Wat is Boeddha?\"\nTozan zei: \"Drie pond vlas.\"\n\nMumons vers:\nUitpuilend van vlas — drie pond!\nDichtbij waren de woorden, maar dichterbij de betekenis.\nIedereen die over goed en fout debatteert\nIs een persoon van goed en fout.",t:["paradox","eenvoud"],m:1},
{n:19,en:"Everyday Life Is the Path",nl:"Het Dagelijks Leven Is het Pad",e:"Joshu asked Nansen: \"What is the path?\"\nNansen said: \"Everyday life is the path.\"\nJoshu asked: \"Can it be studied?\"\nNansen said: \"If you try to study, you will be far away from it.\"\nJoshu asked: \"If I do not study, how can I know it is the path?\"\nNansen said: \"The path does not belong to the perception world, neither does it belong to the nonperception world. Cognition is a delusion and noncognition is senseless. If you want to reach the true path beyond doubt, place yourself in the same freedom as sky. You name it neither good nor not-good.\"\nAt these words Joshu was enlightened.\n\nMumon's Verse:\nIn spring, hundreds of flowers; in autumn, a harvest moon;\nIn summer, a refreshing breeze; in winter, snow will accompany you.\nIf useless things do not hang in your mind,\nAny season is a good season for you.",d:"Joshu vroeg Nansen: \"Wat is het pad?\"\nNansen zei: \"Het dagelijks leven is het pad.\"\nJoshu vroeg: \"Kan het bestudeerd worden?\"\nNansen zei: \"Als je probeert te studeren, zul je er ver vandaan zijn.\"\nJoshu vroeg: \"Als ik niet studeer, hoe kan ik dan weten dat het het pad is?\"\nNansen zei: \"Het pad behoort niet tot de waarnemingswereld, noch tot de niet-waarnemingswereld. Kennis is een waanbeeld en niet-kennis is zinloos. Als je het ware pad voorbij twijfel wilt bereiken, plaats jezelf dan in dezelfde vrijheid als de hemel. Noem het noch goed noch niet-goed.\"\nBij deze woorden werd Joshu verlicht.\n\nMumons vers:\nIn de lente, honderden bloemen; in de herfst, een oogstmaan;\nIn de zomer, een verfrissend briesje; in de winter vergezelt sneeuw je.\nAls nutteloze dingen niet in je geest hangen,\nIs elk seizoen een goed seizoen voor jou.",t:["eenvoud","verlichting","natuur"],m:2},
{n:20,en:"The Enlightened Man",nl:"De Verlichte",e:"Shogen asked: \"Why does the enlightened man not stand on his feet and explain himself?\" He also said: \"It is not necessary for speech to come from the tongue.\"\n\nMumon's Verse:\nHis feet are always on the ground,\nBut still he regrets that people do not see him.\nEven if the whole world is on fire,\nHe will not turn his head.",d:"Shogen vroeg: \"Waarom staat de verlichte niet op zijn voeten en verklaart hij zichzelf?\" Hij zei ook: \"Het is niet nodig dat spraak van de tong komt.\"\n\nMumons vers:\nZijn voeten staan altijd op de grond,\nMaar toch betreurt hij dat mensen hem niet zien.\nZelfs als de hele wereld in brand staat,\nZal hij zijn hoofd niet draaien.",t:["stilte","verlichting"],m:1},
{n:21,en:"Dried Dung",nl:"Gedroogde Mest",e:"A monk asked Ummon: \"What is Buddha?\"\nUmmon answered him: \"Dried dung.\"\n\nMumon's Verse:\nLightning flashes,\nSparks shower.\nIn one blink of your eyes\nYou have missed seeing.",d:"Een monnik vroeg Ummon: \"Wat is Boeddha?\"\nUmmon antwoordde: \"Gedroogde mest.\"\n\nMumons vers:\nBliksem flitst,\nVonken regenen.\nIn één knippering van je ogen\nHeb je het zien gemist.",t:["humor","paradox"],m:1},
{n:22,en:"Kashapa's Preaching Sign",nl:"Kashapa's Preekteken",e:"Ananda asked Kashapa: \"Buddha gave you the golden-woven robe of succession. What else did he give you?\"\nKashapa said: \"Ananda.\"\nAnanda answered: \"Yes, Brother.\"\nKashapa said: \"Now you can take down my preaching sign and put up your own.\"\n\nMumon's Verse:\nThe point of the question was the preaching sign.\nBoth brothers had the same answer.\nIf you can grasp this point,\nYou are a master of masters.",d:"Ananda vroeg Kashapa: \"Boeddha gaf je het goudengeweven kleed van opvolging. Wat gaf hij je nog meer?\"\nKashapa zei: \"Ananda.\"\nAnanda antwoordde: \"Ja, Broeder.\"\nKashapa zei: \"Nu kun je mijn preekteken neerhalen en je eigen ophangen.\"\n\nMumons vers:\nHet punt van de vraag was het preekteken.\nBeide broeders hadden hetzelfde antwoord.\nAls je dit punt kunt vatten,\nBen je een meester der meesters.",t:["meester","verlichting"],m:1},
{n:23,en:"Not Thinking Good, Not Thinking Evil",nl:"Niet Goed Denken, Niet Kwaad Denken",e:"When the sixth patriarch was pursued by the monk Myo, the patriarch placed the bowl and robe on a rock and said, \"This robe represents the teaching. It should not be fought over. If you want to take it away, take it now.\"\n\nMyo tried to move it, but it was as heavy as a mountain and would not budge. Trembling, he said, \"I came for the teaching, not for the robe. Please teach me.\"\n\nThe sixth patriarch said, \"Think neither of good nor evil. At this very moment, what is the original self of the monk Myo?\"\n\nAt these words Myo was suddenly enlightened.\n\nMumon's Verse:\nYou cannot describe it; you cannot picture it;\nYou cannot admire it; don't try to eat it raw.\nYour true self has nowhere to hide.\nWhen the world is destroyed, it is not destroyed.",d:"Toen de zesde patriarch werd achtervolgd door de monnik Myo, legde de patriarch de kom en het gewaad op een rots en zei: \"Dit gewaad vertegenwoordigt de leer. Er moet niet om gevochten worden. Als je het wilt meenemen, neem het nu.\"\n\nMyo probeerde het te verplaatsen, maar het was zo zwaar als een berg en bewoog niet. Trillend zei hij: \"Ik kwam voor de leer, niet voor het gewaad. Onderricht mij alstublieft.\"\n\nDe zesde patriarch zei: \"Denk noch aan goed noch aan kwaad. Op dit moment, wat is het oorspronkelijke zelf van de monnik Myo?\"\n\nBij deze woorden werd Myo plotseling verlicht.\n\nMumons vers:\nJe kunt het niet beschrijven; je kunt het niet afbeelden;\nJe kunt het niet bewonderen; probeer het niet rauw te eten.\nJe ware zelf heeft nergens om zich te verbergen.\nWanneer de wereld vernietigd wordt, wordt het niet vernietigd.",t:["ego","verlichting"],m:2},
{n:24,en:"Without Words, Without Silence",nl:"Zonder Woorden, Zonder Stilte",e:"A monk asked Fuketsu: \"Without speaking, without silence, how can you express the truth?\"\n\nFuketsu observed: \"I always remember springtime in southern China. The birds sing among innumerable kinds of fragrant flowers.\"\n\nMumon's Verse:\nWithout revealing his subtle teaching,\nHe had spoken the absolute.\nWere his feet on firm ground,\nHe would have slashed all who came near.",d:"Een monnik vroeg Fuketsu: \"Zonder spreken, zonder stilte, hoe kun je de waarheid uitdrukken?\"\n\nFuketsu merkte op: \"Ik herinner me altijd de lente in Zuid-China. De vogels zingen tussen ontelbare soorten geurige bloemen.\"\n\nMumons vers:\nZonder zijn subtiele leer te onthullen,\nHad hij het absolute gesproken.\nStonden zijn voeten op vaste grond,\nDan had hij allen die dichtbij kwamen neergeslagen.",t:["stilte","natuur","paradox"],m:1},
{n:25,en:"Preaching from the Third Seat",nl:"Preken vanaf de Derde Zetel",e:"In a dream Kyozan went to Maitreya's place and was led to the third seat. Someone announced: \"Today the one in the third seat will preach.\"\n\nKyozan rose and, hitting the table with a gavel, said, \"The truth of the teaching goes beyond all forms. See! See!\"\n\nMumon's Verse:\nIn broad daylight, under the blue sky,\nHe forges a dream in a dream.\nMonster! Monster!\nHe deceives the whole crowd.",d:"In een droom ging Kyozan naar Maitreya's plek en werd naar de derde zetel geleid. Iemand kondigde aan: \"Vandaag zal degene op de derde zetel preken.\"\n\nKyozan stond op en zei, terwijl hij met een hamer op tafel sloeg: \"De waarheid van de leer gaat voorbij alle vormen. Zie! Zie!\"\n\nMumons vers:\nKlaarlichte dag, onder de blauwe hemel,\nSmeedt hij een droom in een droom.\nMonster! Monster!\nHij misleidt de hele menigte.",t:["paradox","humor"],m:1},
{n:26,en:"Two Monks Roll Up the Screen",nl:"Twee Monniken Rollen het Scherm Op",e:"Hogen of Seiryo monastery was about to lecture before dinner when he noticed that the bamboo screen lowered for meditation had not been rolled up. He pointed to it. Two monks arose wordlessly and rolled it up.\n\nHogen said: \"The state of the first monk is good, not that of the other.\"\n\nMumon's Verse:\nI do not ask you about rolling up or not rolling up.\nRolled up or unrolled,\nThe breeze blows through and the moon shines.\nWho can say which is better?",d:"Hogen van het Seiryo-klooster stond op het punt een lezing te geven vóór het diner toen hij merkte dat het bamboescherm dat voor meditatie was neergelaten, niet was opgerold. Hij wees ernaar. Twee monniken stonden zwijgend op en rolden het op.\n\nHogen zei: \"De staat van de eerste monnik is goed, die van de andere niet.\"\n\nMumons vers:\nIk vraag je niet over oprollen of niet oprollen.\nOpgerold of uitgerold,\nDe bries waait erdoorheen en de maan schijnt.\nWie kan zeggen welke beter is?",t:["stilte","eenvoud"],m:1},
{n:27,en:"It Is Not Mind, Not Buddha, Not Things",nl:"Het Is Niet Geest, Niet Boeddha, Niet Dingen",e:"A monk asked Nansen: \"Is there a teaching no master ever taught before?\"\nNansen said: \"Yes, there is.\"\n\"What is it?\" asked the monk.\nNansen replied: \"It is not mind, it is not Buddha, it is not things.\"\n\nMumon's Verse:\nNansen was too kind and lost his treasure.\nVerily, words have no power.\nEven though the mountain becomes the sea,\nWords cannot open another's mind.",d:"Een monnik vroeg Nansen: \"Is er een leer die nog geen meester ooit eerder onderwees?\"\nNansen zei: \"Ja, die is er.\"\n\"Wat is het?\" vroeg de monnik.\nNansen antwoordde: \"Het is niet geest, het is niet Boeddha, het is niet dingen.\"\n\nMumons vers:\nNansen was te vriendelijk en verloor zijn schat.\nWaarlijk, woorden hebben geen kracht.\nOok al wordt de berg de zee,\nWoorden kunnen andermans geest niet openen.",t:["paradox","wijsheid"],m:1},
{n:28,en:"Blow Out the Candle",nl:"Blaas de Kaars Uit",e:"Tokusan was studying Zen under Ryutan. One night he came to Ryutan and asked many questions. The teacher said: \"The night is getting old. Why don't you retire?\"\n\nTokusan bowed and opened the screen to go out, observing: \"It is very dark outside.\"\n\nRyutan offered Tokusan a lighted candle to find his way. Just as Tokusan received it, Ryutan blew it out. At that moment the mind of Tokusan was opened.\n\nMumon's Verse:\nA hundred hearing cannot surpass one seeing.\nA hundred seeing cannot surpass one touching.\nWhat was gained by one blow of that candle?\nLightning flashes, sparks fly.",d:"Tokusan studeerde Zen onder Ryutan. Op een avond kwam hij bij Ryutan en stelde vele vragen. De leraar zei: \"De nacht wordt oud. Waarom ga je niet slapen?\"\n\nTokusan boog en opende het scherm om naar buiten te gaan, en merkte op: \"Het is erg donker buiten.\"\n\nRyutan bood Tokusan een brandende kaars aan. Net toen Tokusan hem aannam, blies Ryutan hem uit. Op dat moment ging de geest van Tokusan open.\n\nMumons vers:\nHonderd keer horen kan niet tippen aan één keer zien.\nHonderd keer zien kan niet tippen aan één keer aanraken.\nWat werd gewonnen door dat ene uitblazen van de kaars?\nBliksem flitst, vonken vliegen.",t:["verlichting","meester"],m:2},
{n:29,en:"Not the Wind, Not the Flag",nl:"Niet de Wind, Niet de Vlag",e:"Two monks were arguing about the temple flag waving in the wind. One said: \"The flag moves.\" The other said: \"The wind moves.\"\n\nThey argued back and forth but could not agree.\n\nHuineng, the sixth patriarch, said: \"Gentlemen! It is not the flag that moves. It is not the wind that moves. It is your mind that moves.\"\n\nThe two monks were struck with awe.\n\nMumon's Verse:\nWind, flag, mind moves,\nThe same understanding.\nWhen the mouth opens\nAll are wrong.",d:"Twee monniken maakten ruzie over de tempelvlag die wapperde in de wind. De een zei: \"De vlag beweegt.\" De ander zei: \"De wind beweegt.\"\n\nZe debatteerden heen en weer maar konden het niet eens worden.\n\nHuineng, de zesde patriarch, zei: \"Heren! Het is niet de vlag die beweegt. Het is niet de wind die beweegt. Het is jullie geest die beweegt.\"\n\nDe twee monniken waren met ontzag geslagen.\n\nMumons vers:\nWind, vlag, geest beweegt,\nHetzelfde begrip.\nWanneer de mond opengaat\nIs alles fout.",t:["paradox","wijsheid"],m:1},
{n:30,en:"This Mind Is Buddha",nl:"Deze Geest Is Boeddha",e:"Daibai asked Baso: \"What is Buddha?\"\nBaso said: \"This mind is Buddha.\"\n\nMumon's Verse:\nBlue sky and bright day,\nNo more searching around!\n\"What is Buddha?\" you ask:\nHolding loot, you declare your innocence.",d:"Daibai vroeg Baso: \"Wat is Boeddha?\"\nBaso zei: \"Deze geest is Boeddha.\"\n\nMumons vers:\nBlauwe hemel en heldere dag,\nNiet meer rondzoeken!\n\"Wat is Boeddha?\" vraag je:\nMet buit in handen verklaar je je onschuld.",t:["eenvoud","verlichting"],m:1},
{n:31,en:"Joshu Investigates",nl:"Joshu Onderzoekt",e:"A traveling monk asked an old woman the road to Taizan, a popular temple supposed to give wisdom to the one who worships there. The old woman said, \"Go straight ahead.\" When the monk proceeded a few steps, she said to herself, \"He too is a common church-goer.\"\n\nSomeone told this incident to Joshu, who said, \"Wait until I investigate.\" The next day he went and asked the same question, and the old woman gave the same answer.\n\nJoshu told the monks: \"I have investigated that old woman.\"\n\nMumon's Verse:\nThe old woman only had one plan:\nSitting in her tent, plotting the campaign.\nThough she appeared an able general,\nShe did not know she was being scouted.",d:"Een reizende monnik vroeg een oude vrouw de weg naar Taizan, een populaire tempel die wijsheid zou geven aan wie er aanbad. De oude vrouw zei: \"Ga rechtdoor.\" Toen de monnik een paar stappen zette, zei ze bij zichzelf: \"Hij is ook maar een gewone kerkganger.\"\n\nIemand vertelde dit voorval aan Joshu, die zei: \"Wacht tot ik het onderzoek.\" De volgende dag ging hij erheen en stelde dezelfde vraag, en de oude vrouw gaf hetzelfde antwoord.\n\nJoshu zei tegen de monniken: \"Ik heb die oude vrouw onderzocht.\"\n\nMumons vers:\nDe oude vrouw had maar één plan:\nZittend in haar tent, de campagne beramen.\nHoewel ze een bekwame generaal leek,\nWist ze niet dat ze verkend werd.",t:["humor","wijsheid"],m:2},
{n:32,en:"A Philosopher Asks Buddha",nl:"Een Filosoof Vraagt Boeddha",e:"A philosopher asked Buddha: \"Without words, without the wordless, will you tell me truth?\"\n\nThe Buddha kept silence.\n\nThe philosopher bowed and thanked the Buddha, saying: \"With your loving kindness I have cleared away my delusions and entered the true path.\"\n\nAfter the philosopher had gone, Ananda asked the Buddha what he had attained.\n\nThe Buddha replied: \"A good horse runs even at the shadow of the whip.\"\n\nMumon's Verse:\nOn the edge of a sword,\nOver the ridge of an iceberg,\nWith no steps, no ladders,\nClimbing the cliffs without hands.",d:"Een filosoof vroeg Boeddha: \"Zonder woorden, zonder het woordeloze, wilt u mij de waarheid vertellen?\"\n\nDe Boeddha zweeg.\n\nDe filosoof boog en bedankte de Boeddha, zeggend: \"Met uw liefdevolle vriendelijkheid heb ik mijn waanbeelden opgeruimd en het ware pad betreden.\"\n\nNadat de filosoof was vertrokken, vroeg Ananda de Boeddha wat hij had bereikt.\n\nDe Boeddha antwoordde: \"Een goed paard rent zelfs bij de schaduw van de zweep.\"\n\nMumons vers:\nOp de rand van een zwaard,\nOver de kam van een ijsberg,\nZonder treden, zonder ladders,\nDe kliffen beklimmen zonder handen.",t:["stilte","verlichting"],m:2},
{n:33,en:"This Is Not Mind, This Is Not Buddha",nl:"Dit Is Niet Geest, Dit Is Niet Boeddha",e:"A monk asked Baso: \"What is Buddha?\"\nBaso said: \"This is not mind and this is not Buddha.\"\n\nMumon's Verse:\nIf you meet a fencing master on the road, give him your sword.\nIf you meet a poet, offer him your verse.\nWhen you meet others, say only a third of what you mean.\nNever give the remaining two-thirds.",d:"Een monnik vroeg Baso: \"Wat is Boeddha?\"\nBaso zei: \"Dit is niet geest en dit is niet Boeddha.\"\n\nMumons vers:\nAls je een schermmeester op de weg ontmoet, geef hem je zwaard.\nAls je een dichter ontmoet, bied hem je vers.\nWanneer je anderen ontmoet, zeg slechts een derde van wat je bedoelt.\nGeef nooit de overige twee derde.",t:["paradox"],m:1},
{n:34,en:"Learning Is Not the Path",nl:"Leren Is Niet het Pad",e:"Nansen said: \"Mind is not Buddha. Learning is not the path.\"\n\nMumon's Verse:\nThe sky clears, the sun shines.\nThe rain falls, the earth is wet.\nHe opened his heart fully and spoke\nBut was barely believed by anyone.",d:"Nansen zei: \"Geest is niet Boeddha. Leren is niet het pad.\"\n\nMumons vers:\nDe hemel klaart op, de zon schijnt.\nDe regen valt, de aarde is nat.\nHij opende zijn hart volledig en sprak\nMaar werd nauwelijks door iemand geloofd.",t:["eenvoud","paradox"],m:1},
{n:35,en:"Two Souls",nl:"Twee Zielen",e:"Goso asked a monk, \"Seijo and her soul are separated: which one is the true Seijo?\"\n\nMumon's Comment:\nWhen you realize what the real is, you will see that we pass from one husk to another like travelers stopping at wayside inns. But if you do not realize it yet, do not rush about wildly. When earth, water, fire and wind suddenly separate, you will be like a crab that has fallen into boiling water, struggling with seven arms and eight legs. Do not say I did not warn you!\n\nMumon's Verse:\nThe moon above the clouds is ever the same;\nValleys and mountains are separate from each other.\nAll are blessed, all are blessed;\nAre these one or two?",d:"Goso vroeg een monnik: \"Seijo en haar ziel zijn gescheiden: welke is de ware Seijo?\"\n\nMumons commentaar:\nWanneer je realiseert wat het werkelijke is, zul je zien dat we van de ene omhulling naar de andere gaan als reizigers die stoppen bij herbergen langs de weg. Maar als je het nog niet realiseert, ren dan niet wild rond. Wanneer aarde, water, vuur en wind plotseling scheiden, zul je zijn als een krab die in kokend water is gevallen, worstelend met zeven armen en acht benen. Zeg niet dat ik je niet gewaarschuwd heb!\n\nMumons vers:\nDe maan boven de wolken is altijd dezelfde;\nValleien en bergen zijn gescheiden van elkaar.\nAllen zijn gezegend, allen zijn gezegend;\nZijn dit er één of twee?",t:["ego","wijsheid"],m:2},
{n:36,en:"Meeting a Zen Master on the Road",nl:"Een Zenmeester Ontmoeten op de Weg",e:"Goso said: \"When you meet a Zen master on the road you cannot talk to him, you cannot face him with silence. What are you going to do?\"\n\nMumon's Verse:\nWhen you meet a Zen master on the road,\nFace him with neither words nor silence.\nGive him an uppercut,\nAnd you will be called one who understands Zen.",d:"Goso zei: \"Wanneer je een zenmeester op de weg ontmoet, kun je niet met hem praten, kun je hem niet met stilte tegemoet treden. Wat ga je doen?\"\n\nMumons vers:\nWanneer je een zenmeester op de weg ontmoet,\nTreed hem tegemoet met noch woorden noch stilte.\nGeef hem een uppercut,\nEn je zult iemand genoemd worden die Zen begrijpt.",t:["humor","kracht"],m:1},
{n:37,en:"A Buffalo Passes Through the Enclosure",nl:"Een Buffel Gaat Door de Omheining",e:"Goso said: \"When a buffalo goes out of his enclosure to the edge of the abyss, his horns and his head and his hoofs all pass through, but why can't the tail also pass?\"\n\nMumon's Verse:\nIf the buffalo runs, he will fall into the trench;\nIf he returns, he will be butchered.\nThat little tail\nIs a very strange thing.",d:"Goso zei: \"Wanneer een buffel uit zijn omheining gaat naar de rand van de afgrond, gaan zijn horens en zijn kop en zijn hoeven er allemaal doorheen, maar waarom kan de staart niet ook passeren?\"\n\nMumons vers:\nAls de buffel rent, valt hij in de greppel;\nAls hij terugkeert, wordt hij geslacht.\nDat kleine staartje\nIs een heel vreemd ding.",t:["paradox","gehechtheid"],m:1},
{n:38,en:"An Oak Tree in the Garden",nl:"Een Eik in de Tuin",e:"A monk asked Joshu why Bodhidharma came to China.\nJoshu said: \"An oak tree in the garden.\"\n\nMumon's Verse:\nWords cannot show the truth.\nSpeech is not in accord with the situation.\nThose who accept words are lost.\nThose who try to explain with words lead others astray.",d:"Een monnik vroeg Joshu waarom Bodhidharma naar China kwam.\nJoshu zei: \"Een eik in de tuin.\"\n\nMumons vers:\nWoorden kunnen de waarheid niet tonen.\nSpreken is niet in overeenstemming met de situatie.\nZij die woorden accepteren zijn verloren.\nZij die proberen uit te leggen met woorden leiden anderen op een dwaalspoor.",t:["eenvoud","natuur"],m:1},
{n:39,en:"Ummon's Sidetrack",nl:"Ummon's Zijspoor",e:"A monk said to Ummon: \"The radiance of the Buddha quietly illumines the whole universe...\"\n\nBefore the monk finished the verse, Ummon suddenly asked: \"Are you not quoting the poem of Choetsu?\"\n\n\"Yes,\" answered the monk.\n\n\"You are sidetracked,\" said Ummon.\n\nMumon's Verse:\nWhen the battle of wits is on,\nEven experts are helpless.\nUmmon pulled him off track,\nBut was easy on the monk.",d:"Een monnik zei tegen Ummon: \"De straling van de Boeddha verlicht stil het hele universum...\"\n\nVoordat de monnik het vers afmaakte, vroeg Ummon plotseling: \"Citeer je niet het gedicht van Choetsu?\"\n\n\"Ja,\" antwoordde de monnik.\n\n\"Je bent op een zijspoor,\" zei Ummon.\n\nMumons vers:\nWanneer de strijd der geesten gaande is,\nZijn zelfs experts hulpeloos.\nUmmon trok hem van het spoor,\nMaar was mild voor de monnik.",t:["meester","ego"],m:1},
{n:40,en:"Tipping Over a Water Vase",nl:"Een Waterkruik Omgooien",e:"When Isan was a student of Hyakujo, he served as tenzo (cook). Hyakujo wanted to select a master for Taiisan monastery. He told the head monk and the rest to present their qualifications.\n\nHyakujo placed a water vase on the floor and said: \"You may not call this a water vase. What will you call it?\"\n\nThe head monk said: \"One cannot call it a wooden shoe.\"\n\nIsan tipped over the vase with his foot and went out.\n\nHyakujo smiled and said: \"The head monk loses.\" And Isan became the master of the new monastery.\n\nMumon's Verse:\nGiving up his gourmet cooking,\nIsan gave one kick and settled everything.\nNature's challenge was nothing—\nHe strides off, free as ever.",d:"Toen Isan een student van Hyakujo was, diende hij als tenzo (kok). Hyakujo wilde een meester selecteren voor het Taiisan-klooster. Hij vroeg de hoofdmonnik en de rest hun kwalificaties te tonen.\n\nHyakujo plaatste een waterkruik op de vloer en zei: \"Je mag dit geen waterkruik noemen. Hoe noem je het dan?\"\n\nDe hoofdmonnik zei: \"Men kan het geen houten schoen noemen.\"\n\nIsan trapte de kruik om met zijn voet en liep naar buiten.\n\nHyakujo glimlachte en zei: \"De hoofdmonnik verliest.\" En Isan werd de meester van het nieuwe klooster.\n\nMumons vers:\nZijn gastronomische kookkunst opgevend,\nGaf Isan één trap en regelde alles.\nDe uitdaging van de natuur was niets—\nHij stapt weg, vrij als altijd.",t:["kracht","humor"],m:2},
{n:41,en:"Bodhidharma Pacifies the Mind",nl:"Bodhidharma Brengt de Geest tot Rust",e:"Bodhidharma sat facing the wall. His future successor stood in the snow and presented his severed arm to Bodhidharma. He cried: \"My mind is not pacified. Master, pacify my mind.\"\n\nBodhidharma said: \"If you bring me that mind, I will pacify it for you.\"\n\nThe successor said: \"When I search my mind I cannot hold it.\"\n\nBodhidharma said: \"Then your mind is pacified already.\"\n\nMumon's Verse:\nThat broken-toothed old Hindu,\nProudly he came pushing from the west.\nHe transmitted one teaching throughout the land—\nTurbulence and trouble, like today!",d:"Bodhidharma zat naar de muur te staren. Zijn toekomstige opvolger stond in de sneeuw en bood zijn afgehakte arm aan Bodhidharma aan. Hij riep: \"Mijn geest is niet tot rust gebracht. Meester, breng mijn geest tot rust.\"\n\nBodhidharma zei: \"Als je mij die geest brengt, zal ik hem voor je tot rust brengen.\"\n\nDe opvolger zei: \"Wanneer ik mijn geest zoek, kan ik hem niet vasthouden.\"\n\nBodhidharma zei: \"Dan is je geest al tot rust gebracht.\"\n\nMumons vers:\nDie tandeloze oude Indiër,\nTrots kwam hij vanuit het westen.\nHij gaf één leer door over het hele land—\nOnrust en moeite, zoals vandaag!",t:["ego","verlichting"],m:2},
{n:42,en:"The Girl Comes Out of Meditation",nl:"Het Meisje Komt Uit Meditatie",e:"In the time of Buddha, Manjusri went to the assembly of the Buddhas. When he arrived there, the conference was over and each Buddha had returned to his own territory. Only one girl was still sitting in meditation close to Shakyamuni's throne.\n\nManjusri asked Buddha: \"Why can that girl be near your throne while I cannot?\"\n\nBuddha said: \"Just awaken her and ask her yourself.\"\n\nManjusri walked around the girl three times and snapped his fingers. She remained in deep meditation. He tried every power he had to bring her out, but to no avail.\n\nBuddha said: \"Even a hundred thousand Manjusris cannot awaken her. But below this place, past twelve hundred million lands as innumerable as the sands of the Ganges, there is a Bodhisattva called Momyo. He can awaken her.\"\n\nInstantly Momyo emerged from the earth and bowed to Buddha, who directed him to arouse the girl. Momyo went in front of the girl and snapped his fingers once. At this the girl came out of meditation.\n\nMumon's Verse:\nOne could awaken her, the other could not.\nNeither is godly—both are pawns.\nOne with a god-mask, one without;\nBoth actors are failures.",d:"In de tijd van Boeddha ging Manjusri naar de bijeenkomst van de Boeddha's. Toen hij aankwam was de conferentie voorbij en was elke Boeddha naar zijn eigen gebied teruggekeerd. Alleen één meisje zat nog in meditatie dicht bij Shakyamuni's troon.\n\nManjusri vroeg Boeddha: \"Waarom kan dat meisje dicht bij uw troon zijn terwijl ik dat niet kan?\"\n\nBoeddha zei: \"Maak haar gewoon wakker en vraag het haar zelf.\"\n\nManjusri liep drie keer om het meisje heen en knipte met zijn vingers. Ze bleef in diepe meditatie. Hij probeerde elke kracht die hij had, maar tevergeefs.\n\nBoeddha zei: \"Zelfs honderdduizend Manjusri's kunnen haar niet wekken. Maar onder deze plek, voorbij twaalfhonderd miljoen landen zo ontelbaar als de zandkorrels van de Ganges, is er een Bodhisattva genaamd Momyo. Hij kan haar wekken.\"\n\nOnmiddellijk verscheen Momyo uit de aarde en boog voor Boeddha, die hem opdroeg het meisje te wekken. Momyo ging voor het meisje staan en knipte één keer met zijn vingers. Hierop kwam het meisje uit meditatie.\n\nMumons vers:\nDe een kon haar wekken, de ander niet.\nGeen van beiden is goddelijk — beiden zijn pionnen.\nEen met een godenmasker, een zonder;\nBeide acteurs falen.",t:["paradox","kracht"],m:3},
{n:43,en:"Shuzan's Short Staff",nl:"Shuzan's Korte Staf",e:"Shuzan held out his short staff and said: \"If you call this a short staff, you oppose its reality. If you do not call it a short staff, you ignore the fact. Now what do you wish to call this?\"\n\nMumon's Verse:\nHolding out the short staff,\nHe gave an order of life or death.\nPositive and negative interwoven,\nEven Buddhas and patriarchs cannot escape this.",d:"Shuzan hield zijn korte staf omhoog en zei: \"Als je dit een korte staf noemt, ga je in tegen de werkelijkheid. Als je het niet een korte staf noemt, negeer je het feit. Hoe wil je dit nu noemen?\"\n\nMumons vers:\nDe korte staf omhooghoudend,\nGaf hij een bevel van leven of dood.\nPositief en negatief verweven,\nZelfs Boeddha's en patriarchen kunnen hieraan niet ontsnappen.",t:["paradox"],m:1},
{n:44,en:"Basho's Staff",nl:"Basho's Staf",e:"Basho said to his disciples: \"If you have a staff, I will give it to you. If you have no staff, I will take it away from you.\"\n\nMumon's Verse:\nWith this staff I command the deepest mountain streams.\nWith this staff I prop the gate to keep it closed.\nIf you call this a staff, you enter hell like an arrow.",d:"Basho zei tegen zijn leerlingen: \"Als je een staf hebt, zal ik hem je geven. Als je geen staf hebt, zal ik hem van je afnemen.\"\n\nMumons vers:\nMet deze staf beveel ik de diepste bergstromen.\nMet deze staf stut ik de poort om hem gesloten te houden.\nAls je dit een staf noemt, ga je de hel in als een pijl.",t:["paradox","kracht"],m:1},
{n:45,en:"Who Is He?",nl:"Wie Is Hij?",e:"Hoen said: \"The past and present Buddhas are all his servants. Who is he?\"\n\nMumon's Verse:\nDon't draw another's bow,\nDon't ride another's horse,\nDon't discuss another's faults,\nDon't explore another's affairs.",d:"Hoen zei: \"De vroegere en huidige Boeddha's zijn allemaal zijn dienaren. Wie is hij?\"\n\nMumons vers:\nTrek niet andermans boog,\nRijd niet op andermans paard,\nBespreek niet andermans fouten,\nVerken niet andermans zaken.",t:["ego","verlichting"],m:1},
{n:46,en:"Proceed from the Top of the Pole",nl:"Ga Verder vanaf de Top van de Paal",e:"Sekiso asked: \"How can you proceed on from the top of a hundred-foot pole?\"\n\nMumon's Comment:\nOne who sits on the top of a hundred-foot pole has attained a certain height but is not yet handling Zen freely. He should proceed on and appear with his whole body in the ten parts of the world.\n\nMumon's Verse:\nOne who sits on top of a hundred-foot pole,\nAlthough he has entered the Way, it is not yet real.\nHe should proceed from the top of the pole\nAnd manifest his whole body in the ten directions.",d:"Sekiso vroeg: \"Hoe kun je verder gaan vanaf de top van een paal van honderd voet?\"\n\nMumons commentaar:\nDegene die op de top van een paal van honderd voet zit, heeft een zekere hoogte bereikt maar hanteert Zen nog niet vrij. Hij moet verder gaan en verschijnen met zijn hele lichaam in de tien delen van de wereld.\n\nMumons vers:\nDegene die op de top van een paal van honderd voet zit,\nHoewel hij de Weg is ingegaan, is het nog niet echt.\nHij moet verder gaan vanaf de top van de paal\nEn zijn hele lichaam manifesteren in de tien richtingen.",t:["kracht","verlichting"],m:2},
{n:47,en:"Three Gates of Tosotsu",nl:"De Drie Poorten van Tosotsu",e:"Tosotsu built three barriers and made the monks pass through them. The first: Studying Zen and probing the depths is for the purpose of seeing one's own nature. Now where is your nature?\n\nSecond: When you realize your own nature, you are free from birth and death. When the light of your eyes is falling, how can you be free from it?\n\nThird: If you free yourself from birth and death, you should know your ultimate destination. So when the four elements separate, where do you go?\n\nMumon's Verse:\nOne instant is eternity;\nEternity is the now.\nWhen you see through this one instant,\nYou see through the one who sees.",d:"Tosotsu bouwde drie barrières en liet de monniken erdoorheen gaan. De eerste: Zen bestuderen en de diepten doorgronden is om je eigen natuur te zien. Waar is nu je natuur?\n\nTweede: Wanneer je je eigen natuur realiseert, ben je vrij van geboorte en dood. Wanneer het licht van je ogen valt, hoe kun je er dan vrij van zijn?\n\nDerde: Als je jezelf bevrijdt van geboorte en dood, moet je je ultieme bestemming kennen. Dus wanneer de vier elementen scheiden, waar ga je dan heen?\n\nMumons vers:\nEén moment is eeuwigheid;\nEeuwigheid is het nu.\nWanneer je door dit ene moment heen kijkt,\nKijk je door degene die kijkt.",t:["dood","verlichting"],m:2},
{n:48,en:"One Road of Kembo",nl:"De Ene Weg van Kembo",e:"A monk asked Kembo: \"All Buddhas of the ten worlds enter the one road of Nirvana. Where does that road begin?\"\n\nKembo, raising his walking stick and drawing the figure one in the air, said: \"Here it is.\"\n\nMumon's Comment:\nA monk once asked Ummon: \"What is the teaching of the whole lifetime of Buddha?\" Ummon answered: \"An appropriate statement.\"\n\nMumon's Verse:\nBefore a step is taken, the goal is reached.\nBefore the tongue is moved, the speech is finished.\nMore than ahead of each move,\nThe source is right before your eyes.",d:"Een monnik vroeg Kembo: \"Alle Boeddha's van de tien werelden betreden de ene weg van Nirvana. Waar begint die weg?\"\n\nKembo hief zijn wandelstok op, tekende het cijfer één in de lucht en zei: \"Hier is het.\"\n\nMumons commentaar:\nEen monnik vroeg eens aan Ummon: \"Wat is de leer van het hele leven van Boeddha?\" Ummon antwoordde: \"Een passende uitspraak.\"\n\nMumons vers:\nVoordat een stap is gezet, is het doel bereikt.\nVoordat de tong beweegt, is de toespraak af.\nMeer dan voor elke zet,\nDe bron is recht voor je ogen.",t:["verlichting","eenvoud"],m:2}

// State
let coll=localStorage.getItem('z-coll')||'stories';
let isNL=localStorage.getItem('z-nl')!=='0';
// Per-collection storage (stories=existing keys for backward compat)
const CK={stories:['z-rd','z-us','z-bm','z-dt','z-sp'],
           koans:['z-rd-k','z-us-k','z-bm-k','z-dt-k','z-sp-k']};
function loadColl(c){const k=CK[c];return{
  rd:new Set(JSON.parse(localStorage.getItem(k[0])||'[]')),
  us:new Set(JSON.parse(localStorage.getItem(k[1])||'[]')),
  bm:new Set(JSON.parse(localStorage.getItem(k[2])||'[]')),
  dt:JSON.parse(localStorage.getItem(k[3])||'{}'),
  sp:JSON.parse(localStorage.getItem(k[4])||'{}')}}
let cs=loadColl(coll);
let rdSet=cs.rd,usSet=cs.us,bmSet=cs.bm,dates=cs.dt,scrollPos=cs.sp;
let tagF='all',q='',cur=null,readTimer=null;
function src(){return coll==='koans'?K:S}
function total(){return coll==='koans'?48:101}

const $=id=>document.getElementById(id);
const save=()=>{const k=CK[coll];
  localStorage.setItem(k[0],JSON.stringify([...rdSet]));
  localStorage.setItem(k[1],JSON.stringify([...usSet]));
  localStorage.setItem(k[2],JSON.stringify([...bmSet]));
  localStorage.setItem(k[3],JSON.stringify(dates));
  localStorage.setItem(k[4],JSON.stringify(scrollPos));
  localStorage.setItem('z-nl',isNL?'1':'0')};
const t2h=t=>t.split('\n\n').map(p=>`<p>${p.replace(/\n/g,'<br>')}</p>`).join('');
const today=()=>new Date().toLocaleDateString('nl-NL',{day:'numeric',month:'short',year:'numeric'});
const fmtDate=d=>d||'';

// Progress

function updLang(){$('navLangBtn').textContent=isNL?'NL':'EN';}

// Mark as read
function markRead(n){
  if(rdSet.has(n))return;
  rdSet.add(n);
  if(!dates[n])dates[n]={};
  dates[n].read=today();
  save();
  // Trigger ensō draw
  const cer=document.querySelector('.r-ceremony');
  if(cer)cer.classList.add('enso-draw');
  
}

// Mark as used
function markUsed(n){
  if(!rdSet.has(n))markRead(n);
  usSet.add(n);
  if(!dates[n])dates[n]={};
  dates[n].used=today();
  save();
  const cer=document.querySelector('.r-ceremony');
  if(cer){
    cer.classList.add('enso-used');
    const rip=cer.querySelector('.enso-ripple');
    if(rip){rip.classList.remove('pop');void rip.offsetWidth;rip.classList.add('pop')}
    // Update used label
    const ul=cer.querySelector('.enso-used-label');
    if(ul)ul.textContent='Voorgedragen · '+today();
  }
  render();
}

// Render list
function render(){
  let items=[...src()];
  if(q){const ql=q.toLowerCase();items=items.filter(s=>
    s.en.toLowerCase().includes(ql)||s.nl.toLowerCase().includes(ql)||
    s.e.toLowerCase().includes(ql)||s.d.toLowerCase().includes(ql)||
    String(s.n).includes(ql)||s.t.some(t=>(TL[t]||t).toLowerCase().includes(ql)))}
  if(tagF==='unread')items=items.filter(s=>!rdSet.has(s.n));
  else if(tagF==='bookmarked')items=items.filter(s=>bmSet.has(s.n));
  else if(tagF==='used')items=items.filter(s=>usSet.has(s.n));
  else if(tagF!=='all')items=items.filter(s=>s.t.includes(tagF));

  const el=$('list');
  if(!items.length){el.innerHTML=`<div class="empty"><div class="empty-ico">🍃</div><div class="empty-t">Geen ${coll==='koans'?'koans':'verhalen'} gevonden</div></div>`;return}

  el.innerHTML=items.map(s=>{
    const title=isNL?s.nl:s.en, sub=isNL?s.en:s.nl;
    const isRead=rdSet.has(s.n), isUsed=usSet.has(s.n), isBm=bmSet.has(s.n);
    const dt=dates[s.n];
    return`<div class="card${isRead?' read':''}${isUsed?' used':''}${isBm?' bm':''}" data-n="${s.n}">
      <div class="card-bar"></div>
      <div class="card-inner">
        <div class="card-n">${s.n}</div>
        <div class="card-txt">
          <div class="card-h">${title}</div>
          <div class="card-h2">${sub}</div>
          <div class="card-row">
            ${s.t.map(t=>`<span class="card-tg">${TL[t]||t}</span>`).join('')}
            <span class="card-min">${s.m} min</span>
          </div>
        </div>
      </div>
      <span class="card-star">★</span>
      <div class="card-end"><span class="card-chev">›</span></div>
    </div>`}).join('');
  
}

// Open story
function openStory(n){
  const s=src().find(x=>x.n===n);if(!s)return;

  // Save scroll of previous story
  if(cur){scrollPos[cur.n]=$('rPage1').scrollTop;save()}

  cur=s;
  clearTimeout(readTimer);
  $('rScroll').scrollLeft=0;

  const title=isNL?s.nl:s.en, sub=isNL?s.en:s.nl;
  const mainText=isNL?s.d:s.e, altText=isNL?s.e:s.d;
  const altLabel=isNL?'English (origineel)':'Nederlandse vertaling';
  const isRead=rdSet.has(s.n), isUsed=usSet.has(s.n);
  const dt=dates[s.n]||{};

  $('rT').textContent=`${s.n}. ${title}`;
  $('rBm').textContent=bmSet.has(s.n)?'★':'☆';
  $('rLang').textContent=isNL?'NL':'EN';

  $('rBody').innerHTML=`
    <div class="r-hero">

// ═══ OVERSCROLL DETECTION ═══
let osTouchY=0,osAtBottom=false,osTriggered=false,osHandlers={},osHandlers2={};
function isAtBottom(el){return el.scrollTop+el.clientHeight>=el.scrollHeight-5}
function addOverscroll(el,story){
  const onTouchStart=e=>{osTouchY=e.touches[0].clientY;osAtBottom=isAtBottom(el)};
  const onTouchMove=e=>{
    if(osTriggered)return;
    if(!osAtBottom){osAtBottom=isAtBottom(el);osTouchY=e.touches[0].clientY;return}
    if(!isAtBottom(el)){osAtBottom=false;return}
    const pull=osTouchY-e.touches[0].clientY;
    if(pull>80){osTriggered=true;triggerSumiE(story)}
  };
  el.addEventListener('touchstart',onTouchStart,{passive:true});
  el.addEventListener('touchmove',onTouchMove,{passive:true});
  return{el,ts:onTouchStart,tm:onTouchMove};
}
function setupOverscroll(story){
  if(rdSet.has(story.n)&&usSet.has(story.n))return;
  osTriggered=false;
  osHandlers=addOverscroll($('rPage1'),story);
  if(story.ess)osHandlers2=addOverscroll($('rPage2'),story);
}
function teardownOverscroll(){
  [osHandlers,osHandlers2].forEach(h=>{
    if(h.el){h.el.removeEventListener('touchstart',h.ts);h.el.removeEventListener('touchmove',h.tm)}
  });
  osHandlers={};osHandlers2={};
}

// ═══ ENSŌ CEREMONY ═══
let sumiStory=null,sumiTimers=[],sumiConfirmed=false,sumiReversing=false;

function triggerSumiE(story){
  sumiStory=story;sumiConfirmed=false;sumiReversing=false;
  sumiTimers.forEach(clearTimeout);sumiTimers=[];

  const overlay=$('sumiOverlay');
  overlay.classList.remove('reversing');
  overlay.classList.add('active');
  if(navigator.vibrate)navigator.vibrate([10,40,10]);

  // Reset all ensō elements
  document.querySelectorAll('.enso-stroke,.enso-gold').forEach(el=>{
    el.classList.remove('draw','reverse');
    el.style.strokeDashoffset=el.style.getPropertyValue('--len')||
      getComputedStyle(el).getPropertyValue('--len');
  });

  // === ENSŌ DRAW — all layers start together, CSS --dur handles stagger ===
  const strokes=document.querySelectorAll('.enso-stroke');
  const golds=document.querySelectorAll('.enso-gold');

  let t=100;
  // All stroke layers draw simultaneously (CSS --dur creates natural stagger)
  strokes.forEach(el=>{
    sumiTimers.push(setTimeout(()=>{el.classList.add('draw')},t));
  });

  // Gold shimmer — after ink dries
  t=3200;
  golds.forEach(el=>{
    sumiTimers.push(setTimeout(()=>{el.classList.add('draw')},t));
  });


  // ═══ ENLIGHTENMENT BURST ═══
  sumiTimers.push(setTimeout(()=>{
    if(sumiReversing)return;
    // Flash the ensō
    document.querySelector('.sumi-svg').classList.add('enlighten');
    $('sumiHalo').classList.add('glow');
    if(navigator.vibrate)navigator.vibrate([5,30,10,30,5]);
    // Radial particle burst from ensō center
    burstEnlightenment();
  },3600));

  // Labels
  t=3800;
  sumiTimers.push(setTimeout(()=>{
    $('sumiLabel').classList.add('show');
    $('sumiDate').classList.add('show');
  },t));

  // Start sparkles (delayed to match the ensō drawing)
  sumiTimers.push(setTimeout(()=>startSparkles(),1500));

  // Labels
  $('sumiLabel').textContent='Voorgedragen';
  $('sumiDate').textContent=fmtDate(today());
  $('sumiLabel').classList.remove('show');
  $('sumiDate').classList.remove('show');

  // Confirm after full animation
  const confirmTime=4500;
  sumiTimers.push(setTimeout(()=>{
    if(!sumiReversing){
      sumiConfirmed=true;
      markRead(story.n);markUsed(story.n);
    }
  },confirmTime));

  // Auto-dismiss after enjoying
  sumiTimers.push(setTimeout(()=>{if(!sumiReversing)dismissSumiE()},confirmTime+2500));

  // Listen for reverse-scroll (scroll up = cancel)
  setupSumiReverse();
}

function setupSumiReverse(){
  let ry=0;
  const onTs=e=>{ry=e.touches[0].clientY};
  const onTm=e=>{
    if(sumiConfirmed||sumiReversing)return;
    const dy=e.touches[0].clientY-ry;
    if(dy>60){// scrolling up — user wants to cancel!
      sumiReversing=true;
      reverseSumiE();
    }
  };
  const overlay=$('sumiOverlay');
  overlay.addEventListener('touchstart',onTs,{passive:true});
  overlay.addEventListener('touchmove',onTm,{passive:true});
  // Store for cleanup
  overlay._rTs=onTs;overlay._rTm=onTm;
}

function reverseSumiE(){
  sumiTimers.forEach(clearTimeout);sumiTimers=[];
  stopSparkles();
  document.querySelector('.sumi-svg').classList.remove('enlighten');
  $('sumiHalo').classList.remove('glow');
  if(navigator.vibrate)navigator.vibrate([5,20,5]);

  // Reverse all — fast retract
  document.querySelectorAll('.enso-stroke,.enso-gold').forEach(el=>{
    el.classList.remove('draw');
    el.classList.add('reverse');
  });
  $('sumiLabel').classList.remove('show');
  $('sumiDate').classList.remove('show');

  const overlay=$('sumiOverlay');
  overlay.classList.add('reversing');
  setTimeout(()=>{
    overlay.classList.remove('active','reversing');
    cleanupSumiReverse();
    osTriggered=false;
    sumiReversing=false;
  },600);
}

function dismissSumiE(){
  sumiTimers.forEach(clearTimeout);sumiTimers=[];
  stopSparkles();
  document.querySelector('.sumi-svg').classList.remove('enlighten');
  $('sumiHalo').classList.remove('glow');
  const overlay=$('sumiOverlay');
  cleanupSumiReverse();
  overlay.classList.remove('active');
  // Reset all elements
  document.querySelectorAll('.enso-stroke,.enso-gold').forEach(el=>{
    el.classList.remove('draw','reverse');
  });
  $('sumiLabel').classList.remove('show');
  $('sumiDate').classList.remove('show');
  closeReader();
}

function cleanupSumiReverse(){
  const o=$('sumiOverlay');
  if(o._rTs){o.removeEventListener('touchstart',o._rTs);delete o._rTs}
  if(o._rTm){o.removeEventListener('touchmove',o._rTm);delete o._rTm}
}

// ═══ SPARKLE PARTICLES ═══
let sparkleAnim=0;
function startSparkles(){
  const c=$('sparkleCanvas');
  c.width=window.innerWidth*2;c.height=window.innerHeight*2;
  c.style.width=window.innerWidth+'px';c.style.height=window.innerHeight+'px';
  const ctx=c.getContext('2d');
  ctx.scale(2,2);
  const W=window.innerWidth,H=window.innerHeight;
  const particles=[];
  const colors=['#F0DEB8','#C9A96E','#E8D5B0','#fff','#D4B896'];
  for(let i=0;i<80;i++){
    particles.push({
      x:Math.random()*W,y:H+Math.random()*200,
      vx:(Math.random()-.5)*.6,vy:-(1+Math.random()*2.5),
      size:.8+Math.random()*2.5,
      color:colors[Math.floor(Math.random()*colors.length)],
      alpha:0,life:0,maxLife:150+Math.random()*200,
      twinkle:Math.random()*Math.PI*2,
      drift:Math.random()*Math.PI*2
    });
  }
  function frame(){
    ctx.clearRect(0,0,W,H);
    particles.forEach(p=>{
      p.x+=p.vx+Math.sin(p.drift+p.life*.015)*.4;
      p.y+=p.vy;
      p.life++;
      if(p.life<40)p.alpha=Math.min(.9,p.life/40);
      else if(p.life>p.maxLife-50)p.alpha=Math.max(0,p.alpha-.02);
      p.twinkle+=.1;
      const tw=.4+.6*Math.sin(p.twinkle);
      ctx.globalAlpha=p.alpha*tw;
      ctx.fillStyle=p.color;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
      ctx.fill();
      if(p.life>p.maxLife){p.y=H+30;p.x=Math.random()*W;p.life=0;p.alpha=0}
    });
    sparkleAnim=requestAnimationFrame(frame);
  }
  frame();
}
function stopSparkles(){cancelAnimationFrame(sparkleAnim)}


function burstEnlightenment(){
  const c=$('sparkleCanvas');if(!c)return;
  const ctx=c.getContext('2d');
  const W=window.innerWidth,H=window.innerHeight;
  // Center of ensō on screen (roughly 45% from top, centered)
  const cx=W/2,cy=H*.42;
  const pts=[];
  const n=80;
  for(let i=0;i<n;i++){
    const angle=(Math.PI*2)*(i/n)+((Math.random()-.5)*.3);
    const speed=3+Math.random()*8;
    pts.push({
      x:cx+(Math.random()-.5)*30,
      y:cy+(Math.random()-.5)*30,
      vx:Math.cos(angle)*speed,
      vy:Math.sin(angle)*speed,
      r:1+Math.random()*3,
      life:1+Math.random()*1.5,
      maxLife:1+Math.random()*1.5,
      spark:Math.random()>.4,
      ring:i<12 // first 12 form a ring
    });
  }
  let last=0;
  function draw(t){
    const dt=last?Math.min((t-last)/1000,.05):.016;
    last=t;
    // Don't clear — draw on top of existing sparkles
    pts.forEach(p=>{
      p.life-=dt;if(p.life<=0)return;
      p.x+=p.vx;p.y+=p.vy;
      p.vx*=.97;p.vy*=.97;
      const a=p.life/p.maxLife;
      const al=a*a;
      if(p.spark){
        ctx.fillStyle='rgba(255,245,220,'+Math.min(al*1.3,1)+')';
        ctx.shadowColor='rgba(255,220,150,'+(al*.9)+')';
        ctx.shadowBlur=p.r*10;
      } else {
        ctx.fillStyle='rgba(232,213,176,'+(al*.9)+')';
        ctx.shadowColor='rgba(201,169,110,'+(al*.7)+')';
        ctx.shadowBlur=p.r*6;
      }
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r*(a*.4+.6),0,Math.PI*2);
      ctx.fill();
      ctx.shadowBlur=0;
      // Ring particles get a connecting line
      if(p.ring&&al>.3){
        ctx.strokeStyle='rgba(255,230,150,'+(al*.15)+')';
        ctx.lineWidth=.5;
        ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(p.x,p.y);ctx.stroke();
      }
    });
    if(pts.some(p=>p.life>0))requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
}

// ═══ SWIPE TRANSITION FX ═══
(function(){
  const canvas=$('swipeFx');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  let W=0,H=0,animId=null,particles=[],lastProg=-1,lastBurstProg=-1;

  function resize(){
    W=window.innerWidth;H=window.innerHeight;
    canvas.width=W*dpr;canvas.height=H*dpr;
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  resize();
  window.addEventListener('resize',resize);

  // === PARTICLE SPAWNERS ===
  function spawnBurst(x,dir){
    const n=65;
    for(let i=0;i<n;i++){
      const spread=Math.PI*1.1;
      const angle=spread*(i/n-.5)+(dir>0?0:Math.PI);
      const speed=1.5+Math.random()*6;
      const life=.8+Math.random()*1.2;
      particles.push({
        x:x+(Math.random()-.5)*20,y:H*.05+Math.random()*H*.9,
        vx:Math.cos(angle)*speed*dir,
        vy:Math.sin(angle)*speed+(Math.random()-.5)*2.5,
        r:Math.random()*3+1.2,
        life:life,maxLife:life,
        gold:Math.random()>.15,
        spark:Math.random()>.6
      });
    }
  }

  // Trailing particles during active scroll
  function spawnTrail(edgeX,velocity){
    const n=5;
    for(let i=0;i<n;i++){
      particles.push({
        x:edgeX+((Math.random()-.5)*60),
        y:Math.random()*H,
        vx:velocity*2.5+(Math.random()-.5)*2,
        vy:(Math.random()-.5)*2.5,
        r:Math.random()*2+.8,
        life:.5+Math.random()*.6,
        maxLife:.5+Math.random()*.6,
        gold:true,spark:Math.random()>.7
      });
    }
  }

  // Edge shimmer sparkles
  function spawnShimmer(edgeX,intensity){
    if(Math.random()>.5)return;
    const n=3;
    for(let i=0;i<n;i++){
      particles.push({
        x:edgeX+(Math.random()-.5)*8,
        y:Math.random()*H,
        vx:(Math.random()-.5)*.5,
        vy:(Math.random()-.5)*.5,
        r:Math.random()*1+.5,
        life:.15+Math.random()*.2,
        maxLife:.15+Math.random()*.2,
        gold:true,spark:true
      });
    }
  }

  // === EDGE GLOW — DRAMATIC ===
  function drawGlow(prog){
    const intensity=1-Math.abs(prog*2-1);
    if(intensity<.01)return;
    const isDark=window.matchMedia('(prefers-color-scheme:dark)').matches;
    const edgeX=W*(1-prog);
    const gw=180; // wide glow

    // Outer glow — warm wash
    const g1=ctx.createLinearGradient(edgeX-gw,0,edgeX+gw,0);
    if(isDark){
      g1.addColorStop(0,'rgba(201,169,110,0)');
      g1.addColorStop(.3,'rgba(201,169,110,'+(intensity*.2)+')');
      g1.addColorStop(.5,'rgba(255,220,150,'+(intensity*.5)+')');
      g1.addColorStop(.7,'rgba(201,169,110,'+(intensity*.2)+')');
      g1.addColorStop(1,'rgba(201,169,110,0)');
    } else {
      g1.addColorStop(0,'rgba(139,111,71,0)');
      g1.addColorStop(.3,'rgba(139,111,71,'+(intensity*.12)+')');
      g1.addColorStop(.5,'rgba(201,169,110,'+(intensity*.35)+')');
      g1.addColorStop(.7,'rgba(139,111,71,'+(intensity*.12)+')');
      g1.addColorStop(1,'rgba(139,111,71,0)');
    }
    ctx.fillStyle=g1;
    ctx.fillRect(edgeX-gw,0,gw*2,H);

    // Inner bright line
    const g2=ctx.createLinearGradient(edgeX-4,0,edgeX+4,0);
    const la=intensity*.7;
    if(isDark){
      g2.addColorStop(0,'rgba(255,230,170,0)');
      g2.addColorStop(.3,'rgba(255,230,170,'+(la*.5)+')');
      g2.addColorStop(.5,'rgba(255,240,200,'+la+')');
      g2.addColorStop(.7,'rgba(255,230,170,'+(la*.5)+')');
      g2.addColorStop(1,'rgba(255,230,170,0)');
    } else {
      g2.addColorStop(0,'rgba(201,169,110,0)');
      g2.addColorStop(.3,'rgba(201,169,110,'+(la*.4)+')');
      g2.addColorStop(.5,'rgba(220,190,130,'+la+')');
      g2.addColorStop(.7,'rgba(201,169,110,'+(la*.4)+')');
      g2.addColorStop(1,'rgba(201,169,110,0)');
    }
    ctx.fillStyle=g2;
    ctx.fillRect(edgeX-4,0,8,H);

    // Screen-edge fade (top/bottom)
    const vf=ctx.createLinearGradient(0,0,0,H);
    vf.addColorStop(0,'rgba(0,0,0,0)');
    vf.addColorStop(.08,'rgba(0,0,0,1)');
    vf.addColorStop(.92,'rgba(0,0,0,1)');
    vf.addColorStop(1,'rgba(0,0,0,0)');
    ctx.globalCompositeOperation='destination-in';
    ctx.fillStyle=vf;
    ctx.fillRect(0,0,W,H);
    ctx.globalCompositeOperation='source-over';
  }

  // === PARTICLES RENDERER ===
  function drawParticles(dt){
    const isDark=window.matchMedia('(prefers-color-scheme:dark)').matches;
    particles=particles.filter(p=>{
      p.life-=dt;
      if(p.life<=0)return false;
      p.x+=p.vx;p.y+=p.vy;
      p.vx*=.98;p.vy*=.98;
      const a=p.life/p.maxLife;
      const alpha=a*a;

      if(p.spark){
        // Bright white-gold spark
        const sa=alpha*1.2;
        ctx.fillStyle=isDark
          ?'rgba(255,245,220,'+Math.min(sa,1)+')'
          :'rgba(220,190,120,'+Math.min(sa,.8)+')';
        ctx.shadowColor=isDark
          ?'rgba(255,220,150,'+(sa*.8)+')'
          :'rgba(201,169,110,'+(sa*.6)+')';
        ctx.shadowBlur=p.r*8;
      } else if(p.gold){
        ctx.fillStyle=isDark
          ?'rgba(232,213,176,'+(alpha*.8)+')'
          :'rgba(201,169,110,'+(alpha*.6)+')';
        ctx.shadowColor=isDark
          ?'rgba(201,169,110,'+(alpha*.6)+')'
          :'rgba(139,111,71,'+(alpha*.4)+')';
        ctx.shadowBlur=p.r*6;
      } else {
        ctx.fillStyle=isDark
          ?'rgba(255,255,255,'+(alpha*.35)+')'
          :'rgba(139,111,71,'+(alpha*.3)+')';
        ctx.shadowBlur=0;
      }
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r*(a*.5+.5),0,Math.PI*2);
      ctx.fill();
      ctx.shadowBlur=0;
      return true;
    });
  }

  // === MAIN LOOP ===
  let lastTime=0,scrollTimer=null,trailTimer=0;

  function animate(t){
    const dt=lastTime?Math.min((t-lastTime)/1000,.05):0.016;
    lastTime=t;
    ctx.clearRect(0,0,W,H);

    const rs=$('rScroll');
    if(!rs||!rs.scrollWidth){animId=null;return}
    const maxScroll=rs.scrollWidth-rs.offsetWidth;
    if(maxScroll<=0){animId=null;return}
    const prog=rs.scrollLeft/maxScroll;
    const velocity=lastProg>=0?(prog-lastProg)/dt:0;

    // Edge glow
    drawGlow(prog);

    // Burst at midpoint crossing — BOTH directions
    const mid=.5;
    if(lastProg>=0){
      const crossedForward=lastProg<mid&&prog>=mid;
      const crossedBack=lastProg>mid&&prog<=mid;
      if(crossedForward){spawnBurst(W*.5,1)}
      if(crossedBack){spawnBurst(W*.5,-1)}
    }

    // Continuous trailing particles during scroll
    const edgeX=W*(1-prog);
    const absVel=Math.abs(velocity);
    trailTimer+=dt;
    if(absVel>.15&&trailTimer>.025){
      spawnTrail(edgeX,velocity>0?-1:1);
      trailTimer=0;
    }

    // Edge shimmer when near middle
    const midDist=Math.abs(prog-.5);
    if(midDist<.3){
      spawnShimmer(edgeX,1-midDist/.3);
    }

    lastProg=prog;
    drawParticles(dt);

    // Keep running while moving or particles alive
    const moving=Math.abs(prog*2-1)<.95;
    if(moving||particles.length>0){
      canvas.classList.add('active');
      animId=requestAnimationFrame(animate);
    } else {
      canvas.classList.remove('active');
      animId=null;
      lastProg=-1;
    }
  }

  function startAnim(){
    if(!animId){lastTime=0;animId=requestAnimationFrame(animate)}
  }

  const rs=$('rScroll');
  if(rs){
    rs.addEventListener('scroll',()=>{
      startAnim();
    },{passive:true});
  }
})();


// Register SW with cache-busting
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js?v=8').catch(()=>{})}
</script>
</body>
</html>
