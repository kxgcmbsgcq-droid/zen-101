{"n":84,"en":"True Friends","nl":"Ware vrienden","e":"A long time ago in China there were two friends, one who played the harp skillfully and one who listened skillfully.\n\nWhen the one played or sang about a mountain, the other would say: \"I can see the mountain before us.\"\n\nWhen the other played about water, the listener would exclaim: \"Here is the running stream!\"\n\nBut the listener fell sick and died. The first friend cut the strings of his harp and never played again. Since that time the cutting of harp strings has always been a sign of intimate friendship.","d":"Lang geleden in China waren er twee vrienden, de een speelde bekwaam harp en de ander luisterde bekwaam.\n\nWanneer de een speelde of zong over een berg, zei de ander: \"Ik kan de berg voor ons zien.\"\n\nWanneer de ander over water speelde, riep de luisteraar uit: \"Hier is de stromende beek!\"\n\nMaar de luisteraar werd ziek en stierf. De eerste vriend sneed de snaren van zijn harp door en speelde nooit meer. Sindsdien is het doorsnijden van harpsnaren altijd een teken van innige vriendschap geweest.","t":["compassie","kunst"],"m":1,"ess":"Twee vrienden: één speelde harp, de ander luisterde. Bij bergmuziek zag de luisteraar bergen. Bij watermuziek hoorde hij de stroom. Toen de luisteraar stierf, sneed de speler zijn snaren door en speelde nooit meer.\n\nHet snijden van de snaren is geen wanhoop maar eer. De muzikant begreep dat zijn kunst niet in zijn vingers zat maar in de verbinding met die ene luisteraar. Zonder iemand die werkelijk hoort, is muziek geluid. Dit verhaal gaat niet over verlies maar over de zeldzaamheid van echt begrepen worden — en de eerlijkheid om toe te geven dat sommige dingen niet herhaalbaar zijn."},
{"n":85,"en":"Time to Die","nl":"Tijd om te sterven","e":"Ikkyu, the Zen master, was very clever even as a boy. His teacher had a precious tea cup, a rare antique. Ikkyu happened to break this cup and was greatly perplexed. Hearing the footsteps of his teacher, he held the pieces of the cup behind him. When the master appeared, Ikkyu asked, \"Why do people have to die?\"\n\n\"This is natural,\" explained the older man. \"Everything has to die, and has just so long to live.\"\n\nIkkyu, producing the shattered cup, added, \"It was time for your cup to die.\"","d":"Ikkyu, de zen-meester, was al als jongen erg slim. Zijn leraar had een kostbaar theekopje, een zeldzame antiquiteit. Ikkyu brak toevallig dit kopje en was zeer in verlegenheid gebracht. De voetstappen van zijn leraar horend, hield hij de stukken van het kopje achter zich. Toen de meester verscheen, vroeg Ikkyu: \"Waarom moeten mensen sterven?\"\n\n\"Dat is natuurlijk,\" legde de oudere man uit. \"Alles moet sterven en heeft slechts een bepaalde tijd te leven.\"\n\nIkkyu, het gebroken kopje tevoorschijn halend, voegde toe: \"Het was tijd voor uw kopje om te sterven.\"","t":["dood","humor"],"m":1,"ess":"Ikkyu brak de dure antieke theekom van zijn meester. Toen hij voetstappen hoorde, verstopte hij de scherven achter zijn rug en vroeg: 'Waarom moeten mensen sterven?' 'Alles heeft zijn tijd,' zei de meester. 'Het was tijd voor uw theekom,' zei Ikkyu.\n\nEen kind van tien gebruikte de eigen leer van de meester om zijn fout op te vangen — niet als excuus maar als toepassing. Als alles zijn tijd heeft, geldt dat ook voor theekommen. De humor verbergt een echte wijsheid: vergankelijkheid is geen abstract concept maar ook van toepassing op de dingen waar je aan gehecht bent."},
{"n":86,"en":"The Living Buddha and the Tubmaker","nl":"De levende Boeddha en de kuiper","e":"Zen masters give personal guidance in a secluded room. No one enters while the teacher and pupil are together.\n\nMoku-Rai, the Zen master of Ken-Nin temple in Kyoto, used to enjoy talking with merchants and newspaper men as well as his pupils. A certain tubmaker also came to see him. The tubmaker was almost illiterate. He would ask foolish questions of Moku-Rai, have tea, and then go away.\n\nOne day while the tubmaker was there Moku-Rai wished to give personal guidance to a disciple, so he asked the tubmaker to wait in another room.\n\n\"I understand you are a living Buddha,\" the man protested. \"Even the stone Buddhas in the temple never refuse the numerous persons who come together before them. Why then should I be excluded?\"\n\nMoku-Rai had to go outside to see his disciple.","d":"Zen-meesters geven persoonlijke begeleiding in een afgezonderde kamer. Niemand komt binnen terwijl de leraar en leerling samen zijn.\n\nMoku-Rai, de zen-meester van de Ken-Nin-tempel in Kyoto, genoot ervan om te praten met kooplieden en krantenmensen, evenals met zijn leerlingen. Een zekere kuiper kwam hem ook bezoeken. De kuiper was bijna analfabeet. Hij stelde dwaze vragen aan Moku-Rai, dronk thee en ging dan weer weg.\n\nOp een dag, terwijl de kuiper er was, wilde Moku-Rai persoonlijke begeleiding geven aan een leerling, dus vroeg hij de kuiper in een andere kamer te wachten.\n\n\"Ik begrijp dat u een levende Boeddha bent,\" protesteerde de man. \"Zelfs de stenen Boeddha's in de tempel weigeren nooit de talrijke personen die samen voor hen komen. Waarom zou ik dan buitengesloten worden?\"\n\nMoku-Rai moest naar buiten gaan om zijn leerling te zien.","t":["humor","meester"],"m":1,"ess":"De kuipenmaker — bijna analfabeet — kwam bij Moku-Rai voor thee en domme vragen. Toen Moku-Rai hem vroeg te wachten voor een privéles, protesteerde hij: 'Zelfs de stenen Boeddha's weigeren niemand.'\n\nMoku-Rai moest naar buiten om zijn leerling les te geven. De kuipenmaker won het debat zonder het te weten. Zijn argument was onweerlegbaar omdat het puur was — geen filosofie maar gezond verstand. Soms begrijpt de eenvoudigste geest wat de geleerde mist: exclusiviteit en verlichting gaan niet samen."},
{"n":87,"en":"Three Kinds of Disciples","nl":"Drie soorten leerlingen","e":"A Zen master named Gettan lived in the latter part of the Tokugawa era. He used to say, \"There are three kinds of disciples: those who impart Zen to others, those who maintain the temples and shrines, and then there are the rice-bags and the clothes hangers.\"\n\nGa-San expressed the same idea. When he was studying under Teki-Sui, his teacher was very severe. Sometimes he even beat him. Other pupils would not stand this kind of teaching, and quit. Ga-San remained, saying, \"A poor disciple utilizes a teacher's influence. A fair disciple admires a teacher's kindness. A good disciple grows strong under a teacher's discipline.\"","d":"Een zen-meester genaamd Gettan leefde in het laatste deel van het Tokugawa-tijdperk. Hij placht te zeggen: \"Er zijn drie soorten leerlingen: zij die Zen aan anderen overdragen, zij die de tempels en heiligdommen onderhouden, en dan zijn er de rijstzakken en de klerenhaken.\"\n\nGa-San drukte hetzelfde idee uit. Toen hij studeerde onder Teki-Sui was zijn leraar zeer streng. Soms sloeg hij hem zelfs. Andere leerlingen verdroegen dit soort onderwijs niet en vertrokken. Ga-San bleef en zei: \"Een slechte leerling gebruikt de invloed van een leraar. Een matige leerling bewondert de vriendelijkheid van een leraar. Een goede leerling wordt sterk onder de discipline van een leraar.\"","t":["meester","kracht"],"m":1,"ess":"Gettan zei: er zijn drie soorten leerlingen — zij die Zen doorgeven, zij die tempels onderhouden, en rijstzakken. Ga-San bleef bij zijn strenge leraar Teki-Sui terwijl anderen vertrokken, want 'een goede leerling groeit sterk onder discipline.'\n\nDe meeste mensen willen een leraar die aardig is. Maar aardige leraren produceren gemiddelde leerlingen. Wie kan verdragen wat pijn doet, groeit voorbij wat comfortabel is. Het onderscheid tussen de drie soorten is niet talent maar uithoudingsvermogen."},
{"n":88,"en":"How to Write a Chinese Poem","nl":"Hoe een Chinees gedicht te schrijven","e":"A well-known Japanese poet was asked how to compose a Chinese poem. \"The usual Chinese poem is four lines,\" he explained. \"The first line contains the initial phase, the second line, the continuation of that phase. The third line turns from this subject and begins a new one, and the fourth line brings the first three lines together. A popular Japanese song illustrates this.\"\n\nTwo daughters of a silk merchant live in Kyoto.\nThe elder is twenty, the younger, eighteen.\nA soldier may kill with his sword,\nBut these girls slay men with their eyes.","d":"Een bekende Japanse dichter werd gevraagd hoe men een Chinees gedicht schrijft. \"Het gebruikelijke Chinese gedicht heeft vier regels,\" legde hij uit. \"De eerste regel bevat de beginfase, de tweede regel de voortzetting van die fase. De derde regel wendt zich van dit onderwerp af en begint een nieuw, en de vierde regel brengt de eerste drie regels samen. Een populair Japans lied illustreert dit.\"\n\nTwee dochters van een zijdehandelaar wonen in Kyoto.\nDe oudste is twintig, de jongste achttien.\nEen soldaat mag doden met zijn zwaard,\nMaar deze meisjes verslaan mannen met hun ogen.","t":["kunst","humor"],"m":1,"ess":"Een dichter legde uit: een Chinees gedicht heeft vier regels — stelling, voortzetting, wending, samenvoeging. Het voorbeeld: twee mooie dochters, hun leeftijd, een soldaat die doodt met zijn zwaard — maar deze meisjes doden met hun ogen.\n\nDe wending is alles. Zonder de derde regel die het onverwachte brengt, is een gedicht een opsomming. Dit geldt voor poëzie, voor Zen, en voor het leven: de kracht zit niet in het voorspelbare begin maar in het moment dat alles kantelt."},
{"n":89,"en":"Zen Dialogue","nl":"Zen-dialoog","e":"Zen teachers train their young pupils to express themselves. Two Zen temples each had a child protégé. One child, going to obtain vegetables each morning, would meet the other on the way.\n\n\"Where are you going?\" asked the one.\n\n\"I am going wherever my feet go,\" the other responded.\n\nThis reply puzzled the first child who went to his teacher for help. \"Tomorrow morning,\" the teacher told him, \"when you meet that little fellow, ask him the same question. He will give you the same answer, and then you ask him: 'Suppose you have no feet, then where are you going?' That will fix him.\"\n\nThe children met again the following morning.\n\n\"Where are you going?\" asked the first child.\n\n\"I am going wherever the wind blows,\" answered the other.\n\nThis again nonplussed the youngster, who took his defeat to the teacher.\n\n\"Ask him where he is going if there is no wind,\" suggested the teacher.\n\nThe next day the children met a third time.\n\n\"Where are you going?\" asked the first child.\n\n\"I am going to the market to buy vegetables,\" the other replied.","d":"Zen-leraren trainen hun jonge leerlingen om zichzelf uit te drukken. Twee zen-tempels hadden elk een kind als protegé. Het ene kind, dat elke ochtend groenten ging halen, ontmoette het andere onderweg.\n\n\"Waar ga je heen?\" vroeg de een.\n\n\"Ik ga waar mijn voeten gaan,\" antwoordde de ander.\n\nDit antwoord verbaasde het eerste kind, dat naar zijn leraar ging voor hulp. \"Morgenochtend,\" vertelde de leraar hem, \"als je dat kereltje ontmoet, stel hem dezelfde vraag. Hij zal je hetzelfde antwoord geven, en dan vraag je hem: 'Stel dat je geen voeten hebt, waar ga je dan heen?' Dat zal hem de mond snoeren.\"\n\nDe kinderen ontmoetten elkaar weer de volgende ochtend.\n\n\"Waar ga je heen?\" vroeg het eerste kind.\n\n\"Ik ga waar de wind waait,\" antwoordde de ander.\n\nDit bracht de jongeling opnieuw in verlegenheid, die zijn nederlaag naar de leraar bracht.\n\n\"Vraag hem waar hij heen gaat als er geen wind is,\" stelde de leraar voor.\n\nDe volgende dag ontmoetten de kinderen elkaar voor de derde keer.\n\n\"Waar ga je heen?\" vroeg het eerste kind.\n\n\"Ik ga naar de markt om groenten te kopen,\" antwoordde de ander.","t":["humor","paradox"],"m":2,"ess":"Twee kinderen ontmoetten elkaar elke ochtend. 'Waar ga je heen?' 'Waar mijn voeten gaan.' Het eerste kind kreeg een weerwoord van zijn meester, maar de volgende dag antwoordde het andere kind: 'Waar de wind waait.' En daarna: 'Naar de markt, groenten kopen.'\n\nHet slimste antwoord was het laatste — het meest alledaagse. Elk filosofisch antwoord kan gekonterd worden, maar 'groenten kopen' is onweerlegbaar. Het kind dat elke dag een dieper antwoord gaf, arriveerde uiteindelijk bij de eenvoud. En de eenvoud won."},
{"n":90,"en":"The Last Rap","nl":"De laatste tik","e":"Tangen had studied with Sengai since childhood. When he was twenty he wanted to leave his teacher and visit others for comparative study, but Sengai would not permit this. Every time Tangen suggested it, Sengai would give him a rap on the head.\n\nFinally Tangen asked an elder brother to coax permission from Sengai. This the brother did and then reported to Tangen: \"It is arranged. I have fixed it for you to start on your pilgrimage at once.\"\n\nTangen went to Sengai to thank him for his permission. The master answered by giving him another rap.\n\nWhen Tangen related this to his elder brother the other said: \"What is the matter? Sengai has no business giving permission and then changing his mind. I will tell him so.\" And off he went to see the teacher.\n\n\"I did not cancel my permission,\" said Sengai. \"I just wished to give him one last smack over the head, for when he returns he will be enlightened and I will not be able to reprimand him again.\"","d":"Tangen had sinds zijn kindertijd bij Sengai gestudeerd. Toen hij twintig was, wilde hij zijn leraar verlaten en anderen bezoeken voor vergelijkende studie, maar Sengai stond dit niet toe. Elke keer dat Tangen het voorstelde, gaf Sengai hem een tik op het hoofd.\n\nUiteindelijk vroeg Tangen een oudere broeder om toestemming van Sengai los te peuteren. Dat deed de broeder en hij rapporteerde aan Tangen: \"Het is geregeld. Ik heb het voor je gefikst om meteen aan je pelgrimstocht te beginnen.\"\n\nTangen ging naar Sengai om hem te bedanken voor zijn toestemming. De meester antwoordde door hem weer een tik te geven.\n\nToen Tangen dit aan zijn oudere broeder vertelde, zei die: \"Wat is er aan de hand? Sengai kan niet zomaar toestemming geven en dan van gedachten veranderen. Ik zal het hem zeggen.\" En hij ging naar de leraar.\n\n\"Ik heb mijn toestemming niet ingetrokken,\" zei Sengai. \"Ik wilde hem alleen een laatste klap op het hoofd geven, want wanneer hij terugkeert zal hij verlicht zijn en kan ik hem niet meer berispen.\"","t":["meester","humor"],"m":2,"ess":"Sengai gaf Tangen jarenlang een klap op zijn hoofd bij elk verzoek om elders te studeren. Toen hij eindelijk toestemming gaf, sloeg hij hem nog één keer. 'Dit is de laatste, want als hij terugkomt is hij verlicht en kan ik hem niet meer slaan.'\n\nDe klappen waren geen straf maar geschenken — elke klap was een les die geen woorden nodig had. Sengai's laatste klap was een afscheid vol genegenheid. De meester die zijn leerling slaat zolang het nog kan, geeft hem iets dat de verlichte leerling niet meer kan ontvangen: correctie."},
{"n":91,"en":"The Taste of Banzo's Sword","nl":"De smaak van Banzo's zwaard","e":"Matajuro Yagyu was the son of a famous swordsman. His father, believing that his son's work was too mediocre to anticipate mastership, disowned him.\n\nSo Matajuro went to Mount Futara and there found the famous swordsman Banzo. But Banzo confirmed the father's judgment. \"You wish to learn swordsmanship under my guidance?\" asked Banzo. \"You cannot fulfill the requirements.\"\n\n\"But if I work hard, how many years will it take me to become a master?\" persisted the youth.\n\n\"The rest of your life,\" replied Banzo.\n\n\"I cannot wait that long,\" explained Matajuro. \"I am willing to pass through any hardship if only you will teach me. If I become your devoted servant, how long might it be?\"\n\n\"Oh, maybe ten years,\" Banzo relented.\n\n\"My father is getting old, and soon I must take care of him,\" continued Matajuro. \"If I work far more intensively, how long would it take me?\"\n\n\"Oh, maybe thirty years,\" said Banzo.\n\n\"Why is that?\" asked Matajuro. \"First you say ten and now thirty years. I will undergo any hardship to master this art in the shortest time!\"\n\n\"Well,\" said Banzo, \"in that case you will have to remain with me for seventy years. A man in such a hurry as you are to get results seldom learns quickly.\"\n\n\"Very well,\" declared the youth, understanding at last that he was being rebuked for impatience, \"I agree.\"\n\nMatajuro was told never to speak of fencing and never to touch a sword. He cooked for his master, washed the dishes, made his bed, cleaned the yard, cared for the garden, all without a word of swordsmanship.\n\nThree years passed. Still Matajuro labored on. Thinking of his future, he was sad. He had not even begun to learn the art to which he had devoted his life.\n\nBut one day Banzo crept up behind him and gave him a terrific blow with a wooden sword.\n\nThe following day, when Matajuro was cooking rice, Banzo again sprang upon him unexpectedly.\n\nAfter that, day and night, Matajuro had to defend himself from unexpected thrusts. Not a moment passed in any day that he did not have to think of the taste of Banzo's sword.\n\nHe learned so rapidly he brought smiles to the face of his master. Matajuro became the greatest swordsman in the land.","d":"Matajuro Yagyu was de zoon van een beroemde zwaardvechter. Zijn vader, die geloofde dat het werk van zijn zoon te middelmatig was om meesterschap te verwachten, verstiet hem.\n\nDus ging Matajuro naar de berg Futara en vond daar de beroemde zwaardvechter Banzo. Maar Banzo bevestigde het oordeel van de vader. \"Je wilt zwaardvechten leren onder mijn begeleiding?\" vroeg Banzo. \"Je kunt niet aan de eisen voldoen.\"\n\n\"Maar als ik hard werk, hoeveel jaar kost het me dan om een meester te worden?\" drong de jongeman aan.\n\n\"De rest van je leven,\" antwoordde Banzo.\n\n\"Zo lang kan ik niet wachten,\" legde Matajuro uit. \"Ik ben bereid elke ontbering te doorstaan als u me maar wilt onderwijzen. Als ik uw toegewijde dienaar word, hoe lang zou het dan kunnen duren?\"\n\n\"Oh, misschien tien jaar,\" gaf Banzo toe.\n\n\"Mijn vader wordt oud en binnenkort moet ik voor hem zorgen,\" ging Matajuro verder. \"Als ik veel intensiever werk, hoe lang zou het dan duren?\"\n\n\"Oh, misschien dertig jaar,\" zei Banzo.\n\n\"Hoe kan dat?\" vroeg Matajuro. \"Eerst zegt u tien en nu dertig jaar. Ik zal elke ontbering ondergaan om deze kunst in de kortste tijd te beheersen!\"\n\n\"Welnu,\" zei Banzo, \"in dat geval zul je zeventig jaar bij mij moeten blijven. Een man die zo'n haast heeft als jij om resultaten te bereiken, leert zelden snel.\"\n\n\"Goed dan,\" verklaarde de jongeman, eindelijk begrijpend dat hij werd berispt voor zijn ongeduld, \"ik ga akkoord.\"\n\nMatajuro kreeg te horen nooit over schermen te spreken en nooit een zwaard aan te raken. Hij kookte voor zijn meester, waste de vaat, maakte zijn bed op, veegde het erf, verzorgde de tuin, alles zonder een woord over zwaardvechten.\n\nDrie jaar gingen voorbij. Nog steeds werkte Matajuro door. Denkend aan zijn toekomst was hij bedroefd. Hij was nog niet eens begonnen de kunst te leren waaraan hij zijn leven had gewijd.\n\nMaar op een dag sloop Banzo achter hem en gaf hem een geweldige klap met een houten zwaard.\n\nDe volgende dag, toen Matajuro rijst kookte, sprong Banzo opnieuw onverwachts op hem af.\n\nDaarna moest Matajuro zich dag en nacht verdedigen tegen onverwachte stoten. Er ging geen moment voorbij op een dag dat hij niet hoefde te denken aan de smaak van Banzo's zwaard.\n\nHij leerde zo snel dat hij glimlachen op het gezicht van zijn meester bracht. Matajuro werd de grootste zwaardvechter van het land.","t":["kunst","kracht"],"m":4,"ess":"Matajuro wilde in drie jaar zwaardmeester worden. Banzo zei: dan duurt het dertig. Hoe harder je het probeert, hoe langer het duurt. Matajuro gaf zich over, kookte, maakte schoon — en werd aangevallen met een houten zwaard, dag en nacht, zonder waarschuwing.\n\nHij leerde zwaardkunst door geen zwaard aan te raken. Banzo elimineerde het 'proberen' door Matajuro in een staat van constante alertheid te brengen — niet als oefening maar als overleving. Meesterschap is geen techniek die je leert maar een toestand die je wordt. De snelste weg is stoppen met haasten."},
{"n":92,"en":"Fire-Poker Zen","nl":"Pook-zen","e":"Hakuin used to tell his pupils about an old woman who had a teashop, praising her understanding of Zen. The pupils refused to believe what he told them and would go to the teashop to find out for themselves.\n\nWhenever the woman saw them coming she could tell at once whether they had come for tea or to look into her grasp of Zen. In the former case, she would serve them graciously. In the latter, she would beckon to the pupils to come behind her screen. The instant they obeyed, she would strike them with a fire-poker.\n\nNine out of ten of them could not escape her beating.","d":"Hakuin vertelde zijn leerlingen altijd over een oude vrouw die een theehuis had, en prees haar begrip van Zen. De leerlingen weigerden te geloven wat hij hen vertelde en gingen naar het theehuis om het zelf te ontdekken.\n\nWanneer de vrouw hen zag aankomen, kon ze meteen zien of ze voor thee kwamen of om haar begrip van Zen te onderzoeken. In het eerste geval bediende ze hen hoffelijk. In het laatste geval wenkte ze de leerlingen om achter haar scherm te komen. Op het moment dat ze gehoorzaamden, sloeg ze hen met een haardpook.\n\nNegen van de tien konden haar afranseling niet ontlopen.","t":["verlichting","humor"],"m":1,"ess":"Hakuin prees een oude vrouw met een theewinkel voor haar begrip van Zen. Studenten gingen kijken. De vrouw zag meteen of ze voor thee kwamen of om haar te testen. Testers kregen een klap met de pook.\n\nNegen van de tien ontsnapten niet. De vrouw had geen formele training maar een onfeilbaar instinct voor authenticiteit. Ze rook de intentie achter het bezoek en reageerde navenant. De les is niet dat je een pook nodig hebt, maar dat echt begrip niet te faken is — en dat het niet in tempels woont maar overal waar eerlijkheid woont."},
{"n":93,"en":"Storyteller's Zen","nl":"De zen van de verhalenverteller","e":"Encho was a famous storyteller. His tales of love stirred the hearts of his listeners. When he narrated a story of war, it was as if the listeners themselves were on the field of battle.\n\nOne day Encho met Yamaoka Tesshu, a layman who had almost embraced masterhood in Zen. \"I understand,\" said Yamaoka, \"you are the best storyteller in our land and that you make people cry or laugh at will. Tell me my favorite story of the Peach Boy. When I was a little tot I used to sleep beside my mother, and she often related this legend. In the middle of the story I would fall asleep. Tell it to me just as my mother did.\"\n\nEncho dared not attempt to do this. He requested time to study. Several months later he went to Yamaoka and said: \"Please give me the opportunity to tell you the story.\"\n\n\"Some other day,\" answered Yamaoka.\n\nEncho was keenly disappointed. He studied further and tried again. Yamaoka rejected him many times. When Encho would start to talk Yamaoka would stop him, saying: \"You are not yet like my mother.\"\n\nIt took Encho five years to be able to tell Yamaoka the legend as his mother had told it to him.\n\nIn this way, Yamaoka imparted Zen to Encho.","d":"Encho was een beroemde verhalenverteller. Zijn liefdesverhalen beroerden de harten van zijn luisteraars. Wanneer hij een oorlogsverhaal vertelde, was het alsof de luisteraars zelf op het slagveld stonden.\n\nOp een dag ontmoette Encho Yamaoka Tesshu, een leek die het meesterschap in Zen bijna had bereikt. \"Ik begrijp,\" zei Yamaoka, \"dat je de beste verhalenverteller van ons land bent en dat je mensen naar believen kunt laten huilen of lachen. Vertel me mijn favoriete verhaal van de Perzikjongen. Toen ik een klein kind was, sliep ik naast mijn moeder, en zij vertelde vaak deze legende. Midden in het verhaal viel ik in slaap. Vertel het me precies zoals mijn moeder het deed.\"\n\nEncho durfde dit niet te proberen. Hij vroeg om tijd om te studeren. Enkele maanden later ging hij naar Yamaoka en zei: \"Geef me alstublieft de gelegenheid u het verhaal te vertellen.\"\n\n\"Een andere keer,\" antwoordde Yamaoka.\n\nEncho was diep teleurgesteld. Hij studeerde verder en probeerde het opnieuw. Yamaoka wees hem vele malen af. Wanneer Encho begon te praten, stopte Yamaoka hem met de woorden: \"Je bent nog niet als mijn moeder.\"\n\nHet kostte Encho vijf jaar om de legende te kunnen vertellen zoals zijn moeder het hem had verteld.\n\nOp deze manier droeg Yamaoka Zen over aan Encho.","t":["kunst","meester"],"m":2,"ess":"Encho kon mensen laten huilen en lachen. Yamaoka Tesshu vroeg hem het verhaal van de Perzikenjongen te vertellen zoals zijn moeder het deed. Vijf jaar lang werd Encho afgewezen: 'Je bent nog niet als mijn moeder.'\n\nDe ultieme storytelling is niet techniek maar liefde. Een moeder vertelt een verhaal niet om indruk te maken maar om haar kind te laten slapen. Encho moest vijf jaar lang zijn virtuositeit afleren om bij de kern te komen: niet het publiek vermaken maar het ene kind bereiken. Yamaoka onderwees Zen via een slaapverhaaltje."},
{"n":94,"en":"Midnight Excursion","nl":"Nachtelijke excursie","e":"Many Zen pupils were studying meditation under the Zen master Sengai. One of them used to arise at night, climb over the temple wall, and go to town on a pleasure jaunt.\n\nSengai, inspecting the dormitory quarters, found this pupil missing one night and also discovered the high stool he had used to scale the wall. Sengai removed the stool and stood there in its place.\n\nWhen the wanderer returned, not knowing that Sengai was the stool, he put his feet on the master's head and jumped down into the grounds. Discovering what he had done, he was aghast.\n\nSengai said: \"It is very chilly in the early morning. Do be careful not to catch cold yourself.\"\n\nThe pupil never went out at night again.","d":"Vele zen-leerlingen studeerden meditatie onder de zen-meester Sengai. Een van hen stond 's nachts op, klom over de tempelmuur en ging de stad in voor een plezieruitje.\n\nSengai, die de slaapzalen inspecteerde, miste deze leerling op een nacht en ontdekte ook de hoge kruk die hij had gebruikt om over de muur te klimmen. Sengai verwijderde de kruk en ging op diens plaats staan.\n\nToen de zwerver terugkeerde, niet wetend dat Sengai de kruk was, zette hij zijn voeten op het hoofd van de meester en sprong omlaag het terrein op. Ontdekkend wat hij had gedaan, was hij ontzet.\n\nSengai zei: \"Het is erg kil in de vroege ochtend. Pas alsjeblieft op dat je geen kou vat.\"\n\nDe leerling ging nooit meer 's nachts naar buiten.","t":["compassie","meester"],"m":1,"ess":"Sengai ontdekte dat een leerling 's nachts over de muur klom. Hij verwijderde het krukje en ging er zelf staan. De leerling zette zijn voeten op het hoofd van de meester zonder het te weten. Sengai zei alleen: 'Het is koud, vat geen kou.'\n\nGeen straf, geen preek, geen verwijt. De leerling die op het hoofd van zijn meester trapte en vervolgens alleen zorg ontving, had een les die strenger was dan elke straf. De schaamte van binnenuit — de realisatie van wat je hebt gedaan en wat je hebt ontvangen — is onuitwisbaar. De leerling ging nooit meer 's nachts weg."},
{"n":95,"en":"A Letter to a Dying Man","nl":"Brief aan een stervende","e":"Bassui wrote the following letter to one of his disciples who was about to die:\n\n\"The essence of your mind is not born, so it will never die. It is not an existence, which is perishable. It is not an emptiness, which is a mere void. It has neither color nor form. It enjoys no pleasures and suffers no pains.\n\n\"I know you are very ill. Like a good Zen student, you are facing that sickness squarely. You may not know exactly who is suffering, but question yourself: What is the essence of this mind? Think only of this. You will need no more. Covet nothing. Your end which is endless is as a snowflake dissolving in the pure air.\"","d":"Bassui schreef de volgende brief aan een van zijn leerlingen die op het punt stond te sterven:\n\n\"De essentie van je geest is niet geboren, dus zal ze nooit sterven. Het is geen bestaan, dat vergankelijk is. Het is geen leegte, die slechts een leeg niets is. Het heeft noch kleur noch vorm. Het geniet geen genoegens en lijdt geen pijn.\n\n\"Ik weet dat je erg ziek bent. Als een goede zen-student sta je die ziekte recht in de ogen. Je weet misschien niet precies wie er lijdt, maar vraag jezelf: wat is de essentie van deze geest? Denk alleen hieraan. Meer heb je niet nodig. Begeer niets. Je einde dat eindeloos is, is als een sneeuwvlok die oplost in de zuivere lucht.\"","t":["dood","stilte"],"m":1,"ess":"Bassui schreef aan een stervende leerling: 'De essentie van je geest is niet geboren en zal dus nooit sterven. Het is geen bestaan dat vergaat. Het is geen leegte die leeg is.'\n\nDit is geen troost maar een instructie. 'Wie lijdt er?' is de vraag die Bassui stelt — niet om het lijden te ontkennen maar om de lijder te vinden. Als je de essentie van je geest niet kunt vinden, kan die ook niet sterven. Je einde is als een sneeuwvlok die oplost in de lucht — niet verdwijnen maar terugkeren naar wat er altijd al was."},
{"n":96,"en":"A Drop of Water","nl":"Een druppel water","e":"A Zen master named Gisan asked a young student to bring him a pail of water to cool his bath.\n\nThe student brought the water and, after cooling the bath, threw on to the ground the little that was left over.\n\n\"You dunce!\" the master scolded him. \"Why didn't you give the rest of the water to the plants? What right have you to waste even a drop of water in this temple?\"\n\nThe young student attained Zen in that instant. He changed his name to Tekisui, which means a drop of water.","d":"Een zen-meester genaamd Gisan vroeg een jonge student hem een emmer water te brengen om zijn bad te koelen.\n\nDe student bracht het water en gooide, na het bad gekoeld te hebben, het beetje dat over was op de grond.\n\n\"Domkop!\" berispte de meester hem. \"Waarom heb je de rest van het water niet aan de planten gegeven? Welk recht heb jij om zelfs maar een druppel water te verspillen in deze tempel?\"\n\nDe jonge student bereikte Zen op dat moment. Hij veranderde zijn naam in Tekisui, wat een druppel water betekent.","t":["verlichting","eenvoud"],"m":1,"ess":"Een leerling gooide het restje water uit een emmer op de grond. De meester berispte hem: 'Waarom gaf je het niet aan de planten? Wie geeft jou het recht om ook maar één druppel te verspillen?' De leerling werd verlicht en noemde zich Tekisui — een druppel water.\n\nDit gaat niet over zuinigheid maar over aandacht. Elke druppel, elke minuut, elk gebaar heeft waarde als je het aandacht geeft. De leerling die water verspilde, verspilde niet het water maar het moment. Verlichting begon op het moment dat hij begreep: er bestaat geen 'maar een beetje' — alles telt, of niets telt."},
{"n":97,"en":"Teaching the Ultimate","nl":"Het ultieme onderwijzen","e":"In early times in Japan, bamboo-and-paper lanterns were used with candles inside. A blind man, visiting a friend one night, was offered a lantern to carry home with him.\n\n\"I do not need a lantern,\" he said. \"Darkness or light is all the same to me.\"\n\n\"I know you do not need a lantern to find your way,\" his friend replied, \"but if you don't have one, someone else may run into you. So you must take it.\"\n\nThe blind man started off with the lantern and before he had walked very far someone ran squarely into him.\n\n\"Look out where you are going!\" he exclaimed to the stranger. \"Can't you see this lantern?\"\n\n\"Your candle has burned out, brother,\" replied the stranger.","d":"In vroeger tijden in Japan werden bamboe-en-papieren lantaarns gebruikt met kaarsen erin. Een blinde man die op een avond een vriend bezocht, kreeg een lantaarn aangeboden om mee naar huis te nemen.\n\n\"Ik heb geen lantaarn nodig,\" zei hij. \"Duisternis of licht is voor mij hetzelfde.\"\n\n\"Ik weet dat je geen lantaarn nodig hebt om je weg te vinden,\" antwoordde zijn vriend, \"maar als je er geen hebt, kan iemand anders tegen je op lopen. Dus je moet hem meenemen.\"\n\nDe blinde man vertrok met de lantaarn en voordat hij ver had gelopen, liep iemand vol tegen hem aan.\n\n\"Kijk uit waar je loopt!\" riep hij tegen de vreemdeling. \"Zie je deze lantaarn niet?\"\n\n\"Je kaars is uitgegaan, broeder,\" antwoordde de vreemdeling.","t":["paradox","humor"],"m":1,"ess":"Een blinde man kreeg een lantaarn mee. 'Ik heb geen licht nodig.' 'Niet voor jou, maar zodat anderen jou niet omverlopen.' Onderweg botste iemand tóch tegen hem aan. 'Ziet u mijn lantaarn niet?' 'Uw kaars is uit, vriend.'\n\nDe blinde vertrouwde op iets dat hij zelf niet kon controleren — en het faalde. We lopen allemaal met lantaarns waarvan we niet weten of ze branden. De les is niet 'controleer je kaars' maar de diepere vraag: hoeveel van wat je denkt te weten is eigenlijk al lang gedoofd zonder dat je het doorhebt?"},
{"n":98,"en":"Non-Attachment","nl":"Niet-gehechtheid","e":"Kitano Genpo, abbot of Ei-Hei-Ji, was ninety-two years old when he passed away in the year 1933. He endeavoured his whole life not to be attached to anything. As a wandering mendicant when he was twenty, he happened to meet a traveller who smoked tobacco. As they walked together down a mountain road, they stopped under a tree to rest. The traveller offered Kitano a smoke which he accepted, as he was very hungry at the time.\n\n\"How pleasant this smoking is,\" he commented. The other gave him an extra pipe and tobacco, and they parted.\n\nKitano felt, \"Such pleasant things may disturb my meditation. Before this goes too far, I will stop now.\" So he threw the smoking outfit away.\n\nWhen he was twenty-three years old he studied I-King, the profoundest doctrine of the universe. It was winter at the time, and he needed some heavy clothes. He wrote his teacher who lived a hundred miles away, telling him of his need, and gave the letter to a traveller to deliver. Almost the whole winter passed and neither answer nor clothes arrived. So Kitano resorted to the prescience of I-King, which also teaches the art of divination, to determine whether or not his letter had been miscarried.\n\nHe found that this had been the case. A letter afterwards from his teacher made no mention of clothes.\n\n\"If I perform such accurate determinative work with I-King, I may neglect my meditation,\" felt Kitano. So he gave up this marvellous teaching and never resorted to its powers again.\n\nWhen he was twenty-eight, he studied Chinese calligraphy and poetry. He grew so skilful in these arts that his teacher praised him. Kitano mused, \"If I don't stop now, I'll be a poet, not a Zen teacher.\" So he never wrote another poem.","d":"Kitano Genpo, abt van Ei-Hei-Ji, was tweeënnegentig jaar oud toen hij in 1933 overleed. Hij streefde zijn hele leven ernaar nergens aan gehecht te raken. Als rondtrekkende bedelmonnik op zijn twintigste ontmoette hij toevallig een reiziger die tabak rookte. Terwijl ze samen een bergpad afliepen, stopten ze onder een boom om te rusten. De reiziger bood Kitano een sigaret aan, die hij aannam omdat hij op dat moment erg hongerig was.\n\n\"Wat is dit roken aangenaam,\" merkte hij op. De ander gaf hem een extra pijp en tabak, en ze gingen uiteen.\n\nKitano voelde: \"Zulke aangename dingen kunnen mijn meditatie verstoren. Voordat dit te ver gaat, stop ik nu.\" Dus gooide hij de rookwaren weg.\n\nToen hij drieëntwintig was, studeerde hij de I-King, de diepzinnigste leer van het universum. Het was destijds winter en hij had warme kleding nodig. Hij schreef zijn leraar die honderd mijl verderop woonde, vertelde hem over zijn behoefte, en gaf de brief aan een reiziger om te bezorgen. Bijna de hele winter verstreek en noch antwoord noch kleding arriveerde. Dus nam Kitano zijn toevlucht tot de voorspellende kracht van de I-King, die ook de kunst van waarzeggerij onderwijst, om te bepalen of zijn brief was zoekgeraakt.\n\nHij ontdekte dat dit inderdaad het geval was. Een brief naderhand van zijn leraar maakte geen melding van kleding.\n\n\"Als ik zulk nauwkeurig waarzegwerk met de I-King verricht, verwaarloos ik misschien mijn meditatie,\" voelde Kitano. Dus gaf hij deze wonderbaarlijke leer op en nam nooit meer zijn toevlucht tot haar krachten.\n\nToen hij achtentwintig was, studeerde hij Chinese kalligrafie en dichtkunst. Hij werd zo bekwaam in deze kunsten dat zijn leraar hem prees. Kitano peinsde: \"Als ik nu niet stop, word ik een dichter, geen zen-leraar.\" Dus schreef hij nooit meer een gedicht.","t":["gehechtheid","kracht"],"m":3,"ess":"Kitano Genpo gooide op zijn twintigste zijn rookgerei weg: te aangenaam, het zou zijn meditatie verstoren. Hij gaf zijn I-Ching-studie op: te accuraat, hij zou waarzegger worden in plaats van leraar. Hij stopte met kalligrafie: te goed, hij zou dichter worden in plaats van meester.\n\nElke keer gaf hij op wat hij goed kon omdat het hem van zijn pad zou afleiden. Dit is niet ascese maar focus. De meeste mensen falen niet door hun zwakheden maar door hun talenten — het aangename, het makkelijke, het bewonderde leidt af van het essentiële."},
{"n":99,"en":"Tosui's Vinegar","nl":"Tosui's azijn","e":"Tosui was the Zen master who left the formalism of temples to live under a bridge with beggars. When he was getting very old, a friend helped him earn his living without begging. He showed Tosui how to collect rice and manufacture vinegar from it, and Tosui did this until he passed away.\n\nWhile Tosui was making vinegar, one of the beggars gave him a picture of the Buddha. Tosui hung it on the wall of his hut and put a sign beside it. The sign read:\n\n\"Mr. Amida Buddha: This little room is quite narrow. I can let you remain as a transient. But don't think I am asking you to help me to be reborn in your paradise.\"","d":"Tosui was de zen-meester die het formalisme van tempels verliet om onder een brug te leven met bedelaars. Toen hij erg oud werd, hielp een vriend hem de kost te verdienen zonder te bedelen. Hij liet Tosui zien hoe hij rijst kon verzamelen en er azijn van kon maken, en Tosui deed dit tot hij overleed.\n\nTerwijl Tosui azijn maakte, gaf een van de bedelaars hem een afbeelding van de Boeddha. Tosui hing het aan de muur van zijn hut en zette er een bordje naast. Het bordje luidde:\n\n\"Meneer Amida Boeddha: deze kleine kamer is nogal krap. Ik kan u laten blijven als passant. Maar denk niet dat ik u vraag me te helpen herboren te worden in uw paradijs.\"","t":["humor","gehechtheid"],"m":1,"ess":"Tosui leefde onder een brug en maakte azijn. Een bedelaar gaf hem een Boeddhabeeld. Tosui hing het op met een briefje: 'Meneer Amida, dit kamertje is klein. U mag blijven als tijdelijke gast. Maar denk niet dat ik u vraag om mij te laten herboren worden in uw paradijs.'\n\nZelfs de Boeddha is een gast, geen meester. Tosui had alles losgelaten — tempel, status, leerlingen — en was niet van plan om zich nu aan een beeld te hechten. Zijn briefje is de ultieme Zen-houding: respect zonder afhankelijkheid, gastvrijheid zonder onderwerping."},
{"n":100,"en":"The Silent Temple","nl":"De stille tempel","e":"Shoichi was a one-eyed teacher of Zen, sparkling with enlightenment. He taught his disciples in Tofuku temple.\n\nDay and night the whole temple stood in silence. There was no sound at all.\n\nEven the reciting of Sutras was abolished by the teacher. His pupils had nothing to do but meditate.\n\nWhen the master passed away, an old neighbour heard the ringing of bells and the recitation of Sutras. Then she knew Shoichi had gone.","d":"Shoichi was een eenogige leraar van Zen, fonkelend van verlichting. Hij onderwees zijn leerlingen in de Tofuku-tempel.\n\nDag en nacht stond de hele tempel in stilte. Er was helemaal geen geluid.\n\nZelfs het reciteren van soetra's was afgeschaft door de leraar. Zijn leerlingen hadden niets te doen dan mediteren.\n\nToen de meester overleed, hoorde een oude buurvrouw het luiden van klokken en het reciteren van soetra's. Toen wist ze dat Shoichi was heengegaan.","t":["stilte","dood"],"m":1,"ess":"Shoichi's tempel stond in volledige stilte. Geen soetra's, geen bellen — alleen meditatie. Pas toen hij stierf, hoorde een buurvrouw bellen en recitaties. Toen wist ze dat hij weg was.\n\nDe stilte was Shoichi. Niet als regel maar als wezen — zijn aanwezigheid maakte geluid overbodig. Pas in zijn afwezigheid had de tempel ceremonieën nodig. Het is het sterkste bewijs van een meester: niet wat er gebeurt als hij er is, maar wat er verandert als hij er niet meer is."},
{"n":101,"en":"Buddha's Zen","nl":"Boeddha's Zen","e":"\"I consider the positions of kings and rulers as that of dust motes. I observe treasures of gold and gems as so many bricks and pebbles. I look upon the finest silken robes as tattered rags. I see myriad worlds of the universe as small seeds of fruit, and the greatest lake in India as a drop of oil on my foot. I perceive the teachings of the world to be the illusion of magicians. I discern the highest conception of emancipation as a golden brocade in a dream, and view the holy path of the illuminated ones as flowers appearing in one's eyes. I see meditation as a pillar of a mountain, Nirvana as a nightmare of daytime. I look upon the judgment of right and wrong as the serpentine dance of a dragon, and the rise and fall of beliefs as but traces left by the four seasons.\"","d":"\"Ik beschouw de posities van koningen en heersers als die van stofdeeltjes. Ik zie schatten van goud en edelstenen als zoveel bakstenen en kiezelstenen. Ik kijk naar de fijnste zijden gewaden als gescheurde vodden. Ik zie ontelbare werelden van het universum als kleine vruchtenzaden, en het grootste meer in India als een druppel olie op mijn voet. Ik neem de leringen van de wereld waar als de illusie van goochelaars. Ik onderscheid het hoogste concept van bevrijding als een gouden brokaat in een droom, en beschouw het heilige pad van de verlichten als bloemen die in iemands ogen verschijnen. Ik zie meditatie als een pilaar van een berg, Nirvana als een nachtmerrie overdag. Ik kijk naar het oordeel over goed en kwaad als de slangenachtige dans van een draak, en het opkomen en neergaan van overtuigingen als slechts sporen achtergelaten door de vier seizoenen.\"","t":["verlichting","wijsheid"],"m":1,"ess":"Boeddha's eigen woorden: koningen zijn stofdeeltjes, goud is puin, zijden gewaden zijn vodden, ontelbare werelden zijn zaadjes, het grootste meer is een oliedruppel op mijn voet.\n\nDit is geen hoogmoed maar perspectief. Wie de werkelijkheid ziet zoals ze is — zonder de waarde die wij eraan plakken — ziet dat alles wat wij groot noemen klein is, en alles wat wij waardevol noemen willekeurig. Het is het laatste verhaal omdat het de lens geeft waardoor alle andere verhalen gelezen moeten worden: niets is wat het lijkt, en de schaal waarop wij meten is niet de schaal van het universum."}];
