ten. Hij kan niet voor eeuwig zonder voedsel!\"\n\nDaarop opende Bankei de deur. Hij glimlachte. Hij zei tegen Dairyo: \"Ik sta erop hetzelfde voedsel te eten als de minste van mijn volgelingen. Wanneer jij de leraar wordt, wil ik niet dat je dit vergeet.\"","t":["humor","meester"],"m":2,"ess":"De kok gaf Bankei betere miso dan de andere monniken, uit respect voor zijn leeftijd. Bankei sloot zich op in zijn kamer en weigerde te eten. Zeven dagen lang.\n\nHet punt was niet het eten maar de gelijkheid. Een meester die beter eten accepteert dan zijn leerlingen, ondermijnt alles waar hij voor staat. Bankei's hongerprotest was geen straf maar een les in integriteit: ik eet wat jullie eten, of ik eet niet. Ware leiderschap vraagt niet om privilege maar weigert het."},
{"n":52,"en":"Your Light May Go Out","nl":"Je licht kan doven","e":"A student of Tendai, a philosophical school of Buddhism, came to the Zen abode of Gasan as a pupil. When he was departing a few years later, Gasan warned him: \"Studying the truth speculatively is useful as a way of collecting preaching material. But remember that unless you meditate constantly your light of truth may go out.\"","d":"Een student van Tendai, een filosofische school van het boeddhisme, kwam als leerling naar het Zen-verblijf van Gasan. Toen hij een paar jaar later vertrok, waarschuwde Gasan hem: \"Het speculatief bestuderen van de waarheid is nuttig als manier om preekmateriaal te verzamelen. Maar bedenk dat, tenzij je voortdurend mediteert, je licht van de waarheid kan doven.\"","t":["wijsheid","dood"],"m":1,"ess":"Gasan waarschuwde een vertrekkende leerling: 'Zonder constante meditatie kan je licht van waarheid doven.'\n\nDit is Zen in één zin. Inzicht is geen permanent bezit maar een vlam die onderhoud nodig heeft. Wie denkt dat één verlichtingservaring genoeg is, zal ontdekken dat het licht langzaam dooft. De waarschuwing is niet dreigend maar realistisch: verlichting moet geleefd worden, elke dag opnieuw, anders wordt het een herinnering in plaats van een werkelijkheid."},
{"n":53,"en":"The Giver Should Be Thankful","nl":"De gever hoort dankbaar te zijn","e":"While Seisetsu was the master of Engaku in Kamakura he required larger quarters, since those in which he was teaching were overcrowded. Umezu Seibei, a merchant of Edo, decided to donate five hundred pieces of gold called ryo toward the construction of a more commodious school. This money he brought to the teacher.\n\nSeisetsu said: \"All right. I will take it.\"\n\nUmezu gave Seisetsu the sack of gold, but he was dissatisfied with the attitude of the teacher. One might live a whole year on three ryo, and the merchant had not even been thanked for five hundred.\n\n\"In that sack are five hundred ryo,\" hinted Umezu.\n\n\"You told me that before,\" replied Seisetsu.\n\n\"Even if I am a wealthy merchant, five hundred ryo is a lot of money,\" said Umezu.\n\n\"Do you want me to thank you for it?\" asked Seisetsu.\n\n\"You ought to,\" replied Umezu.\n\n\"Why should I?\" inquired Seisetsu. \"The giver should be thankful.\"","d":"Terwijl Seisetsu de meester van Engaku in Kamakura was, had hij grotere ruimten nodig, want die waarin hij lesgaf waren overvol. Umezu Seibei, een koopman uit Edo, besloot vijfhonderd goudstukken genaamd ryo te schenken voor de bouw van een ruimere school. Dit geld bracht hij naar de leraar.\n\nSeisetsu zei: \"Goed. Ik neem het aan.\"\n\nUmezu gaf Seisetsu de zak goud, maar hij was ontevreden over de houding van de leraar. Van drie ryo kon iemand een heel jaar leven, en de koopman was niet eens bedankt voor vijfhonderd.\n\n\"In die zak zitten vijfhonderd ryo,\" hintte Umezu.\n\n\"Dat heb je me al verteld,\" antwoordde Seisetsu.\n\n\"Al ben ik een rijke koopman, vijfhonderd ryo is veel geld,\" zei Umezu.\n\n\"Wil je dat ik je daarvoor bedank?\" vroeg Seisetsu.\n\n\"Dat hoort zo,\" antwoordde Umezu.\n\n\"Waarom zou ik?\" vroeg Seisetsu. \"De gever hoort dankbaar te zijn.\"","t":["ego","wijsheid"],"m":2,"ess":"Seisetsu nam vijfhonderd goudstukken aan zonder te bedanken. De koopman Umezu werd boos. 'Moet je me niet bedanken?' 'Waarom zou ik?' zei Seisetsu. 'De gever hoort dankbaar te zijn.'\n\nDit draait het hele concept van vrijgevigheid om. Wie geeft en dank verwacht, koopt in plaats van geeft. De werkelijke gift is niet het goud maar de gelegenheid om te geven. Umezu dacht dat hij iets afstond; Seisetsu liet hem zien dat hij iets ontving — de kans om zijn rijkdom betekenis te geven."},
{"n":54,"en":"The Last Will and Testament","nl":"Het testament","e":"Ikkyu, a famous Zen teacher of the Ashikaga era, was the son of the emperor. When he was very young, his mother left the palace and went to study Zen in a temple. In this way Prince Ikkyu also became a student. When his mother passed on, she left with him a letter. It read:\n\nTo Ikkyu:\n\nI have finished my work in this life and am now returning into Eternity. I wish you to become a good student and to realize your Buddha-nature. You will know if I am in hell and whether I am always with you or not.\n\nIf you become a man who realizes that the Buddha and his follower Bodhidharma are your own servants, you may leave off studying and work for humanity. The Buddha preached for forty-nine years and in all that time found it not necessary to speak one word. You ought to know why. But if you don't and yet wish to, avoid thinking fruitlessly.\n\nYour Mother,\nNot born, not dead.\nSeptember first.\n\nP.S. The teaching of Buddha was mainly for the purpose of enlightening others. If you are dependent on any of its methods, you are naught but an ignorant insect. There are 80,000 books on Buddhism and if you should read all of them and still not see your own nature, you will not understand even this letter. This is my will and testament.","d":"Ikkyu, een beroemde Zen-leraar uit het Ashikaga-tijdperk, was de zoon van de keizer. Toen hij nog heel jong was, verliet zijn moeder het paleis en ging Zen studeren in een tempel. Op deze manier werd prins Ikkyu ook een student. Toen zijn moeder stierf, liet ze hem een brief na. Die luidde:\n\nAan Ikkyu:\n\nIk heb mijn werk in dit leven voltooid en keer nu terug naar de Eeuwigheid. Ik wens dat je een goede student wordt en je Boeddha-natuur verwezenlijkt. Je zult weten of ik in de hel ben en of ik altijd bij je ben of niet.\n\nAls je een mens wordt die beseft dat de Boeddha en zijn volgeling Bodhidharma jouw eigen dienaren zijn, mag je ophouden met studeren en voor de mensheid werken. De Boeddha preekte negenenveertig jaar en vond het in al die tijd niet nodig één woord te spreken. Je zou moeten weten waarom. Maar als je het niet weet en het toch wilt weten, vermijd dan vruchteloos denken.\n\nJe moeder,\nNiet geboren, niet gestorven.\nEerste september.\n\nP.S. De leer van Boeddha was voornamelijk bedoeld om anderen te verlichten. Als je afhankelijk bent van een van zijn methoden, ben je niets anders dan een onwetend insect. Er zijn 80.000 boeken over het boeddhisme en als je ze allemaal zou lezen en toch je eigen natuur niet ziet, zul je zelfs deze brief niet begrijpen. Dit is mijn testament.","t":["dood","wijsheid"],"m":2,"ess":"Ikkyu's moeder liet hem een brief na: word geen wandelend woordenboek. De Boeddha sprak 49 jaar en had geen enkel woord nodig. Er zijn 80.000 boeken over boeddhisme — als je ze allemaal leest en je eigen natuur niet ziet, begrijp je zelfs deze brief niet.\n\nDe brief is scherper dan welke soetra ook. 'Niet geboren, niet gestorven' — haar handtekening is haar leer. De moeder die haar zoon maant om te stoppen met studeren en te beginnen met zien, vat het hele boeddhisme samen in een postscriptum."},
{"n":55,"en":"The Tea-Master and the Assassin","nl":"De theemaster en de moordenaar","e":"Taiko, a warrior who lived in Japan before the Tokugawa era, studied Cha-no-yu, tea etiquette, with Sen no Rikyu, a teacher of that aesthetical expression of calmness and contentment.\n\nTaiko's attendant warrior Kato interpreted his superior's enthusiasm for tea etiquette as negligence of state affairs, so he decided to kill Sen no Rikyu. He pretended to make a social call upon the tea-master and was invited to drink tea.\n\nThe master, who was well skilled in his art, saw at a glance the warrior's intention, so he invited Kato to leave his sword outside before entering the room for the ceremony, explaining that Cha-no-yu represents peacefulness itself.\n\nKato would not listen to this. \"I am a warrior,\" he said. \"I always have my sword with me. Cha-no-yu or no Cha-no-yu, I have my sword.\"\n\n\"Very well. Bring your sword in and have some tea,\" consented Sen no Rikyu.\n\nThe kettle was boiling on the charcoal fire. Suddenly Sen no Rikyu tipped it over. Hissing steam arose, filling the room with smoke and ashes. The startled warrior ran outside.\n\nThe tea-master apologized. \"It was my mistake. Come back in and have some tea. I have your sword here covered with ashes and will clean it and give it to you.\"\n\nIn this predicament the warrior realized he could not very well kill the tea-master, so he gave up the idea.","d":"Taiko, een krijger die in Japan leefde vóór het Tokugawa-tijdperk, studeerde Cha-no-yu, theeceremonie-etiquette, bij Sen no Rikyu, een leraar van die esthetische uitdrukking van rust en tevredenheid.\n\nTaiko's dienaar en medekrijger Kato interpreteerde het enthousiasme van zijn meerdere voor de theeceremonie als nalatigheid jegens staatszaken, en besloot Sen no Rikyu te doden. Hij deed alsof hij een beleefdheidsbezoek bracht aan de theemaster en werd uitgenodigd om thee te drinken.\n\nDe meester, die zijn kunst goed beheerste, zag in één oogopslag de bedoeling van de krijger, en verzocht Kato zijn zwaard buiten te laten voordat hij de kamer binnenging voor de ceremonie, met de uitleg dat Cha-no-yu vredigheid zelf vertegenwoordigt.\n\nKato wilde hier niet naar luisteren. \"Ik ben een krijger,\" zei hij. \"Ik heb altijd mijn zwaard bij me. Cha-no-yu of geen Cha-no-yu, ik heb mijn zwaard.\"\n\n\"Heel goed. Breng je zwaard mee en drink wat thee,\" stemde Sen no Rikyu in.\n\nDe ketel stond te koken op het houtskoolvuur. Plotseling kantelde Sen no Rikyu hem om. Sissende stoom steeg op en vulde de kamer met rook en as. De geschrokken krijger rende naar buiten.\n\nDe theemaster bood zijn verontschuldigingen aan. \"Het was mijn fout. Kom terug en drink wat thee. Uw zwaard ligt hier bedekt met as; ik zal het schoonmaken en u geven.\"\n\nIn dit hachelijke geval besefte de krijger dat hij de theemaster bezwaarlijk kon doden, en zette het idee uit zijn hoofd.","t":["kracht","stilte"],"m":2,"ess":"Sen no Rikyu werd uitgedaagd door de krijger Kato, die met een zwaard naar de theeceremonie kwam. Rikyu nodigde hem uit voor thee, stootte toen 'per ongeluk' de ketel om — stoom vulde de kamer, de krijger vluchtte naar buiten.\n\nDe theeceremonie is vrede; het zwaard is geweld. Rikyu versloeg het zwaard niet met een groter zwaard maar met een ketel heet water. De krijger die niet bang was voor de dood, vluchtte voor stoom. Meesterschap in je eigen domein is krachtiger dan geweld — wie volledig thuis is in zijn vak, is onverslaanbaar op zijn eigen terrein."},
{"n":56,"en":"The True Path","nl":"Het ware pad","e":"Just before Ninakawa passed away the Zen master Ikkyu visited him. \"Shall I lead you on?\" Ikkyu asked.\n\nNinakawa replied: \"I came here alone and I go alone. What help could you be to me?\"\n\nIkkyu answered: \"If you think you really come and go, that is your delusion. Let me show you the path on which there is no coming and no going.\"\n\nWith his words, Ikkyu had revealed the path so clearly that Ninakawa smiled and passed away.","d":"Vlak voordat Ninakawa stierf, bezocht de Zen-meester Ikkyu hem. \"Zal ik je begeleiden?\" vroeg Ikkyu.\n\nNinakawa antwoordde: \"Ik ben hier alleen gekomen en ik ga alleen. Wat zou jij mij kunnen helpen?\"\n\nIkkyu antwoordde: \"Als je denkt dat je werkelijk komt en gaat, is dat je illusie. Laat me je het pad tonen waarop geen komen en geen gaan bestaat.\"\n\nMet zijn woorden had Ikkyu het pad zo helder onthuld dat Ninakawa glimlachte en stierf.","t":["wijsheid","eenvoud"],"m":1,"ess":"Ikkyu bezocht de stervende Ninakawa. 'Zal je me leiden?' vroeg Ninakawa. 'Ik kwam alleen en ga alleen. Wat kun jij voor me doen?'\n\nIkkyu antwoordde: 'Als je denkt dat je echt komt en gaat, is dat je illusie.' En toonde hem het pad waar geen komen en gaan is. Ninakawa glimlachte en stierf. De dood is alleen beangstigend als je gelooft dat er iemand is die ergens naartoe gaat. Het pad zonder komen en gaan is niet een plek — het is het inzicht dat er nooit iemand was die bewoog."},
{"n":57,"en":"The Gates of Paradise","nl":"De poorten van het paradijs","e":"A soldier named Nobushige came to Hakuin and asked: \"Is there really a paradise and a hell?\"\n\n\"Who are you?\" inquired Hakuin.\n\n\"I am a samurai,\" the warrior replied.\n\n\"You, a soldier!\" exclaimed Hakuin. \"What kind of ruler would have you as his guard? Your face looks like that of a beggar.\"\n\nNobushige became so angry that he began to draw his sword, but Hakuin continued: \"So you have a sword! Your weapon is probably much too dull to cut off my head.\"\n\nAs Nobushige drew his sword Hakuin remarked: \"Here open the gates of hell!\"\n\nAt these words the samurai, perceiving the master's discipline, sheathed his sword and bowed.\n\n\"Here open the gates of paradise,\" said Hakuin.","d":"Een soldaat genaamd Nobushige kwam naar Hakuin en vroeg: \"Bestaan er werkelijk een paradijs en een hel?\"\n\n\"Wie ben jij?\" vroeg Hakuin.\n\n\"Ik ben een samoerai,\" antwoordde de krijger.\n\n\"Jij, een soldaat!\" riep Hakuin uit. \"Wat voor heerser zou jou als zijn lijfwacht willen? Je gezicht ziet eruit als dat van een bedelaar.\"\n\nNobushige werd zo woedend dat hij zijn zwaard begon te trekken, maar Hakuin vervolgde: \"Dus je hebt een zwaard! Jouw wapen is waarschijnlijk veel te bot om mijn hoofd af te hakken.\"\n\nTerwijl Nobushige zijn zwaard trok, merkte Hakuin op: \"Hier openen zich de poorten van de hel!\"\n\nBij deze woorden besefte de samoerai de discipline van de meester, stak zijn zwaard terug in de schede en boog.\n\n\"Hier openen zich de poorten van het paradijs,\" zei Hakuin.","t":["paradox","compassie"],"m":1,"ess":"Nobushige vroeg Hakuin of hemel en hel bestaan. Hakuin beledigde hem tot hij zijn zwaard trok. 'Hier openen zich de poorten van de hel,' zei Hakuin. Nobushige begreep het, schaamde zich, en stak zijn zwaard terug. 'Hier openen zich de poorten van het paradijs.'\n\nHemel en hel zijn geen plekken maar toestanden. De woede die Nobushige voelde WAS de hel — niet als metafoor maar als directe ervaring. En het moment van inzicht en kalmte WAS het paradijs. Hakuin riskeerde zijn leven om dit te demonstreren: je draagt beide werelden in je, en je kiest er elk moment tussen."},
{"n":58,"en":"Arresting the Stone Buddha","nl":"De stenen Boeddha arresteren","e":"A merchant bearing fifty rolls of cotton goods on his shoulders stopped to rest from the heat of the day beneath a shelter where a large stone Buddha was standing. There he fell asleep, and when he awoke his goods had disappeared. He immediately reported the matter to the police.\n\nA judge named O-oka opened court to investigate. \"That stone Buddha must have stolen the goods,\" concluded the judge. \"He is supposed to care for the welfare of the people, but he has failed to perform his holy duty. Arrest him.\"\n\nThe police arrested the stone Buddha and carried it into the court. A noisy crowd followed the statue, curious to learn what kind of sentence the judge was about to impose.\n\nWhen O-oka appeared on the bench he rebuked the boisterous audience. \"What right have you people to appear before the court laughing and joking in this manner? You are in contempt of court and subject to a fine and imprisonment.\"\n\nThe people hastened to apologize. \"I shall have to impose a fine on you,\" said the judge, \"but I will remit it provided each one of you brings one roll of cotton goods to the court within three days. Anyone failing to do this will be arrested.\"\n\nWithin that time the thief was easily located. The merchant recovered his goods, and the cotton rolls were returned to the people.","d":"Een koopman die vijftig rollen katoenen goederen op zijn schouders droeg, stopte om te rusten van de dagelijkse hitte onder een afdak waar een groot stenen Boeddhabeeld stond. Daar viel hij in slaap, en toen hij wakker werd waren zijn goederen verdwenen. Hij deed onmiddellijk aangifte bij de politie.\n\nEen rechter genaamd O-oka opende de rechtbank om de zaak te onderzoeken. \"Die stenen Boeddha moet de goederen gestolen hebben,\" concludeerde de rechter. \"Hij wordt verondersteld de welvaart van het volk te bewaken, maar hij heeft zijn heilige plicht verzuimd. Arresteer hem.\"\n\nDe politie arresteerde de stenen Boeddha en droeg hem de rechtbank in. Een luidruchtige menigte volgde het beeld, nieuwsgierig welk vonnis de rechter zou uitspreken.\n\nToen O-oka op de rechterstoel verscheen, berispte hij het rumoerige publiek. \"Wat geeft u het recht om lachend en grappenmakend voor de rechtbank te verschijnen? U bent schuldig aan minachting van de rechter en kunt worden beboet en gevangengezet.\"\n\nDe mensen haastten zich om hun verontschuldigingen aan te bieden. \"Ik zal u een boete moeten opleggen,\" zei de rechter, \"maar ik zal die kwijtschelden op voorwaarde dat ieder van u binnen drie dagen één rol katoenen goederen naar de rechtbank brengt. Wie dit verzuimt, zal worden gearresteerd.\"\n\nBinnen die tijd was de dief gemakkelijk gevonden. De koopman kreeg zijn goederen terug, en de katoenen rollen werden aan het volk geretourneerd.","t":["humor","wijsheid"],"m":2,"ess":"De rechter O-oka 'arresteerde' een stenen Boeddha voor diefstal. Het publiek lachte. De rechter beboette hen voor minachting van het hof — te betalen in rollen katoen. Zo vond hij de dief.\n\nDe absurditeit was het gereedschap. Door iets belachelijks te doen, trok O-oka een menigte die anders niet was gekomen. De boete in katoen zorgde dat de gestolen rollen boven water kwamen. Wijsheid is niet altijd plechtig — soms is de slimste oplossing de meest absurde."},
{"n":59,"en":"Soldiers of Humanity","nl":"Soldaten van de mensheid","e":"Once a division of the Japanese army was engaged in a sham battle, and some of the officers found it necessary to make their headquarters in Gasan's temple.\n\nGasan told his cook: \"Let the officers have only the same simple fare we eat.\"\n\nThis made the army men angry, as they were used to very deferential treatment. One came to Gasan and said: \"Who do you think we are? We are soldiers, sacrificing our lives for our country. Why don't you treat us accordingly?\"\n\nGasan answered sternly: \"Who do you think we are? We are soldiers of humanity, aiming to save all sentient beings.\"","d":"Eens was een divisie van het Japanse leger betrokken bij een oefengevecht, en sommige officieren vonden het nodig hun hoofdkwartier in Gasans tempel te vestigen.\n\nGasan zei tegen zijn kok: \"Geef de officieren alleen hetzelfde eenvoudige eten dat wij eten.\"\n\nDit maakte de militairen boos, want ze waren gewend aan zeer eerbiedige behandeling. Een van hen kwam naar Gasan en zei: \"Wie denkt u dat wij zijn? Wij zijn soldaten die ons leven offeren voor ons land. Waarom behandelt u ons niet dienovereenkomstig?\"\n\nGasan antwoordde streng: \"Wie denkt u dat wij zijn? Wij zijn soldaten van de mensheid, met als doel alle voelende wezens te redden.\"","t":["compassie","kracht"],"m":1,"ess":"Officieren eisten een betere maaltijd. Gasan gaf hen hetzelfde eenvoudige eten als de monniken. 'Wie denken jullie dat wij zijn?' vroegen de soldaten. 'Wij zijn soldaten van de mensheid,' antwoordde Gasan.\n\nRang en status verdwijnen aan de eettafel. Gasan weigerde het onderscheid tussen soldaat en monnik niet uit onbeleefdheid maar uit principe: wie claimt dat zijn doel hoger is dan dat van een ander, heeft het doel al gemist. De soldaat die zijn leven geeft en de monnik die alle wezens dient — geen van beiden verdient een grotere portie."},
{"n":60,"en":"The Tunnel","nl":"De tunnel","e":"Zenkai, the son of a samurai, journeyed to Edo and there became the retainer of a high official. He fell in love with the official's wife and was discovered. In self-defense he slew the official. Then he ran away with the wife.\n\nBoth of them later became thieves. But the woman was so greedy that Zenkai grew disgusted. Finally, leaving her, he journeyed far away to the province of Buzen, where he became a wandering mendicant.\n\nTo atone for his past, Zenkai resolved to accomplish some good deed in his lifetime. Knowing of a dangerous road over a cliff that had caused the death and injury of many persons, he resolved to cut a tunnel through the mountain there.\n\nBegging food in the daytime, Zenkai worked at night digging his tunnel. When thirty years had gone by, the tunnel was 2,280 feet long, 20 feet high, and 30 feet wide.\n\nTwo years before the work was completed, the son of the official he had slain — a skillful swordsman — found Zenkai out and came to kill him in revenge.\n\n\"I will give you my life willingly,\" said Zenkai. \"Only let me finish this work. On the day it is completed, then you may kill me.\"\n\nSo the son awaited the day. Several months passed and Zenkai kept on digging. The son grew tired of doing nothing and began to help with the digging. After he had helped for more than a year, he came to admire the strong will and character of Zenkai.\n\nAt last the tunnel was completed and the people could use it and travel in safety.\n\n\"Now cut off my head,\" said Zenkai. \"My work is done.\"\n\n\"How can I cut off my own teacher's head?\" asked the younger man with tears in his eyes.","d":"Zenkai, de zoon van een samoerai, reisde naar Edo en werd daar de vazal van een hoge ambtenaar. Hij werd verliefd op de vrouw van de ambtenaar en werd betrapt. Ter zelfverdediging doodde hij de ambtenaar. Daarna vluchtte hij met de vrouw.\n\nLater werden beiden dieven. Maar de vrouw was zo hebzuchtig dat Zenkai er een afkeer van kreeg. Uiteindelijk verliet hij haar en reisde ver weg naar de provincie Buzen, waar hij een rondtrekkende bedelmonnik werd.\n\nOm zijn verleden goed te maken, nam Zenkai zich voor in zijn leven een goede daad te verrichten. Hij wist van een gevaarlijke weg over een klif die al velen het leven had gekost of had verwond, en besloot een tunnel door de berg te graven.\n\nOverdag bedelde hij om eten; 's nachts werkte Zenkai aan het graven van zijn tunnel. Toen er dertig jaar voorbij waren gegaan, was de tunnel 2280 voet lang, 20 voet hoog en 30 voet breed.\n\nTwee jaar voor het werk voltooid was, vond de zoon van de ambtenaar die hij had gedood — een bekwaam zwaardvechter — Zenkai op en kwam om hem te doden ter wraak.\n\n\"Ik geef je mijn leven gewillig,\" zei Zenkai. \"Laat me alleen dit werk afmaken. Op de dag dat het voltooid is, mag je me doden.\"\n\nDus wachtte de zoon op die dag. Er verstreken enkele maanden en Zenkai bleef graven. De zoon kreeg genoeg van het nietsdoen en begon mee te graven. Nadat hij meer dan een jaar had meegeholpen, kreeg hij bewondering voor de sterke wil en het karakter van Zenkai.\n\nEindelijk was de tunnel voltooid en kon het volk hem gebruiken en veilig reizen.\n\n\"Hak nu mijn hoofd af,\" zei Zenkai. \"Mijn werk is gedaan.\"\n\n\"Hoe kan ik het hoofd afkappen van mijn eigen leraar?\" vroeg de jongere man met tranen in zijn ogen.","t":["kracht","eenvoud"],"m":3,"ess":"Zenkai doodde een man, werd een dief, verliet alles, en groef dertig jaar lang een tunnel door een berg om reizigers te beschermen. Toen de tunnel af was, bood hij zijn hoofd aan de zoon van zijn slachtoffer.\n\nDe zoon die als wreker kwam en als leerling eindigde, bewijst dat boetedoening niet in woorden zit maar in daden. Dertig jaar graven is geen straf maar transformatie. Zenkai werd niet vergeven omdat hij spijt had, maar omdat hij iets bouwde dat groter was dan zijn misdaad. De tunnel is zijn soetra, geschreven in steen."},
{"n":61,"en":"Gudo and the Emperor","nl":"Gudo en de keizer","e":"The emperor Goyozei was studying Zen under Gudo. He inquired: \"In Zen this very mind is Buddha. Is this correct?\"\n\nGudo answered: \"If I say yes, you will think you understand without understanding. If I say no, I would be contradicting a fact which many understand quite well.\"\n\nOn another day the emperor asked Gudo: \"Where does the enlightened man go when he dies?\"\n\nGudo answered: \"I know not.\"\n\n\"Why don't you know?\" asked the emperor.\n\n\"Because I have not died yet,\" replied Gudo.\n\nThe emperor hesitated to inquire further about these things his mind could not grasp. So Gudo beat the floor with his hand as if to awaken him, and the emperor was enlightened!\n\nThe emperor respected Zen and old Gudo more than ever after his enlightenment, and he even permitted Gudo to wear his hat in the palace in winter. When Gudo was over eighty he used to fall asleep in the midst of his lecture, and the emperor would quietly retire to another room so his beloved teacher might enjoy the rest his aging body required.","d":"Keizer Goyozei studeerde Zen onder Gudo. Hij vroeg: \"In Zen is deze geest zelf de Boeddha. Is dat juist?\"\n\nGudo antwoordde: \"Als ik ja zeg, zult u denken dat u begrijpt zonder te begrijpen. Als ik nee zeg, zou ik een feit tegenspreken dat velen heel goed begrijpen.\"\n\nOp een andere dag vroeg de keizer aan Gudo: \"Waar gaat de verlichte mens heen als hij sterft?\"\n\nGudo antwoordde: \"Dat weet ik niet.\"\n\n\"Waarom weet u het niet?\" vroeg de keizer.\n\n\"Omdat ik nog niet gestorven ben,\" antwoordde Gudo.\n\nDe keizer aarzelde om verder te vragen over deze dingen die zijn geest niet kon bevatten. Daarop sloeg Gudo met zijn hand op de vloer alsof hij hem wilde wekken, en de keizer werd verlicht!\n\nDe keizer respecteerde Zen en de oude Gudo meer dan ooit na zijn verlichting, en hij stond Gudo zelfs toe zijn hoed te dragen in het paleis in de winter. Toen Gudo boven de tachtig was, viel hij gewoonlijk in slaap midden in zijn lezing, en de keizer ging dan stilletjes naar een andere kamer zodat zijn geliefde leraar kon genieten van de rust die zijn verouderende lichaam vereiste.","t":["humor","meester"],"m":2,"ess":"De keizer vroeg Gudo: 'Is deze geest Boeddha?' Gudo weigerde ja of nee te zeggen — ja zou vals begrip geven, nee zou de waarheid ontkennen. Later sloeg hij op de grond en de keizer werd verlicht.\n\nSommige vragen hebben geen antwoord in woorden. Gudo's klap op de grond was geen antwoord maar een onderbreking — het stopte het denken lang genoeg om te zien. De keizer die later zijn oude leraar liet slapen tijdens lezingen, had begrepen dat eerbied voor de mens boven eerbied voor de vorm gaat."},
{"n":62,"en":"In the Hands of Destiny","nl":"In handen van het lot","e":"A great Japanese warrior named Nobunaga decided to attack the enemy although he had only one-tenth the number of men the opposition commanded. He knew that he would win, but his soldiers were in doubt.\n\nOn the way he stopped at a Shinto shrine and told his men: \"After I visit the shrine I will toss a coin. If heads comes, we will win; if tails, we will lose. Destiny holds us in her hand.\"\n\nNobunaga entered the shrine and offered a silent prayer. He came forth and tossed a coin. Heads appeared. His soldiers were so eager to fight that they won their battle easily.\n\n\"No one can change the hand of destiny,\" his attendant told him after the battle.\n\n\"Indeed not,\" said Nobunaga, showing a coin which had been doubled, with heads facing either way.","d":"Een groot Japans krijger genaamd Nobunaga besloot de vijand aan te vallen, hoewel hij slechts een tiende van het aantal mannen had dat de tegenstander commandeerde. Hij wist dat hij zou winnen, maar zijn soldaten twijfelden.\n\nOnderweg stopte hij bij een Shinto-heiligdom en zei tegen zijn mannen: \"Nadat ik het heiligdom heb bezocht, gooi ik een munt op. Als het kruis is, winnen we; als het munt is, verliezen we. Het lot houdt ons in zijn hand.\"\n\nNobunaga betrad het heiligdom en bad in stilte. Hij trad naar buiten en gooide een munt op. Het was kruis. Zijn soldaten waren zo vol strijdlust dat ze hun gevecht gemakkelijk wonnen.\n\n\"Niemand kan de hand van het lot veranderen,\" zei zijn bediende na de slag.\n\n\"Inderdaad niet,\" zei Nobunaga, terwijl hij een munt liet zien die was verdubbeld, met kruis aan beide kanten.","t":["wijsheid","paradox"],"m":1,"ess":"Nobunaga vocht met een tiende van het vijandige leger. Hij gooide een munt op bij een tempel: kop = winnen. Zijn soldaten vochten met absolute overtuiging en wonnen. De munt had twee keer kop.\n\nHet punt is niet het bedrog maar het geloof. De soldaten wonnen niet door de munt maar door hun overtuiging. Nobunaga begreep dat de geest de strijd wint, niet het getal. De dubbelzijdige munt is niet cynisch — het is de erkenning dat vertrouwen soms een duwtje nodig heeft, en dat het resultaat het middel rechtvaardigt als het om leven en dood gaat."},
{"n":63,"en":"Killing","nl":"Doden","e":"Gasan instructed his adherents one day: \"Those who speak against killing and who desire to spare the lives of all conscious beings are right. It is good to protect even animals and insects. But what about those persons who kill time, what about those who are destroying wealth, and those who destroy political economy? We should not overlook them. Furthermore, what of the one who preaches without enlightenment? He is killing Buddhism.\"","d":"Op een dag onderrichtte Gasan zijn leerlingen: \"Zij die spreken tegen het doden en die het leven van alle bewuste wezens willen sparen, hebben gelijk. Het is goed om zelfs dieren en insecten te beschermen. Maar wat te zeggen van degenen die de tijd doden, van hen die rijkdom vernietigen, en van hen die de politieke economie te gronde richten? Wij mogen hen niet over het hoofd zien. En bovendien, wat te zeggen van hem die predikt zonder verlichting? Hij doodt het boeddhisme.\"","t":["paradox","wijsheid"],"m":1,"ess":"Gasan sprak: wie leven spaart doet goed. Maar wie tijd doodt? Wie rijkdom vernietigt? Wie onderwijst zonder verlichting — die doodt het boeddhisme zelf.\n\nDoden heeft vele vormen. De meest zichtbare — een leven nemen — is niet per se de ergste. Wie zijn dagen verspilt, doodt zijn eigen leven in slow motion. Wie valse leer verspreidt, doodt de waarheid in anderen. De vraag is niet 'dood je?' maar 'wat dood je?' — en of je het door hebt."},
{"n":64,"en":"Kasan Sweat","nl":"Kasans zweet","e":"Kasan was asked to officiate at the funeral of a provincial lord. He had never met lords and nobles before so he was nervous. When the ceremony started, Kasan sweat.\n\nAfterwards, when he had returned, he gathered his pupils together. Kasan confessed that he was not yet qualified to be a teacher, for he lacked the sameness of bearing in the world of fame that he possessed in the secluded temple. Then Kasan resigned and became the pupil of another master. Eight years later he returned to his former pupils, enlightened.","d":"Kasan werd gevraagd de begrafenis van een provinciale heer te leiden. Hij had nooit eerder lords en edelen ontmoet en was zenuwachtig. Toen de ceremonie begon, zweette Kasan.\n\nDaarna, toen hij was thuisgekomen, riep hij zijn leerlingen bijeen. Kasan bekende dat hij nog niet gekwalificeerd was om leraar te zijn, want hij miste in de wereld van roem en aanzien dezelfde gelijkmoedigheid die hij bezat in de afgelegen tempel. Kasan nam ontslag en werd leerling van een andere meester. Acht jaar later keerde hij terug naar zijn vroegere leerlingen — verlicht.","t":["meester","verlichting"],"m":1,"ess":"Kasan transpireerde tijdens de begrafenis van een edelman — nerveus door de status van zijn publiek. Daarna gaf hij toe dat hij nog niet klaar was als leraar en werd opnieuw leerling. Acht jaar later keerde hij terug, verlicht.\n\nDe moed zit niet in het falen maar in het erkennen. Kasan had kunnen doen alsof en verder kunnen gaan. In plaats daarvan gaf hij zijn positie op omdat hij wist dat een leraar die anders presteert voor een edelman dan voor een bedelaar, nog niets begrepen heeft. Ware gelijkmoedigheid is niet weten dat status onbelangrijk is — het is het niet voelen."},
{"n":65,"en":"The Subjugation of a Ghost","nl":"De onderwerping van een geest","e":"A young wife fell sick and was about to die. \"I love you so much,\" she told her husband, \"I do not want to leave you. Do not go from me to any other woman. If you do, I will return as a ghost and cause you endless trouble.\"\n\nSoon the wife passed away. The husband respected her last wish for the first three months, but then he met another woman and fell in love with her. They became engaged to be married.\n\nImmediately after the engagement a ghost appeared every night to the man, blaming him for not keeping his promise. The ghost was clever too. She told him exactly what had transpired between himself and his new sweetheart. Whenever he gave his fiancée a present, the ghost would describe it in detail. She would even repeat conversations, and it so annoyed the man that he could not sleep. Someone advised him to take his problem to a Zen master who lived close to the village. At length, in despair, the poor man went to him for help.\n\n\"Your former wife became a ghost and knows everything you do,\" commented the master. \"Whatever you do or say, whatever you give your beloved, she knows. She must be a very wise ghost. Really you should admire such a ghost. The next time she appears, bargain with her. Tell her that she knows so much you can hide nothing from her, and that if she will answer you one question, you promise to break your engagement and remain single.\"\n\n\"What is the question I must ask her?\" inquired the man.\n\nThe master replied: \"Take a large handful of soy beans and ask her exactly how many beans you hold in your hand. If she cannot tell you, you will know she is only a figment of your imagination and will trouble you no longer.\"\n\nThe next night, when the ghost appeared, the man flattered her and told her that she knew everything.\n\n\"Indeed,\" replied the ghost, \"and I know you went to see that Zen master today.\"\n\n\"And since you know so much,\" demanded the man, \"tell me how many beans I hold in this hand!\"\n\nThere was no longer any ghost to answer the question.","d":"Een jonge vrouw werd ziek en lag op sterven. \"Ik hou zo veel van je,\" zei ze tegen haar man, \"ik wil je niet verlaten. Ga na mij niet naar een andere vrouw. Als je dat doet, kom ik terug als een geest en bezorg ik je eindeloos veel ellende.\"\n\nKort daarna stierf de vrouw. De man respecteerde haar laatste wens de eerste drie maanden, maar toen ontmoette hij een andere vrouw en werd verliefd op haar. Ze raakten verloofd.\n\nDirect na de verloving verscheen er elke nacht een geest aan de man, die hem verweet dat hij zijn belofte niet nakwam. De geest was ook slim. Ze vertelde hem precies wat er tussen hem en zijn nieuwe geliefde had plaatsgevonden. Telkens wanneer hij zijn verloofde een geschenk gaf, beschreef de geest het tot in detail. Ze herhaalde zelfs gesprekken, en het hinderde de man zozeer dat hij niet kon slapen. Iemand raadde hem aan zijn probleem voor te leggen aan een Zen-meester die vlakbij het dorp woonde. Ten slotte, in wanhoop, ging de arme man naar hem toe voor hulp.\n\n\"Je vroegere vrouw is een geest geworden en weet alles wat je doet,\" zei de meester. \"Wat je ook doet of zegt, wat je je geliefde ook geeft — zij weet het. Ze moet een zeer wijze geest zijn. Werkelijk, je zou zo'n geest moeten bewonderen. De volgende keer dat ze verschijnt, onderhandel met haar. Zeg haar dat ze zoveel weet dat je niets voor haar kunt verbergen, en dat als ze één vraag van jou beantwoordt, je belooft je verloving te verbreken en vrijgezel te blijven.\"\n\n\"Welke vraag moet ik haar stellen?\" vroeg de man.\n\nDe meester antwoordde: \"Neem een grote handvol sojabonen en vraag haar precies hoeveel bonen je in je hand houdt. Als ze het je niet kan vertellen, weet je dat ze slechts een verzinsel van je verbeelding is en je niet langer zal kwellen.\"\n\nDe volgende nacht, toen de geest verscheen, vleidde de man haar en zei dat ze alles wist.\n\n\"Inderdaad,\" antwoordde de geest, \"en ik weet dat je vandaag die Zen-meester hebt bezocht.\"\n\n\"En omdat je zoveel weet,\" eiste de man, \"zeg me dan hoeveel bonen ik in deze hand houd!\"\n\nEr was geen geest meer om de vraag te beantwoorden.","t":["paradox","meester"],"m":4,"ess":"Een weduwnaar werd geplaagd door de geest van zijn vrouw die alles wist wat hij deed. De Zen-meester adviseerde: vraag haar hoeveel bonen je in je hand houdt. De geest verdween.\n\nDe geest was zijn eigen schuldgevoel. Ze wist alles wat hij deed omdat hij het zelf allemaal wist — zijn geweten projecteerde haar aanwezigheid. Maar het aantal bonen in een hand is willekeurig, onvoorspelbaar, geen product van schuld. Zodra hij een vraag stelde die buiten zijn eigen geest lag, bleek de geest een illusie. Je demonen weten alleen wat jij weet."},
{"n":66,"en":"Children of His Majesty","nl":"Kinderen van Zijne Majesteit","e":"Yamaoka Tesshu was a tutor of the emperor. He was also a master of fencing and a profound student of Zen. His home was the abode of vagabonds. He had but one suit of clothes, for they kept him always poor.\n\nThe emperor, observing how worn his garments were, gave Yamaoka some money to buy new ones. The next time Yamaoka appeared he wore the same old outfit.\n\n\"What became of the new clothes, Yamaoka?\" asked the emperor.\n\n\"I provided clothes for the children of Your Majesty,\" explained Yamaoka.","d":"Yamaoka Tesshu was een leermeester van de keizer. Hij was ook een meester in het schermen en een diepzinnig beoefenaar van Zen. Zijn huis was de verblijfplaats van zwervers. Hij had maar één stel kleding, want zij hielden hem altijd arm.\n\nDe keizer, die zag hoe versleten zijn kleding was, gaf Yamaoka geld om nieuwe te kopen. De volgende keer dat Yamaoka verscheen droeg hij hetzelfde oude pak.\n\n\"Wat is er van de nieuwe kleren geworden, Yamaoka?\" vroeg de keizer.\n\n\"Ik heb kleding verschaft aan de kinderen van Uwe Majesteit,\" legde Yamaoka uit.","t":["wijsheid","compassie"],"m":1,"ess":"De keizer gaf Yamaoka Tesshu geld voor nieuwe kleren. De volgende keer droeg hij dezelfde versleten kleren. 'Ik heb kleren gekocht voor de kinderen van Uwe Majesteit,' zei hij — bedoelende de daklozen.\n\nYamaoka koos de nood van anderen boven zijn eigen comfort, en deed dat zonder er ophef over te maken. De elegantie zit in het woord 'kinderen van Uwe Majesteit' — hij gaf de keizer het compliment dat alle onderdanen zijn kinderen zijn. Ware loyaliteit is niet je heer behagen maar zijn volk dienen."},
{"n":67,"en":"What Are You Doing! What Are You Saying!","nl":"Wat doe je! Wat zeg jij!","e":"In modern times a great deal of nonsense is talked about masters and disciples, and about the inheritance of a master's teaching by favorite pupils, entitling them to pass the truth on to their adherents. Of course Zen should be imparted in this way, from heart to heart, and in the past it was really accomplished. Silence and humility reigned rather than profession and assertion. The one who received such a teaching kept the matter hidden even after twenty years. Not until another discovered through his own need that a real master was at hand was it learned that the teaching had been imparted, and even then the occasion arose quite naturally and the teaching made its way in its own right. Under no circumstances did the teacher even claim \"I am the successor of So-and-so.\" Such a claim would prove quite the contrary.\n\nThe Zen master Mu-nan had only one successor. His name was Shoju. After Shoju had completed his study of Zen, Mu-nan called him into his room. \"I am getting old,\" he said, \"and as far as I know, Shoju, you are the only one who will carry on this teaching. Here is a book. It has been passed down from master to master for seven generations. I also have added many points according to my understanding. The book is very valuable, and I am giving it to you to represent your successorship.\"\n\n\"If the book is such an important thing, you had better keep it,\" Shoju replied. \"I received your Zen without writing and am satisfied with it as it is.\"\n\n\"I know that,\" said Mu-nan. \"Even so, this work has been carried from master to master for seven generations, so you may keep it as a symbol of having received the teaching. Here.\"\n\nThe two happened to be talking before a brazier. The instant Shoju felt the book in his hands he thrust it into the flaming coals. He had no lust for possessions.\n\nMu-nan, who never had been angry before, yelled: \"What are you doing!\"\n\nShoju shouted back: \"What are you saying!\"","d":"In de moderne tijd wordt er veel onzin gesproken over meesters en leerlingen, en over de overerving van de leer van een meester door favoriete leerlingen, waarmee zij het recht zouden hebben de waarheid door te geven aan hun volgelingen. Zen moet natuurlijk op deze manier worden doorgegeven, van hart tot hart, en in het verleden werd dit werkelijk bereikt. Stilte en bescheidenheid overheersten, niet het uitroepen en beweren. Degene die zo'n lering ontving, hield de zaak verborgen zelfs na twintig jaar. Pas wanneer een ander door zijn eigen behoefte ontdekte dat er een echte meester aanwezig was, werd bekend dat de lering was doorgegeven — en zelfs dan ontstond de gelegenheid heel natuurlijk en baande de lering zich op eigen kracht een weg. Onder geen enkele omstandigheid deed de leraar zelfs de bewering: \"Ik ben de opvolger van die en die.\" Zo'n bewering zou precies het tegendeel bewijzen.\n\nDe Zen-meester Mu-nan had slechts één opvolger. Zijn naam was Shoju. Nadat Shoju zijn studie van Zen had voltooid, riep Mu-nan hem bij zich. \"Ik word oud,\" zei hij, \"en voor zover ik weet, Shoju, ben jij de enige die deze lering zal voortzetten. Hier is een boek. Het is van meester op meester doorgegeven gedurende zeven generaties. Ik heb er ook vele punten aan toegevoegd naar mijn inzicht. Het boek is zeer waardevol, en ik geef het aan jou als bewijs van je opvolgersschap.\"\n\n\"Als het boek zo belangrijk is, kunt u het beter zelf houden,\" antwoordde Shoju. \"Ik heb uw Zen ontvangen zonder geschrift en ben er tevreden mee zoals het is.\"\n\n\"Dat weet ik,\" zei Mu-nan. \"Toch is dit werk zeven generaties lang van meester op meester overgedragen, dus je kunt het bewaren als symbool dat je de lering hebt ontvangen. Hier.\"\n\nDe twee waren toevallig in gesprek voor een vuurpot. Het moment dat Shoju het boek in zijn handen voelde, stak hij het in de brandende kolen. Hij had geen verlangen naar bezittingen.\n\nMu-nan, die nooit eerder boos was geweest, schreeuwde: \"Wat doe je!\"\n\nShoju schreeuwde terug: \"Wat zeg jij!\"","t":["eenvoud","meester"],"m":3,"ess":"Mu-nan gaf zijn opvolger Shoju een boek dat zeven generaties van meester op meester was doorgegeven. Shoju gooide het in het vuur. 'Wat doe je!' schreeuwde Mu-nan. 'Wat zeg jij!' schreeuwde Shoju terug.\n\nHet boek was een symbool, geen wijsheid. Shoju had de leer ontvangen zonder geschrift en was er tevreden mee. Door het boek te verbranden bewees hij precies wat erin stond: hecht je nergens aan, zelfs niet aan de leer zelf. Mu-nan's woede onthulde zijn eigen gehechtheid — de leraar had nog iets te leren van de leerling."},
{"n":68,"en":"One Note of Zen","nl":"Eén noot van Zen","e":"After Kakua visited the emperor he disappeared and no one knew what became of him. He was the first Japanese to study Zen in China, but since he showed nothing of it, save one note, he is not remembered for having brought Zen into his country.\n\nKakua visited China and accepted the true teaching. He did not travel while he was there. Meditating constantly, he lived on a remote part of a mountain. Whenever people found him and asked him to preach he would say a few words and then move to another part of the mountain where he could be found less easily.\n\nThe emperor heard about Kakua when he returned to Japan and asked him to preach Zen for his edification and that of his subjects.\n\nKakua stood before the emperor in silence. He then produced a flute from the folds of his robe, and blew one short note. Bowing politely, he disappeared.","d":"Nadat Kakua de keizer had bezocht, verdween hij en niemand wist wat er van hem was geworden. Hij was de eerste Japanner die Zen studeerde in China, maar omdat hij er niets van toonde behalve één noot, wordt hij niet herinnerd als degene die Zen zijn land heeft binnengebracht.\n\nKakua bezocht China en aanvaardde de ware leer. Tijdens zijn verblijf reisde hij niet. Voortdurend mediterend leefde hij op een afgelegen deel van een berg. Wanneer mensen hem vonden en vroegen te preken, zei hij een paar woorden en verhuisde naar een ander deel van de berg waar hij minder gemakkelijk te vinden was.\n\nDe keizer hoorde over Kakua toen hij terugkeerde naar Japan en vroeg hem Zen te preken ter stichting van hemzelf en zijn onderdanen.\n\nKakua stond zwijgend voor de keizer. Vervolgens haalde hij een fluit uit de plooien van zijn gewaad en blies één korte noot. Beleefd buigend verdween hij.","t":["kunst","verlichting"],"m":2,"ess":"Kakua studeerde Zen in China en keerde terug naar Japan. De keizer vroeg hem te prediken. Kakua stond in stilte, blies één noot op een fluit, boog, en verdween.\n\nEén noot. Geen uitleg, geen soetra's, geen debat. Kakua weigerde Zen te reduceren tot woorden. De noot was geen symbool voor iets — het was de hele leer, compleet in haar eenvoud. Japan herinnert zich Kakua nauwelijks, en dat is precies het punt: wie de leer leeft in plaats van verkoopt, laat geen spoor na behalve de leer zelf."},
{"n":69,"en":"Eating the Blame","nl":"De schuld opeten","e":"Circumstances arose one day which delayed preparation of the dinner of a Soto Zen master, Fugai, and his followers. In haste the cook went to the garden with his curved knife and cut off the tops of green vegetables, chopped them together, and made soup, unaware that in his haste he had included a part of a snake in the vegetables.\n\nThe followers of Fugai thought they never had tasted such good soup. But when the master himself found the snake's head in his bowl, he summoned the cook. \"What is this?\" he demanded, holding up the head of the snake.\n\n\"Oh, thank you, master,\" replied the cook, taking the morsel and eating it quickly.","d":"Op een dag deden zich omstandigheden voor waardoor de bereiding van het avondmaal van de Soto Zen-meester Fugai en zijn volgelingen werd vertraagd. In haast ging de kok de tuin in met zijn gebogen mes, sneed de toppen van groene groenten af, hakte ze door elkaar en maakte soep, niet beseffend dat hij in zijn haast een stuk slang bij de groenten had gesneden.\n\nDe volgelingen van Fugai dachten dat ze nog nooit zulke lekkere soep hadden geproefd. Maar toen de meester zelf het hoofd van de slang in zijn kom vond, ontbood hij de kok. \"Wat is dit?\" eiste hij, het hoofd van de slang omhooghoudend.\n\n\"O, dank u, meester,\" antwoordde de kok, terwijl hij het hapje nam en het snel opat.","t":["compassie","meester"],"m":1,"ess":"De kok van meester Fugai had per ongeluk een slang in de groentesoep gesneden. Toen Fugai de slangenkop vond en hem confronteerde, zei de kok: 'Dank u, meester' — en at de kop op.\n\nGeen excuus, geen uitleg, geen beschuldiging. De kok nam de volledige schuld en loste het op in één gebaar. 'De schuld opeten' is hier letterlijk en figuurlijk. In Zen is het schoonste antwoord op een fout niet het uitleggen maar het accepteren — snel, totaal, zonder drama."},
{"n":70,"en":"The Most Valuable Thing in the World","nl":"Het kostbaarste ding ter wereld","e":"Sozan, a Chinese Zen master, was asked by a student: \"What is the most valuable thing in the world?\"\n\nThe master replied: \"The head of a dead cat.\"\n\n\"Why is the head of a dead cat the most valuable thing in the world?\" inquired the student.\n\nSozan replied: \"Because no one can name its price.\"","d":"Sozan, een Chinese Zen-meester, werd door een leerling gevraagd: \"Wat is het kostbaarste ding ter wereld?\"\n\nDe meester antwoordde: \"Het hoofd van een dode kat.\"\n\n\"Waarom is het hoofd van een dode kat het kostbaarste ding ter wereld?\" vroeg de leerling.\n\nSozan antwoordde: \"Omdat niemand er een prijs voor kan noemen.\"","t":["wijsheid","eenvoud"],"m":1,"ess":"Sozan werd gevraagd wat het meest waardevolle ding ter wereld is. Zijn antwoord: de kop van een dode kat. Waarom? Omdat niemand er een prijs aan kan geven.\n\nWat geen marktwaarde heeft, is onbetaalbaar. De kop van een dode kat is waardeloos en daardoor niet te koop, niet te bezitten, niet te verhandelen. Net als de maan, net als een moment van stilte, net als verlichting zelf — het waardevol is juist dat wat buiten het systeem van waarde valt."},
{"n":71,"en":"Learning to Be Silent","nl":"Leren zwijgen","e":"The pupils of the Tendai school used to study meditation before Zen entered Japan. Four of them who were intimate friends promised one another to observe seven days of silence.\n\nOn the first day all were silent. Their meditation had begun auspiciously, but when night came and the oil lamps were growing dim one of the pupils could not help exclaiming to a servant: \"Fix those lamps.\"\n\nThe second pupil was surprised to hear the first one talk. \"We are not supposed to say a word,\" he remarked.\n\n\"You two are stupid. Why did you talk?\" asked the third.\n\n\"I am the only one who has not talked,\" concluded the fourth pupil.","d":"De leerlingen van de Tendai-school plachten meditatie te beoefenen voordat Zen Japan binnenkwam. Vier van hen, die goede vrienden waren, beloofden elkaar zeven dagen stilte in acht te nemen.\n\nOp de eerste dag waren allen stil. Hun meditatie was gunstig begonnen, maar toen de nacht viel en de olielampen begonnen te dimmen kon een van de leerlingen het niet laten tegen een bediende uit te roepen: \"Maak die lampen in orde.\"\n\nDe tweede leerling was verrast de eerste te horen praten. \"We mogen geen woord zeggen,\" merkte hij op.\n\n\"Jullie twee zijn dom. Waarom hebben jullie gesproken?\" vroeg de derde.\n\n\"Ik ben de enige die niet gesproken heeft,\" besloot de vierde leerling.","t":["stilte","wijsheid"],"m":1,"ess":"Vier monniken beloofden zeven dagen te zwijgen. De eerste avond zei er één: 'Doe die lampen aan.' De tweede: 'We mochten niet praten.' De derde: 'Waarom praten jullie dan?' De vierde: 'Ik ben de enige die niet gepraat heeft.'\n\nIn vier zinnen valt elk ego door de mand. De eerste verloor het door comfort, de tweede door correctie, de derde door superioriteit, de vierde door trots. Stilte is niet de afwezigheid van geluid maar de afwezigheid van het ego dat wil laten zien hoe stil het is."},
{"n":72,"en":"The Blockhead Lord","nl":"De domme heer","e":"Two Zen teachers, Daigu and Gudo, were invited to visit a lord. Upon arriving, Gudo said to the lord: \"You are wise by nature and have an inborn ability to learn Zen.\"\n\n\"Nonsense,\" said Daigu. \"Why do you flatter this blockhead? He may be a lord, but he doesn't know anything of Zen.\"\n\nSo, instead of building a temple for Gudo, the lord built it for Daigu and studied Zen with him.","d":"Twee Zen-leraren, Daigu en Gudo, werden uitgenodigd een heer te bezoeken. Bij aankomst zei Gudo tegen de heer: \"U bent van nature wijs en hebt een aangeboren vermogen om Zen te leren.\"\n\n\"Onzin,\" zei Daigu. \"Waarom vleit u deze domkop? Hij mag dan een heer zijn, maar hij weet niets van Zen.\"\n\nDus in plaats van een tempel voor Gudo te bouwen, bouwde de heer die voor Daigu en studeerde Zen bij hem.","t":["humor","wijsheid"],"m":1,"ess":"Gudo vleidde een heer: 'Je hebt een natuurlijk talent voor Zen.' Daigu zei: 'Onzin, wat weet die domkop van Zen?' De heer bouwde een tempel voor Daigu en studeerde bij hem.\n\nDe heer koos de eerlijke leraar boven de vleier. Daigu's belediging was een groter compliment dan Gudo's lof — het behandelde de heer als iemand die de waarheid aankon. Wie je vleit, onderschat je. Wie je confronteert, respecteert je genoeg om eerlijk te zijn."},
{"n":73,"en":"Ten Successors","nl":"Tien opvolgers","e":"Zen pupils take a vow that even if they are killed by their teacher, they intend to learn Zen. Usually they cut a finger and seal their resolution with blood. In time the vow has become a mere formality, and for this reason the pupil who died by the hand of Ekido was made to appear a martyr.\n\nEkido had become a severe teacher. His pupils feared him. One of them on duty, striking the gong to tell the time of day, missed his beats when his eye was attracted by a beautiful girl passing the temple gate.\n\nAt that moment Ekido, who was directly behind him, hit him with a stick, and the shock happened to kill him.\n\nThe pupil's guardian, hearing of the accident, went directly to Ekido. Knowing that he was not to blame, he praised the master for his severe teaching. Ekido's attitude was just the same as if the pupil were still alive.\n\nAfter this took place, he was able to produce under his guidance more than ten enlightened successors, a very unusual number.","d":"Zen-leerlingen leggen een gelofte af dat ze, zelfs als ze door hun leraar gedood worden, Zen willen leren. Gewoonlijk snijden ze in een vinger en bezegelen hun besluit met bloed. In de loop der tijd is de gelofte een lege formaliteit geworden, en om die reden werd de leerling die stierf door de hand van Ekido voorgesteld als een martelaar.\n\nEkido was een strenge leraar geworden. Zijn leerlingen vreesden hem. Een van hen, die dienst had en de gong sloeg om het tijdstip aan te geven, miste zijn slagen toen zijn oog werd getrokken door een mooi meisje dat voorbij de tempelpoort liep.\n\nOp dat moment sloeg Ekido, die vlak achter hem stond, hem met een stok, en de schok doodde hem.\n\nDe voogd van de leerling, die van het ongeluk hoorde, ging rechtstreeks naar Ekido. In de wetenschap dat hij geen schuld trof, prees hij de meester om zijn strenge onderricht. Ekido's houding was precies hetzelfde als wanneer de leerling nog had geleefd.\n\nNa dit voorval was hij in staat onder zijn leiding meer dan tien verlichte opvolgers voort te brengen — een uitzonderlijk groot aantal.","t":["meester","wijsheid"],"m":2,"ess":"Ekido doodde per ongeluk een leerling met een klap. De vader prees hem. Daarna produceerde Ekido meer dan tien verlichte opvolgers — ongewoon veel.\n\nDit is geen verheerlijking van geweld maar een illustratie van totale toewijding. Ekido's strengheid kwam niet voort uit wreedheid maar uit de overtuiging dat Zen leven en dood is, niet een hobby. De vader die de meester prees begreep wat de meeste ouders niet zouden begrijpen: de inzet was reëel, en daarom waren de resultaten reëel."},
{"n":74,"en":"True Reformation","nl":"Ware hervorming","e":"Ryokan devoted his life to the study of Zen. One day he heard that his nephew, despite the admonitions of relatives, was spending his money on a courtesan. Inasmuch as the nephew had taken Ryokan's place in managing the family estate and the property was in danger of being dissipated, the relatives asked Ryokan to do something about it.\n\nRyokan had to travel a long way to visit his nephew, whom he had not seen for many years. The nephew seemed pleased to meet his uncle again and invited him to remain overnight.\n\nAll night Ryokan sat in meditation. As he was departing in the morning he said to the young man: \"I must be getting old, my hand shakes so. Will you help me tie the string of my straw sandal?\"\n\nThe nephew helped him willingly. \"Thank you,\" finished Ryokan. \"You see, a man becomes older and feebler day by day. Take good care of yourself.\" Then Ryokan left, never mentioning a word about the courtesan or the complaints of the relatives. But, from that morning on, the dissipations of the nephew ended.","d":"Ryokan wijdde zijn leven aan de studie van Zen. Op een dag hoorde hij dat zijn neef, ondanks de vermaningen van familieleden, zijn geld uitgaf aan een courtisane. Aangezien de neef Ryokans plaats had ingenomen in het beheer van het familiedomein en het bezit gevaar liep te worden verkwanseld, vroegen de familieleden Ryokan in te grijpen.\n\nRyokan moest een lange reis maken om zijn neef te bezoeken, die hij jaren niet had gezien. De neef leek verheugd zijn oom weer te zien en nodigde hem uit om te blijven overnachten.\n\nDe hele nacht zat Ryokan in meditatie. Toen hij 's ochtends vertrok, zei hij tegen de jongeman: \"Ik word oud, mijn hand trilt zo. Wil je me helpen het koord van mijn strooien sandaal vast te binden?\"\n\nDe neef hielp hem gewillig. \"Dank je,\" besloot Ryokan. \"Zie je, een mens wordt dag na dag ouder en zwakker. Zorg goed voor jezelf.\" Daarna vertrok Ryokan, zonder een woord te zeggen over de courtisane of de klachten van de familieleden. Maar vanaf die ochtend kwamen de losbandigheden van de neef ten einde.","t":["compassie","kracht"],"m":2,"ess":"Ryokan reisde ver om zijn verkwistende neef te bezoeken. Hij gaf geen preek, geen vermaning, geen advies. Bij het vertrek vroeg hij alleen: 'Wil je me helpen mijn sandaal vast te binden? Mijn handen trillen.'\n\nEen traan viel op de hand van de neef. Vanaf dat moment stopte de verkwisting. Ryokan onderwees zonder te onderwijzen. De trillende handen toonden kwetsbaarheid, ouderdom, vergankelijkheid — alles wat een preek in woorden nooit had kunnen overbrengen. Soms is het krachtigste wat je kunt doen niet spreken maar je zwakte tonen."},
{"n":75,"en":"Temper","nl":"Drift","e":"A Zen student came to Bankei and complained: \"Master, I have an ungovernable temper. How can I cure it?\"\n\n\"You have something very strange,\" replied Bankei. \"Let me see what you have.\"\n\n\"Just now I cannot show it to you,\" replied the other.\n\n\"When can you show it to me?\" asked Bankei.\n\n\"It arises unexpectedly,\" replied the student.\n\n\"Then,\" concluded Bankei, \"it must not be your own true nature. If it were, you could show it to me at any time. When you were born you did not have it, and your parents did not give it to you. Think that over.\"","d":"Een Zen-leerling kwam naar Bankei en klaagde: \"Meester, ik heb een onbedwingbare drift. Hoe kan ik die genezen?\"\n\n\"Je hebt iets heel vreemds,\" antwoordde Bankei. \"Laat me zien wat je hebt.\"\n\n\"Op dit moment kan ik het u niet laten zien,\" antwoordde de ander.\n\n\"Wanneer kun je het me laten zien?\" vroeg Bankei.\n\n\"Het ontstaat onverwacht,\" antwoordde de leerling.\n\n\"Dan,\" besloot Bankei, \"kan het niet je eigen ware natuur zijn. Als het dat was, kon je het me op elk moment laten zien. Toen je werd geboren had je het niet, en je ouders hebben het je niet gegeven. Denk daar maar eens over na.\"","t":["kracht","meester"],"m":1,"ess":"Bankei vroeg de student met het onbeheersbare temperament: 'Laat het me zien.' 'Nu kan ik het niet tonen.' 'Dan is het niet je ware aard.'\n\nAls woede je ware natuur was, zou je het altijd kunnen tonen — zoals je je hand kunt laten zien. Maar woede komt en gaat, wat betekent dat het niet van jou is. Je ouders gaven het je niet, je werd er niet mee geboren. Dit is geen psychologisch trucje maar een fundamenteel inzicht: wat verschijnt en verdwijnt kan niet zijn wie je werkelijk bent."},
{"n":76,"en":"The Stone Mind","nl":"De stenen geest","e":"Hogen, a Chinese Zen teacher, lived alone in a small temple in the country. One day four traveling monks appeared and asked if they might make a fire in his yard to warm themselves.\n\nWhile they were building the fire, Hogen heard them arguing about subjectivity and objectivity. He joined them and said: \"There is a big stone. Do you consider it to be inside or outside your mind?\"\n\nOne of the monks replied: \"From the Buddhist viewpoint everything is an objectification of mind, so I would say that the stone is inside my mind.\"\n\n\"Your head must feel very heavy,\" observed Hogen, \"if you are carrying around a stone like that in your mind.\"","d":"Hogen, een Chinese Zen-leraar, woonde alleen in een kleine tempel op het platteland. Op een dag verschenen vier rondtrekkende monniken die vroegen of ze in zijn tuin een vuur mochten maken om zich te warmen.\n\nTerwijl ze het vuur aanstaken, hoorde Hogen hen redetwisten over subjectiviteit en objectiviteit. Hij voegde zich bij hen en zei: \"Daar ligt een grote steen. Beschouw je die als zijnde binnen of buiten je geest?\"\n\nEen van de monniken antwoordde: \"Vanuit boeddhistisch oogpunt is alles een objectivering van de geest, dus ik zou zeggen dat de steen zich in mijn geest bevindt.\"\n\n\"Je hoofd moet wel erg zwaar aanvoelen,\" merkte Hogen op, \"als je zo'n steen met je meedraagt in je geest.\"","t":["kracht","verlichting"],"m":1,"ess":"Hogen vroeg rondtrekkende monniken: 'Die grote steen daar — zit hij binnen of buiten je geest?' Eén antwoordde: 'Vanuit boeddhistisch oogpunt is alles geest, dus de steen zit in mijn geest.' 'Je hoofd moet zwaar zijn,' zei Hogen.\n\nFilosofie die je belast is geen bevrijding. De monnik gaf het correcte schoolantwoord maar had er niets aan — hij liep nu met een steen in zijn hoofd. Het punt is niet of de steen binnen of buiten is, maar dat de vraag zelf een val is. Hogen's humor snijdt dieper dan zijn filosofie."},
{"n":77,"en":"No Attachment to Dust","nl":"Geen gehechtheid aan stof","e":"Zengetsu, a Chinese master of the T'ang dynasty, wrote the following advice for his pupils:\n\nLiving in the world yet not forming attachments to the dust of the world is the way of a true Zen student.\n\nWhen witnessing the good action of another encourage yourself to follow his example. Hearing of the mistaken action of another advise yourself not to emulate it.\n\nEven though alone in a dark room be as if you were facing a noble guest. Express your feelings, but become no more expressive than your true nature.\n\nPoverty is your treasure. Never exchange it for an easy life.\n\nA person may appear a fool and yet not be one. He may only be guarding his wisdom carefully.\n\nVirtues are the fruit of self-discipline and do not drop from heaven of themselves as rain or snow.\n\nModesty is the foundation of all virtues. Let your neighbors discover you before you make yourself known to them.\n\nA noble heart never forces itself forward. Its words are as rare gems, seldom displayed and of great value.\n\nTo a sincere student every day is a fortunate day. Time passes but he never lags behind. Neither glory nor shame can move him.\n\nCensure yourself, never another. Do not discuss right and wrong.\n\nSome things, though right, were considered wrong for generations. Since the value of righteousness may be recognized after centuries, there is no need to crave an immediate appreciation.\n\nLive with cause and leave results to the great law of the universe. Pass each day in peaceful contemplation.","d":"Zengetsu, een Chinese meester uit de T'ang-dynastie, schreef de volgende raadgevingen voor zijn leerlingen:\n\nIn de wereld leven zonder gehechtheid te vormen aan het stof van de wereld — dat is de weg van een ware Zen-leerling.\n\nAls je getuige bent van een goede daad van een ander, spoor jezelf dan aan zijn voorbeeld te volgen. Als je hoort van de verkeerde handeling van een ander, raad jezelf dan aan die niet na te volgen.\n\nZelfs als je alleen bent in een donkere kamer, gedraag je alsof je voor een edele gast staat. Geef uiting aan je gevoelens, maar word niet expressiever dan je ware natuur.\n\nArmoede is je schat. Verruil haar nooit voor een gemakkelijk leven.\n\nEen persoon kan eruitzien als een dwaas en het toch niet zijn. Hij bewaakt misschien slechts zorgvuldig zijn wijsheid.\n\nDeugden zijn de vrucht van zelfdiscipline en vallen niet vanzelf uit de hemel als regen of sneeuw.\n\nBescheidenheid is het fundament van alle deugden. Laat je buren je ontdekken voordat je jezelf bij hen bekend maakt.\n\nEen nobel hart dringt zich nooit op. Zijn woorden zijn als zeldzame edelstenen — zelden getoond en van grote waarde.\n\nVoor een oprechte leerling is elke dag een gelukkige dag. De tijd gaat voorbij maar hij blijft nooit achter. Noch roem noch schaamte kan hem bewegen.\n\nBekritiseer jezelf, nooit een ander. Redetwist niet over goed en kwaad.\n\nSommige dingen, hoewel juist, werden generaties lang als onjuist beschouwd. Omdat de waarde van rechtschapenheid na eeuwen erkend kan worden, is er geen behoefte aan onmiddellijke waardering.\n\nLeef met oorzaak en laat de resultaten over aan de grote wet van het heelal. Breng elke dag door in vredige overpeinzing.","t":["gehechtheid","wijsheid"],"m":3,"ess":"Zengetsu's advies aan zijn leerlingen: leef in de wereld zonder gehecht te raken aan het stof. Armoede is je schat. Een edel hart dringt zich nooit op.\n\nDit is geen lijst regels maar een portret van vrijheid. Elke richtlijn wijst dezelfde kant op: wees aanwezig zonder te grijpen, wees sterk zonder op te vallen, wees goed zonder het te claimen. 'Armoede is je schat' is de kern — niet omdat gebrek deugdzaam is, maar omdat wie niets nodig heeft van de wereld, vrij is om er volledig in te leven."},
{"n":78,"en":"Real Prosperity","nl":"Echte voorspoed","e":"A rich man asked Sengai to write something for the continued prosperity of his family so that it might be treasured from generation to generation.\n\nSengai obtained a large sheet of paper and wrote: \"Father dies, son dies, grandson dies.\"\n\nThe rich man became angry. \"I asked you to write something for the happiness of my family! Why do you make such a joke as this?\"\n\n\"No joke is intended,\" explained Sengai. \"If before you yourself die your son should die, this would grieve you greatly. If your grandson should pass away before your son, both of you would be broken-hearted. If your family, generation after generation, passes away in the order I have named, it will be the natural course of life. I call this real prosperity.\"","d":"Een rijk man vroeg Sengai iets te schrijven voor de voortdurende voorspoed van zijn familie, zodat het van generatie op generatie gekoesterd kon worden.\n\nSengai nam een groot vel papier en schreef: \"Vader sterft, zoon sterft, kleinzoon sterft.\"\n\nDe rijke man werd boos. \"Ik vroeg u iets te schrijven voor het geluk van mijn familie! Waarom maakt u zo'n grap?\"\n\n\"Er is geen grap bedoeld,\" legde Sengai uit. \"Als vóór uw eigen dood uw zoon zou sterven, zou u daar diep door bedroefd zijn. Als uw kleinzoon vóór uw zoon zou heengaan, zouden u beiden gebroken zijn van verdriet. Als uw familie, generatie na generatie, heengaat in de volgorde die ik heb genoemd, zal dat de natuurlijke gang van het leven zijn. Dit noem ik echte voorspoed.\"","t":["wijsheid","eenvoud"],"m":1,"ess":"Een rijke man vroeg Sengai iets te schrijven voor blijvende familievoorspoed. Sengai schreef: 'Vader sterft, zoon sterft, kleinzoon sterft.' De man was woedend.\n\nMaar Sengai legde uit: als je zoon voor jou sterft, is dat verdriet. Als de volgorde klopt — elke generatie na de vorige — is dat het natuurlijke verloop. Echte voorspoed is niet dat niemand sterft, maar dat iedereen op het juiste moment sterft. We willen geluk zonder vergankelijkheid, maar dat bestaat niet. Het accepteren van de juiste volgorde IS het geluk."},
{"n":79,"en":"Incense Burner","nl":"De wierookbrander","e":"A woman of Nagasaki named Kame was one of the few makers of incense burners in Japan. Such a burner is a work of art to be used only in a tearoom or before a family shrine.\n\nKame, whose father before her had been such an artist, was fond of drinking. She also smoked and associated with men most of the time. Whenever she made a little money she gave a feast inviting artists, poets, carpenters, workers, men of many vocations and avocations. In their association she evolved her designs.\n\nKame was exceedingly slow in creating, but when her work was finished it was always a masterpiece. Her burners were treasured in homes whose womenfolk never drank, smoked, or associated freely with men.\n\nThe mayor of Nagasaki once requested Kame to design an incense burner for him. She delayed doing so until almost half a year had passed. At that time the mayor, who had been promoted to office in a distant city, visited her. He urged Kame to begin work on his burner.\n\nAt last receiving the inspiration, Kame made the incense burner. After it was completed she placed it upon a table. She looked at it long and carefully. She smoked and drank before it as if it were her own company. All day she observed it.\n\nAt last, picking up a hammer, Kame smashed it to bits. She saw it was not the perfect creation her mind demanded.","d":"Een vrouw uit Nagasaki genaamd Kame was een van de weinige makers van wierookbranders in Japan. Zo'n brander is een kunstwerk dat alleen in een theekamer of voor een familiealtaar wordt gebruikt.\n\nKame, wier vader vóór haar zo'n kunstenaar was geweest, hield van drinken. Ze rookte ook en ging het grootste deel van de tijd om met mannen. Wanneer ze wat geld verdiende, gaf ze een feest en nodigde kunstenaars, dichters, timmerlieden, arbeiders uit, mannen van vele beroepen en liefhebberijen. In hun gezelschap ontwikkelde ze haar ontwerpen.\n\nKame was buitengewoon traag in het scheppen, maar als haar werk af was, was het altijd een meesterwerk. Haar branders werden gekoesterd in huizen waarvan de vrouwen nooit dronken, rookten of vrijelijk met mannen omgingen.\n\nDe burgemeester van Nagasaki vroeg Kame ooit een wierookbrander voor hem te ontwerpen. Ze stelde het uit tot er bijna een half jaar was verstreken. Op dat moment bezocht de burgemeester, die was bevorderd naar een ambt in een verre stad, haar. Hij drong er bij Kame op aan met het werk te beginnen.\n\nEindelijk de inspiratie ontvangend, maakte Kame de wierookbrander. Nadat deze voltooid was, plaatste ze hem op een tafel. Ze bekeek hem lang en zorgvuldig. Ze rookte en dronk ervoor alsof het haar eigen gezelschap was. De hele dag observeerde ze hem.\n\nUiteindelijk pakte ze een hamer op en sloeg Kame hem aan gruzelementen. Ze zag dat het niet de perfecte schepping was die haar geest verlangde.","t":["kunst","kracht"],"m":2,"ess":"Kame maakte wierookbranders — langzaam, met drinken, roken en feesten met allerlei mensen. Haar werk was altijd een meesterwerk. Eén keer sloeg ze een af stuk kapot nadat ze er de hele dag naar had gekeken.\n\nKame's proces was haar product. De feesten waren geen afleiding maar inspiratie — ze absorbeerde leven en goot het in klei. En toen het eindresultaat niet voldeed aan wat haar geest eiste, vernietigde ze het zonder aarzeling. Meesterschap is niet elke keer raak schieten — het is weten wanneer het mis is en de moed hebben om opnieuw te beginnen."},
{"n":80,"en":"The Real Miracle","nl":"Het echte wonder","e":"When Bankei was preaching at Ryumon temple, a Shinshu priest, who believed in salvation through the repetition of the name of the Buddha of Love, was jealous of his large audience and wanted to debate with him.\n\nBankei was in the midst of a talk when the priest appeared, but the fellow made such a disturbance that Bankei stopped his discourse and asked about the noise.\n\n\"The founder of our sect,\" boasted the priest, \"had such miraculous powers that he held a brush in his hand on one bank of the river, his attendant held up a paper on the other bank, and the teacher wrote the holy name of Amida through the air. Can you do such a wonderful thing?\"\n\nBankei replied lightly: \"Perhaps your fox can perform that trick, but that is not the manner of Zen. My miracle is that when I feel hungry I eat, and when I feel thirsty I drink.\"","d":"Toen Bankei predikte in de Ryumon-tempel was een Shinshu-priester, die geloofde in verlossing door het herhalen van de naam van de Boeddha van Liefde, jaloers op zijn grote publiek en wilde met hem debatteren.\n\nBankei was midden in een toespraak toen de priester verscheen, maar de man maakte zoveel ophef dat Bankei zijn betoog stopte en naar het lawaai vroeg.\n\n\"De stichter van onze sekte,\" pochte de priester, \"had zulke wonderbaarlijke krachten dat hij een penseel in zijn hand hield op de ene oever van de rivier, zijn bediende hield een papier omhoog op de andere oever, en de leraar schreef de heilige naam van Amida door de lucht. Kunt u zoiets wonderlijks?\"\n\nBankei antwoordde luchtig: \"Misschien kan jouw vos dat kunstje uitvoeren, maar dat is niet de manier van Zen. Mijn wonder is dat wanneer ik honger heb, ik eet, en wanneer ik dorst heb, ik drink.\"","t":["humor","eenvoud"],"m":2,"ess":"Een priester schepte op dat zijn stichter met een penseel in de lucht de naam van Amida kon schrijven. 'Mijn wonder,' zei Bankei, 'is dat ik eet als ik honger heb en drink als ik dorst heb.'\n\nHet spektaculaire is afleidend. Wonderen die de zwaartekracht trotseren zijn trucs; het echte wonder is volledige aanwezigheid in het gewone. Eten als je honger hebt klinkt triviaal, maar hoeveel mensen eten uit verveling, stress of gewoonte? Bankei's wonder is: leven zonder ruis, handelen zonder omweg."},
{"n":81,"en":"Just Go to Sleep","nl":"Ga gewoon slapen","e":"Gasan was sitting at the bedside of Tekisui three days before his teacher's passing. Tekisui had already chosen him as his successor.\n\nA temple recently had burned and Gasan was busy rebuilding the structure. Tekisui asked him: \"What are you going to do when you get the temple rebuilt?\"\n\n\"When your sickness is over we want you to speak there,\" said Gasan.\n\n\"Suppose I do not live until then?\"\n\n\"Then we will get someone else,\" replied Gasan.\n\n\"Suppose you cannot find anyone?\" continued Tekisui.\n\nGasan answered loudly: \"Don't ask such foolish questions. Just go to sleep.\"","d":"Gasan zat aan het bed van Tekisui, drie dagen voor het heengaan van zijn leraar. Tekisui had hem al als zijn opvolger gekozen.\n\nEen tempel was onlangs afgebrand en Gasan was bezig de structuur te herbouwen. Tekisui vroeg hem: \"Wat ga je doen als de tempel herbouwd is?\"\n\n\"Als uw ziekte voorbij is, willen we dat u daar spreekt,\" zei Gasan.\n\n\"Stel dat ik dan niet meer leef?\"\n\n\"Dan zoeken we iemand anders,\" antwoordde Gasan.\n\n\"Stel dat je niemand kunt vinden?\" ging Tekisui verder.\n\nGasan antwoordde luid: \"Stel niet zulke dwaze vragen. Ga gewoon slapen.\"","t":["dood","humor"],"m":1,"ess":"Gasan zat aan het sterfbed van zijn leraar Tekisui. 'Wat doe je als de tempel herbouwd is?' 'Dan spreken we u uit.' 'En als ik dood ben?' 'Dan zoeken we iemand anders.' Tekisui bleef doorvragen. 'Ga slapen!' zei Gasan.\n\n'Ga slapen' is het meest respectvolle dat Gasan kon zeggen. Geen sentimenteel afscheid, geen tranen, geen beloftes. Tekisui testte zijn opvolger en Gasan slaagde door te weigeren mee te gaan in hypothetische zorgen. De stervende leraar had rust nodig, geen woorden. Soms is de grootste daad van liefde iemand vertellen dat het genoeg is."},
{"n":82,"en":"Nothing Exists","nl":"Niets bestaat","e":"Yamaoka Tesshu, as a young student of Zen, visited one master after another. He called upon Dokuon of Shokoku.\n\nDesiring to show his attainment, he said: \"The mind, Buddha, and sentient beings, after all, do not exist. The true nature of phenomena is emptiness. There is no realization, no delusion, no sage, no mediocrity. There is no giving and nothing to be received.\"\n\nDokuon, who was smoking quietly, said nothing. Suddenly he whacked Yamaoka with his bamboo pipe. This made the youth quite angry.\n\n\"If nothing exists,\" inquired Dokuon, \"where did this anger come from?\"","d":"Yamaoka Tesshu bezocht als jonge zen-student de ene meester na de andere. Hij ging op bezoek bij Dokuon van Shokoku.\n\nIn de wens zijn verworvenheid te tonen zei hij: \"De geest, Boeddha en wezens met bewustzijn bestaan uiteindelijk niet. De ware aard van verschijnselen is leegte. Er is geen realisatie, geen waan, geen wijze, geen middelmatigheid. Er is geen geven en niets om te ontvangen.\"\n\nDokuon, die stilletjes zat te roken, zei niets. Plotseling sloeg hij Yamaoka met zijn bamboepijp. Dit maakte de jongeman behoorlijk boos.\n\n\"Als niets bestaat,\" vroeg Dokuon, \"waar kwam deze boosheid dan vandaan?\"","t":["paradox","ego"],"m":1,"ess":"Yamaoka Tesshu proclameerde bij meester Dokuon: 'Niets bestaat — geen geest, geen Boeddha, geen wezens, geen geven, geen ontvangen.' Dokuon sloeg hem met zijn pijp. Yamaoka werd woedend. 'Als niets bestaat,' vroeg Dokuon, 'waar komt die woede dan vandaan?'\n\nIntellectueel nihilisme is de meest voorkomende val in Zen. 'Niets bestaat' is een prachtig concept tot iemand je slaat en je lichaam het er niet mee eens blijkt te zijn. Dokuon's pijp was geen straf maar bewijs: je woede bestaat, dus je theorie klopt niet. Begin opnieuw, maar dan eerlijk."},
{"n":83,"en":"No Work, No Food","nl":"Niet werken, niet eten","e":"Hyakujo, the Chinese Zen master, used to labor with his pupils even at the age of eighty, trimming the gardens, cleaning the grounds, and pruning the trees.\n\nThe pupils felt sorry to see the old teacher working so hard, but they knew he would not listen to their advice to stop, so they hid away his tools.\n\nThat day the master did not eat. The next day he did not eat, nor the next. \"He may be angry because we have hidden his tools,\" the pupils surmised. \"We had better put them back.\"\n\nThe day they did, the teacher worked and ate the same as before. In the evening he instructed them: \"No work, no food.\"","d":"Hyakujo, de Chinese zen-meester, werkte samen met zijn leerlingen zelfs op tachtigjarige leeftijd, de tuinen bijhoudend, het terrein schoonmakend en de bomen snoeiend.\n\nDe leerlingen vonden het zielig om de oude leraar zo hard te zien werken, maar ze wisten dat hij niet naar hun advies om te stoppen zou luisteren, dus verstopten ze zijn gereedschap.\n\nDie dag at de meester niet. De volgende dag at hij niet, en de dag daarna ook niet. \"Misschien is hij boos omdat we zijn gereedschap hebben verstopt,\" vermoedden de leerlingen. \"We kunnen het maar beter terugzetten.\"\n\nDe dag dat ze dat deden, werkte en at de leraar als voorheen. Die avond onderwees hij hen: \"Niet werken, niet eten.\"","t":["eenvoud","wijsheid"],"m":1,"ess":"Hyakujo werkte op zijn tachtigste nog in de tuin. Zijn leerlingen verstopten zijn gereedschap. Hyakujo at niet meer. Toen ze het gereedschap teruglegden, werkte en at hij weer. 'Niet werken, niet eten.'\n\nDit is geen arbeidsethos maar een levensfilosofie. Werken en eten zijn niet gescheiden — het één rechtvaardigt het ander. Hyakujo weigerde te worden wat zijn leerlingen van hem wilden maken: een oude man die verzorgd wordt. Afhankelijkheid die je niet hebt gekozen is geen zorg maar een kooi. Wie kan werken, moet werken."},
