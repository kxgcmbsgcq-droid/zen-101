<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="JiGyo">
<meta name="theme-color" content="#F7F3EC" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#141416" media="(prefers-color-scheme: dark)">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<title>JiGyo</title>
<style>
:root{
  --bg:#F7F3EC;--bg2:#FFF;--fg:#1D1D1F;--fg2:#86868B;--fg3:#C7C7CC;
  --accent:#8B6F47;--accent2:#C9A96E;--accent-s:rgba(139,111,71,.07);--accent-m:rgba(139,111,71,.14);
  --gold1:#F0DEB8;--gold2:#C9A96E;--gold3:#8B6F47;
  --green:#34C759;
  --card:#FFF;--b:rgba(0,0,0,.06);--b2:rgba(0,0,0,.12);
  --sh:0 1px 3px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.03);
  --sh-l:0 4px 20px rgba(0,0,0,.06),0 1px 4px rgba(0,0,0,.04);
  --r:16px;--st:env(safe-area-inset-top);--sb:env(safe-area-inset-bottom);
  --serif:'New York','Iowan Old Style',Georgia,serif;
  --sans:-apple-system,'SF Pro Text',system-ui,sans-serif;
  --disp:-apple-system,'SF Pro Display',system-ui,sans-serif;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#141416;--bg2:#1C1C1E;--fg:#F5F5F7;--fg2:#86868B;--fg3:#3A3A3C;
  --accent:#C9A96E;--accent2:#E8D5B0;--accent-s:rgba(201,169,110,.08);--accent-m:rgba(201,169,110,.16);
  --gold1:#E8D5B0;--gold2:#C9A96E;--gold3:#8B6F47;
  --card:#1C1C1E;
  --b:rgba(255,255,255,.06);--b2:rgba(255,255,255,.1);
  --sh:0 1px 3px rgba(0,0,0,.3),0 4px 12px rgba(0,0,0,.2);
  --sh-l:0 4px 20px rgba(0,0,0,.35),0 1px 4px rgba(0,0,0,.2);
}}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-family:var(--sans);background:var(--bg);color:var(--fg);
  -webkit-tap-highlight-color:transparent;-webkit-text-size-adjust:100%;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
body{min-height:100dvh;overscroll-behavior:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input{font-family:inherit}

/* ═══ NAV ═══ */
/* ═══ HEADER ═══ */
.hdr{position:sticky;top:0;z-index:100;
  padding:calc(var(--st) + 12px) 20px 0;
  background:color-mix(in srgb,var(--bg) 82%,transparent);
  backdrop-filter:saturate(200%) blur(24px);-webkit-backdrop-filter:saturate(200%) blur(24px);
  overflow:hidden}
.hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:.33px;
  background:linear-gradient(90deg,transparent,var(--b2),transparent)}
.hdr-bg{position:absolute;top:-10px;right:-10px;pointer-events:none;user-select:none;
  opacity:.025;font-size:0;line-height:1}
.hdr-kanji{font-size:140px;position:absolute;top:-20px;right:10px}
.hdr-kanji.k2{font-size:90px;top:30px;right:120px;opacity:.6}
.hdr-kanji.k3{font-size:70px;top:-10px;right:200px;opacity:.4}
.hdr-top{max-width:600px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.hdr-brand{display:flex;align-items:center;gap:10px}
.hdr-enso{width:32px;height:32px;opacity:.8;flex-shrink:0;
  filter:drop-shadow(0 0 8px rgba(201,169,110,.15))}
.hdr-title{font-family:var(--serif);font-size:26px;font-weight:700;
  letter-spacing:.8px;line-height:1;
  background:linear-gradient(135deg,var(--gold3) 0%,var(--gold2) 35%,var(--gold1) 65%,var(--gold2) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 1px 2px rgba(139,111,71,.1))}
.hdr-actions{display:flex;gap:4px;align-items:center}
.hdr-btn{font-size:12px;font-weight:600;color:var(--fg2);
  background:color-mix(in srgb,var(--fg) 4%,transparent);
  border:none;padding:6px 10px;border-radius:8px;
  transition:all .2s;letter-spacing:.3px}
.hdr-btn:active{background:var(--accent-s);transform:scale(.95)}
.hdr-dice{font-size:17px;padding:5px 8px;background:none}
.hdr-tabs{max-width:600px;margin:12px auto 0;display:flex;position:relative;gap:0}
.hdr-tab{flex:1;padding:10px 0 12px;font-size:13px;font-weight:600;
  text-align:center;color:var(--fg3);border:none;background:none;
  position:relative;transition:color .3s;z-index:1;display:flex;
  align-items:center;justify-content:center;gap:5px}
.hdr-tab.active{color:var(--fg)}
.hdr-tab-label{transition:color .3s}
.hdr-tab-n{font-size:10px;font-weight:500;opacity:.5;
  padding:1px 5px;border-radius:4px;
  background:color-mix(in srgb,var(--fg) 5%,transparent)}
.hdr-tab.active .hdr-tab-n{opacity:1;color:var(--accent2);
  background:var(--accent-s)}
.hdr-tab-ink{position:absolute;bottom:0;height:2.5px;border-radius:2px;
  background:linear-gradient(90deg,var(--gold3),var(--gold1),var(--gold2));
  transition:left .35s cubic-bezier(.4,0,.2,1),width .35s cubic-bezier(.4,0,.2,1);
  box-shadow:0 0 12px rgba(201,169,110,.3)}

/* ═══ SEARCH ═══ */
.srch{max-width:600px;margin:8px auto 0;padding:0 16px;position:relative}
.srch-i{position:absolute;left:38px;top:50%;transform:translateY(-50%);
  font-size:14px;color:var(--fg3);pointer-events:none;z-index:1}
.srch input{width:100%;padding:10px 16px 10px 36px;border-radius:12px;
  border:.5px solid color-mix(in srgb,var(--fg) 8%,transparent);
  background:color-mix(in srgb,var(--bg2) 80%,transparent);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  font-size:15px;color:var(--fg);box-shadow:var(--sh);outline:none;transition:all .25s}
.srch input:focus{border-color:var(--accent);box-shadow:var(--sh-l),0 0 0 3px var(--accent-s)}
.srch input::placeholder{color:var(--fg3)}

/* ═══ LANG ═══ */

/* ═══ TAGS ═══ */
.tags{max-width:600px;margin:6px auto 0;padding:0 20px;display:flex;gap:6px;
  overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;
  mask-image:linear-gradient(90deg,transparent,#000 24px,#000 calc(100% - 24px),transparent);
  -webkit-mask-image:linear-gradient(90deg,transparent,#000 24px,#000 calc(100% - 24px),transparent);
  padding-left:24px;padding-right:24px}
.tags::-webkit-scrollbar{display:none}
.tag{padding:6px 13px;border-radius:20px;font-size:12px;font-weight:500;white-space:nowrap;
  flex-shrink:0;border:.5px solid var(--b);background:var(--bg2);color:var(--fg2);
  letter-spacing:.2px;transition:all .2s}
.tag.on{background:linear-gradient(135deg,var(--gold3),var(--gold2));color:#fff;
  border-color:transparent;box-shadow:0 2px 12px rgba(139,111,71,.25),0 0 0 1px rgba(201,169,110,.1)}
.tag .tc{font-size:10px;opacity:.65;margin-left:2px}

/* ═══ LIST ═══ */
.list{max-width:600px;margin:0 auto;padding:8px 24px calc(80px + var(--sb))}
.card{display:flex;align-items:stretch;margin:5px 0;border-radius:var(--r);
  background:var(--card);border:.5px solid var(--b);box-shadow:var(--sh);
  overflow:hidden;cursor:pointer;position:relative;
  transition:transform .15s,box-shadow .15s;-webkit-user-select:none;user-select:none}
.card:active{transform:scale(.97);box-shadow:var(--sh),0 0 0 1px var(--accent-s)}
@media(hover:hover){.card:hover{box-shadow:var(--sh-l);transform:translateY(-.5px)}}
.card-bar{width:3px;flex-shrink:0;
  background:linear-gradient(180deg,var(--accent),color-mix(in srgb,var(--accent) 30%,transparent));
  opacity:0;transition:opacity .3s}
.card.read .card-bar{opacity:1}
.card.used .card-bar{background:linear-gradient(180deg,var(--gold1),var(--gold3))}
.card-inner{flex:1;padding:14px 0 14px 16px;display:flex;gap:14px;align-items:flex-start;min-width:0}
.card-n{font-family:var(--disp);font-size:26px;font-weight:700;color:var(--accent);opacity:.2;
  line-height:1;min-width:32px;text-align:right;font-variant-numeric:tabular-nums;padding-top:2px}
.card.read .card-n{opacity:.45}
.card.used .card-n{opacity:.7;color:var(--gold2)}
.card-txt{flex:1;min-width:0}
.card-h{font-family:var(--serif);font-size:16px;font-weight:600;line-height:1.3}
.card-h2{font-size:13px;color:var(--fg2);margin-top:1px;font-style:italic;line-height:1.3;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-row{display:flex;align-items:center;gap:5px;margin-top:5px;flex-wrap:nowrap;overflow:hidden}
.card-min{font-size:11px;color:var(--fg3);white-space:nowrap;flex-shrink:0;margin-left:auto;padding-left:6px}
.card-tg{font-size:10px;color:var(--accent);background:var(--accent-s);white-space:nowrap;max-width:80px;overflow:hidden;text-overflow:ellipsis;
  padding:2px 7px;border-radius:5px;font-weight:500;letter-spacing:.2px;
  white-space:nowrap;flex-shrink:0}
.card-date{font-size:10px;color:var(--green);font-weight:500}
.card-end{display:flex;align-items:center;padding:0 14px;flex-shrink:0}
.card-chev{color:var(--fg3);font-size:13px;font-weight:300}
.card-star{position:absolute;top:8px;right:8px;font-size:11px;color:var(--accent);opacity:0;transition:opacity .2s}
.card.bm .card-star{opacity:1}

.empty{text-align:center;padding:60px 20px;color:var(--fg2)}
.empty-ico{font-size:44px;margin-bottom:12px;opacity:.3}
.empty-t{font-family:var(--serif);font-size:17px}



/* ═══ WATER DISSOLVE CLOSE ═══ */
/* ═══ SWIPE TRANSITION FX ═══ */
.swipe-fx{position:fixed;inset:0;z-index:50;pointer-events:none;opacity:0;
  transition:opacity .15s ease}
.swipe-fx.active{opacity:1}
/* ═══ READER ═══ */
.reader{position:fixed;inset:0;z-index:200;background:var(--bg);
  transform:translateY(100%);transition:transform .45s cubic-bezier(.22,1,.36,1);
  overflow:hidden}
.reader.open{transform:translateY(0)}
.reader.dissolve{
  filter:blur(20px) saturate(.3);opacity:0;
  transform:translateY(0) scale(.97);
  transition:filter .5s cubic-bezier(.4,0,.2,1),
    opacity .45s cubic-bezier(.4,0,1,1) .05s,
    transform .5s cubic-bezier(.4,0,.2,1)}
.r-scroll{display:flex;width:100%;height:100%;
  overflow-x:scroll;overflow-y:hidden;
  scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;
  scrollbar-width:none;scroll-behavior:smooth}
.r-scroll::-webkit-scrollbar{display:none}
.r-page{min-width:100%;width:100%;height:100%;overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  scroll-snap-align:start;scroll-snap-stop:always;
  flex-shrink:0;overscroll-behavior-y:contain}

/* ═══ ESSENCE PAGE ═══ */
.r-page-ess{position:relative;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;
  background:linear-gradient(165deg,#f5f0e8 0%,#ede5d8 50%,#e8e0d2 100%)}
@media(prefers-color-scheme:dark){
  .r-page-ess{background:linear-gradient(165deg,#1a1628 0%,#1e1a2e 40%,#1a2030 100%)}}
.ess-enso{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:260px;height:260px;color:var(--accent2);opacity:.06;pointer-events:none}
@media(prefers-color-scheme:dark){.ess-enso{opacity:.05}}

.ess-wrap{max-width:600px;margin:0 auto;padding:calc(var(--st) + 60px) 32px calc(80px + var(--sb));
  min-height:100%;display:flex;flex-direction:column;justify-content:center;position:relative}
.ess-label{font-family:var(--disp);font-size:11px;font-weight:700;letter-spacing:4px;
  text-transform:uppercase;margin-bottom:28px;opacity:.8;
  background:linear-gradient(90deg,var(--gold3),var(--gold2),var(--gold1));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ess-rule{width:40px;height:1px;margin-bottom:24px;
  background:linear-gradient(90deg,var(--gold2),transparent);opacity:.4}
.ess-text{font-family:var(--serif);font-size:20px;line-height:1.9;
  color:var(--fg);letter-spacing:.15px;position:relative;z-index:1}
.ess-text p{margin-bottom:1.2em}
.ess-text p:last-child{margin-bottom:0}
.ess-back{font-family:var(--disp);font-size:13px;color:var(--accent2);
  margin-top:40px;opacity:.5}

/* Swipe hint at bottom of story */
.swipe-hint{text-align:center;padding:40px 0 20px;opacity:0;
  animation:hintPulse 3s ease-in-out 2s infinite}
.swipe-hint-dot{display:inline-block;width:32px;height:3px;border-radius:2px;
  background:linear-gradient(90deg,var(--accent2),var(--gold1));opacity:.4}
.swipe-hint-t{font-size:11px;color:var(--fg3);margin-top:8px;letter-spacing:.5px}
@keyframes hintPulse{0%,100%{opacity:0}50%{opacity:1}}

.r-nav{position:sticky;top:0;z-index:10;
  padding:calc(var(--st) + 8px) 16px 10px;
  background:color-mix(in srgb,var(--bg) 82%,transparent);
  backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);
  display:flex;align-items:center;gap:8px}
.r-nav::after{content:'';position:absolute;bottom:0;left:0;right:0;height:.33px;background:var(--b2)}
.r-back{font-size:28px;color:var(--accent);padding:4px 6px 4px 0;font-weight:300;line-height:1}
.r-t{flex:1;font-size:15px;font-weight:600;font-family:var(--disp);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.r-bm{font-size:20px;padding:6px;transition:transform .2s}
.r-bm:active{transform:scale(1.3)}
/* ═══ READER CONTENT — PREMIUM ═══ */
.r-body{max-width:600px;margin:0 auto;padding:0 28px calc(60px + var(--sb))}

/* Hero title card */
.r-hero{padding:36px 0 32px;text-align:center;position:relative}
.r-hero::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:40px;height:1.5px;border-radius:1px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.5}
.r-num{font-family:var(--disp);font-size:13px;font-weight:600;line-height:1;
  color:var(--accent);opacity:.6;letter-spacing:1px;margin-bottom:10px}
.r-h1{font-family:var(--serif);font-size:32px;font-weight:700;line-height:1.15;
  letter-spacing:-.4px;margin-bottom:6px;padding:0 8px}
.r-h2{font-family:var(--serif);font-size:16px;color:var(--fg2);font-style:italic;
  font-weight:400;line-height:1.3;padding:0 8px}
.r-meta{display:flex;gap:6px;margin-top:16px;flex-wrap:wrap;align-items:center;justify-content:center}
.r-tag{font-size:10px;color:var(--fg2);background:color-mix(in srgb,var(--fg) 4%,transparent);
  padding:3px 10px;border-radius:8px;font-weight:500;letter-spacing:.3px}
.r-min{font-size:10px;color:var(--fg3);padding:3px 10px;border-radius:8px;
  background:color-mix(in srgb,var(--fg) 3%,transparent)}

/* Story text — premium typography */
.r-text{font-family:var(--serif);font-size:19px;line-height:1.85;color:var(--fg);
  letter-spacing:.1px;padding-top:32px}
.r-text p{margin-bottom:1.15em}
.r-text p:last-child{margin-bottom:0}
.r-text p:first-child::first-letter{
  font-size:3.4em;float:left;line-height:.78;margin:6px 10px 0 -2px;
  font-weight:700;color:var(--accent);font-family:var(--serif)}

/* Translation (toggled from navbar) */
.r-alt{margin-top:40px;border-top:.5px solid var(--b);padding-top:20px}
.r-peek-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:var(--fg3);margin:0 0 12px}
.r-peek-text{font-family:var(--serif);font-size:17px;line-height:1.75;color:var(--fg2)}

/* ═══ SUMI-E CEREMONY OVERLAY ═══ */

/* ═══ ENSŌ ENLIGHTENMENT ═══ */
.sumi-svg.enlighten{animation:ensoFlash .8s ease-out}
@keyframes ensoFlash{
  0%{filter:drop-shadow(0 0 0 rgba(255,230,150,0))}
  30%{filter:drop-shadow(0 0 40px rgba(255,230,150,.8)) drop-shadow(0 0 80px rgba(201,169,110,.5))}
  100%{filter:drop-shadow(0 0 15px rgba(201,169,110,.2))}
}
.sumi-halo{position:absolute;top:50%;left:50%;transform:translate(-50%,-55%);
  width:400px;height:400px;border-radius:50%;pointer-events:none;z-index:0;
  background:radial-gradient(circle,rgba(255,230,150,.25) 0%,rgba(201,169,110,.1) 30%,transparent 65%);
  opacity:0;transition:opacity 1.5s ease}
.sumi-halo.glow{opacity:1;animation:haloBreath 3s ease-in-out infinite}
@keyframes haloBreath{0%,100%{transform:translate(-50%,-55%) scale(1);opacity:.8}50%{transform:translate(-50%,-55%) scale(1.05);opacity:1}}

.sumi-overlay{position:fixed;inset:0;z-index:500;pointer-events:none;opacity:0;
  transition:opacity .8s ease;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:20px}
.sumi-overlay.active{opacity:1;pointer-events:auto}
.sumi-overlay.reversing{opacity:0;transition:opacity .5s ease;pointer-events:none}
.sumi-bg{position:absolute;inset:0;background:rgba(0,0,0,.85);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.sumi-svg{position:relative;z-index:1;width:85vw;max-width:380px;height:auto}
/* Ensō brush stroke — stroke-dashoffset draw animation */
.enso-stroke{stroke-linecap:round;fill:none;
  transition:stroke-dashoffset 0s,opacity 0s}
.enso-stroke.draw{stroke-dashoffset:0!important;opacity:var(--ink,.8);
  transition:stroke-dashoffset var(--dur,2.5s) cubic-bezier(.25,.1,.25,1),opacity .4s ease}
.enso-stroke.reverse{opacity:0;
  transition:stroke-dashoffset .6s ease-in,opacity .4s ease .3s!important}
/* Gold shimmer follows the ensō path */
.enso-gold{stroke-linecap:round;fill:none;opacity:0;
  transition:stroke-dashoffset 0s,opacity 0s}
.enso-gold.draw{stroke-dashoffset:0!important;opacity:.6;
  transition:stroke-dashoffset 2s cubic-bezier(.32,.72,0,1),opacity .5s ease .3s}
.enso-gold.reverse{opacity:0;transition:opacity .3s ease!important}
/* Labels */
.sumi-label{position:relative;z-index:1;font-family:var(--serif);font-size:18px;
  color:var(--gold1);opacity:0;transform:translateY(10px);
  transition:opacity .8s ease,transform .8s ease;letter-spacing:.5px}
.sumi-overlay.active .sumi-label.show{opacity:1;transform:translateY(0)}
.sumi-date{position:relative;z-index:1;font-size:12px;color:var(--fg2);opacity:0;
  transition:opacity .6s ease;letter-spacing:.3px}
.sumi-overlay.active .sumi-date.show{opacity:.7}
/* Sparkle particles */
.sparkle-canvas{position:absolute;inset:0;z-index:2;pointer-events:none}

/* ═══ TRANSLATION NAVBAR BTN ═══ */
.r-lang{font-size:12px;padding:5px 10px;border-radius:8px;font-weight:600;
  color:var(--accent);background:var(--accent-s);letter-spacing:.3px;
  transition:all .15s;white-space:nowrap}
.r-lang:active{background:var(--accent-m)}

/* ═══ SCROLL TOP ═══ */
.totop{position:fixed;bottom:calc(20px + var(--sb));right:20px;z-index:50;
  width:44px;height:44px;border-radius:50%;background:var(--card);
  border:.5px solid var(--b);box-shadow:var(--sh-l);
  display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--fg2);
  opacity:0;transform:scale(.7);transition:all .25s;pointer-events:none}
.totop.show{opacity:1;transform:scale(1);pointer-events:auto}
.totop:active{transform:scale(.85)}

/* ═══ ANIM ═══ */
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card{animation:up .3s ease both}
.card:nth-child(1){animation-delay:0s}.card:nth-child(2){animation-delay:.02s}
.card:nth-child(3){animation-delay:.04s}.card:nth-child(4){animation-delay:.06s}
.card:nth-child(5){animation-delay:.08s}.card:nth-child(6){animation-delay:.1s}
.card:nth-child(n+7){animation-delay:.12s}
.no-anim .card{animation:none}
/* ═══ PROGRESS PULSE ═══ */
@keyframes ringPulse{0%{transform:scale(1)}30%{transform:scale(1.15)}60%{transform:scale(.95)}100%{transform:scale(1)}}
.ring.pulse{animation:ringPulse .6s cubic-bezier(.32,.72,0,1)}
@keyframes pctFlash{0%{color:var(--accent)}40%{color:var(--gold1)}100%{color:var(--accent)}}
.ring-t.flash{animation:pctFlash .8s ease}

@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0s!important;transition-duration:0s!important}}

<script>
const S=[{"n":1,"en":"A Cup of Tea","nl":"Een kopje thee","e":"Nan-in, a Japanese master during the Meiji era (1868-1912), received a university professor who came to inquire about Zen.\n\nNan-in served tea. He poured his visitor's cup full, and then kept on pouring.\n\nThe professor watched the overflow until he no longer could restrain himself. \"It is overfull. No more will go in!\"\n\n\"Like this cup,\" Nan-in said, \"you are full of your own opinions and speculations. How can I show you Zen unless you first empty your cup?\"","d":"Nan-in, een Japanse meester in de Meiji-periode (1868-1912), ontving een universiteitsprofessor die hem over Zen wilde ondervragen.\n\nNan-in schonk thee. Hij vulde de kop van zijn bezoeker tot de rand, en bleef daarna inschenken.\n\nDe professor keek toe hoe de thee overliep totdat hij zich niet langer kon inhouden. \"Hij is te vol. Er kan niets meer bij!\"\n\n\"Net als deze kop,\" zei Nan-in, \"bent u vol van uw eigen meningen en speculaties. Hoe kan ik u Zen tonen als u uw kop niet eerst leegmaakt?\"","t":["ego","meester"],"m":1,"ess":"Wat je al weet staat in de weg. Nan-in goot door niet uit onbeleefdheid maar als spiegel: de professor was zo vol van zijn eigen kennis dat er geen ruimte was voor iets nieuws.\n\nEchte ontvankelijkheid vraagt dat je je beker eerst leegt — je aannames, je zekerheden, je behoefte om gelijk te hebben. Wie vol zit kan niets ontvangen, hoe waardevol het ook is. De overlopende thee is precies wat er gebeurt in elk gesprek waar iemand vraagt om uitleg maar al weet waarom het niet klopt."},
{"n":2,"en":"Finding a Diamond on a Muddy Road","nl":"Een diamant op een modderige weg","e":"Gudo was the emperor's teacher of his time. Nevertheless, he used to travel alone as a wandering mendicant. Once when he was on his way to Edo, the cultural and political center of the shogunate, he approached a little village named Takenaka. It was evening and a heavy rain was falling. Gudo was thoroughly wet. His straw sandals were in pieces. At a farmhouse near the village he noticed four or five pairs of sandals in the window and decided to buy some dry ones.\n\nThe woman who offered him the sandals, seeing how wet he was, invited him in to remain for the night in her home. Gudo accepted, thanking her. He entered and recited a sutra before the family shrine. He was then introduced to the women's mother, and to her children. Observing that the entire family was depressed, Gudo asked what was wrong.\n\n\"My husband is a gambler and a drunkard,\" the housewife told him. \"When he happens to win he drinks and becomes abusive. When he loses he borrows money from others. Sometimes when he becomes thoroughly drunk he does not come home at all. What can I do?\"\n\n\"I will help him,\" said Gudo. \"Here is some money. Get me a gallon of fine wine and something good to eat. Then you may retire. I will meditate before the shrine.\"\n\nWhen the man of the house returned about midnight, quite drunk, he bellowed: \"Hey, wife, I am home. Have you something for me to eat?\"\n\n\"I have something for you,\" said Gudo. \"I happened to be caught in the rain and your wife kindly asked me to remain here for the night. In return I have bought some wine and fish, so you might as well have them.\"\n\nThe man was delighted. He drank the wine at once and laid himself down on the floor. Gudo sat in meditation beside him.\n\nIn the morning when the husband awoke he had forgotten about the previous night. \"Who are you? Where do you come from?\" he asked Gudo, who was still meditating.\n\n\"I am Gudo of Kyoto and I am going on to Edo,\" replied the Zen master.\n\nThe man was utterly ashamed. He apologized profusely to the teacher of his emperor.\n\nGudo smiled. \"Everything in this life is impermanent,\" he explained. \"Life is very brief. If you keep on gambling and drinking, you will have no time left to accomplish anything else, and you will cause your family to suffer too.\"\n\nThe perception of the husband awoke as if from a dream. \"You are right,\" he declared. \"How can I ever repay you for this wonderful teaching! Let me see you off and carry your things a little way.\"\n\n\"If you wish,\" assented Gudo.\n\nThe two started out. After they had gone three miles Gudo told him to return. \"Just another five miles,\" he begged Gudo. They continued on.\n\n\"You may return now,\" suggested Gudo.\n\n\"After another ten miles,\" the man replied.\n\n\"Return now,\" said Gudo, when the ten miles had been passed.\n\n\"I am going to follow you all the rest of my life,\" declared the man.\n\nModern Zen teachings in Japan spring from the lineage of a famous master who was the successor of Gudo. His name was Mu-nan, the man who never turned back.","d":"Gudo was de leraar van de keizer in zijn tijd. Desondanks reisde hij gewoonlijk alleen als zwervend bedelmonnik. Op een keer, onderweg naar Edo, het culturele en politieke centrum van het shogunaat, naderde hij een klein dorp genaamd Takenaka. Het was avond en er viel een zware regen. Gudo was doornat. Zijn strooien sandalen waren aan flarden. Bij een boerderij vlak bij het dorp zag hij vier of vijf paar sandalen in het raam staan en hij besloot droge te kopen.\n\nDe vrouw die hem de sandalen aanbood zag hoe nat hij was en nodigde hem uit om de nacht bij haar thuis te blijven. Gudo aanvaardde het, haar bedankend. Hij ging naar binnen en reciteerde een soetra voor het familiealtaar. Daarna werd hij voorgesteld aan de moeder van de vrouw en aan haar kinderen. Omdat de hele familie terneergeslagen leek, vroeg Gudo wat er mis was.\n\n\"Mijn man is een gokker en een dronkaard,\" vertelde de huisvrouw hem. \"Als hij toevallig wint drinkt hij en wordt hij agressief. Als hij verliest leent hij geld van anderen. Soms komt hij, als hij helemaal dronken is, niet eens naar huis. Wat moet ik doen?\"\n\n\"Ik zal hem helpen,\" zei Gudo. \"Hier is wat geld. Haal een fles goede wijn en iets lekkers te eten. Dan kunt u gaan slapen. Ik zal mediteren voor het altaar.\"\n\nToen de man des huizes rond middernacht thuiskwam, behoorlijk dronken, brulde hij: \"Hé, vrouw, ik ben thuis. Heb je iets voor me te eten?\"\n\n\"Ik heb iets voor u,\" zei Gudo. \"Ik was toevallig in de regen verzeild geraakt en uw vrouw vroeg vriendelijk of ik hier de nacht mocht doorbrengen. Als dank heb ik wijn en vis gekocht, dus u kunt die net zo goed hebben.\"\n\nDe man was verrukt. Hij dronk de wijn meteen op en legde zich op de vloer neer. Gudo zat naast hem te mediteren.\n\n's Ochtends, toen de man wakker werd, was hij de vorige avond vergeten. \"Wie bent u? Waar komt u vandaan?\" vroeg hij aan Gudo, die nog steeds mediteerde.\n\n\"Ik ben Gudo uit Kyoto en ik ga door naar Edo,\" antwoordde de Zen-meester.\n\nDe man schaamde zich diep. Hij bood uitgebreid zijn verontschuldigingen aan aan de leraar van zijn keizer.\n\nGudo glimlachte. \"Alles in dit leven is vergankelijk,\" legde hij uit. \"Het leven is erg kort. Als u blijft gokken en drinken, zult u geen tijd meer hebben om iets anders te bereiken, en u zult uw familie ook laten lijden.\"\n\nHet bewustzijn van de man ontwaakte als uit een droom. \"U heeft gelijk,\" verklaarde hij. \"Hoe kan ik u ooit terugbetalen voor dit wonderbare onderricht! Laat me u uitzwaaien en uw spullen een eindje dragen.\"\n\n\"Als u dat wenst,\" stemde Gudo in.\n\nDe twee vertrokken. Na drie mijl zei Gudo dat hij terug moest gaan. \"Nog vijf mijl maar,\" smeekte hij Gudo. Ze gingen verder.\n\n\"U kunt nu teruggaan,\" stelde Gudo voor.\n\n\"Na nog eens tien mijl,\" antwoordde de man.\n\n\"Ga nu terug,\" zei Gudo, toen de tien mijl voorbij waren.\n\n\"Ik ga u de rest van mijn leven volgen,\" verklaarde de man.\n\nDe moderne Zen-leer in Japan stamt af van de lijn van een beroemde meester die de opvolger van Gudo was. Zijn naam was Mu-nan, de man die nooit omkeerde.","t":["compassie","wijsheid"],"m":5,"ess":"Gudo gaf zijn laatste geld voor sandalen en bood toen zijn eigen slaapplaats aan de vreemdelinge aan. Geen strategie, geen verwachting — puur handelen vanuit wat het moment vraagt.\n\nDe diamant in de modder is Gudo zelf: onherkenbaar als meester, maar juist daarom authentiek. Ware wijsheid draagt geen titel en verwacht geen herkenning. De vrouw die hem met haar kinderen zag slapen begreep meer van Zen dan menig student in een tempel."},
{"n":3,"en":"Is That So?","nl":"Is dat zo?","e":"The Zen master Hakuin was praised by his neighbors as one living a pure life.\n\nA beautiful Japanese girl whose parents owned a food store lived near him. Suddenly, without any warning, her parents discovered she was with child.\n\nThis made her parents angry. She would not confess who the man was, but after much harassment at last named Hakuin.\n\nIn great anger the parent went to the master. \"Is that so?\" was all he would say.\n\nAfter the child was born it was brought to Hakuin. By this time he had lost his reputation, which did not trouble him, but he took very good care of the child. He obtained milk from his neighbors and everything else he needed.\n\nA year later the girl-mother could stand it no longer. She told her parents the truth – the real father of the child was a young man who worked in the fishmarket.\n\nThe mother and father of the girl at once went to Hakuin to ask forgiveness, to apologize at length, and to get the child back.\n\nHakuin was willing. In yielding the child, all he said was: \"Is that so?\"","d":"De Zen-meester Hakuin werd door zijn buren geprezen als iemand die een zuiver leven leidde.\n\nEen mooi Japans meisje wier ouders een levensmiddelenwinkel bezaten woonde vlakbij hem. Plotseling, geheel onverwacht, ontdekten haar ouders dat ze een kind verwachtte.\n\nDit maakte haar ouders woedend. Ze wilde niet bekennen wie de man was, maar na veel aandringen noemde ze uiteindelijk de naam Hakuin.\n\nIn grote woede gingen de ouders naar de meester. \"Is dat zo?\" was het enige dat hij zei.\n\nNadat het kind geboren was, werd het bij Hakuin gebracht. Inmiddels had hij zijn reputatie verloren, wat hem niet verontrustte, maar hij zorgde heel goed voor het kind. Hij bemachtigde melk van zijn buren en alles wat verder nodig was.\n\nEen jaar later hield de jonge moeder het niet meer vol. Ze vertelde haar ouders de waarheid — de echte vader van het kind was een jonge man die op de vismarkt werkte.\n\nDe moeder en vader van het meisje gingen onmiddellijk naar Hakuin om vergiffenis te vragen, om uitgebreid hun verontschuldigingen aan te bieden, en om het kind terug te krijgen.\n\nHakuin was bereid. Bij het teruggeven van het kind zei hij enkel: \"Is dat zo?\"","t":["wijsheid","kracht"],"m":2,"ess":"Hakuin verloor zijn reputatie, verzorgde een kind dat niet van hem was, en zei alleen 'Is dat zo?' — zowel bij de beschuldiging als bij de onthulling van de waarheid.\n\nDe les zit niet in zijn geduld maar in zijn gelijkmoedigheid. Lof en blaam raakten hem even weinig. Wie zijn innerlijke rust niet laat afhangen van wat anderen over hem denken, is vrij — niet omdat de wereld rechtvaardig is, maar omdat hij niet meer meegolft met haar oordelen."},
{"n":4,"en":"Obedience","nl":"Gehoorzaamheid","e":"The master Bankei's talks were attended not only by Zen students but by persons of all ranks and sects. He never quoted sutras nor indulged in scholastic dissertations. Instead, his words were spoken directly from his heart to the hearts of his listeners.\n\nHis large audience angered a priest of the Nichiren sect because the adherents had left to hear about Zen. The self-centered Nichiren priest came to the temple, determined to have a debate with Bankei.\n\n\"Hey, Zen teacher!\" he called out. \"Wait a minute. Whoever respects you will obey what you say, but a man like myself does not respect you. Can you make me obey you?\"\n\n\"Come up beside me and I will show you,\" said Bankei.\n\nProudly the priest pushed his way through the crowd to the teacher.\n\nBankei smiled. \"Come over to my left side.\"\n\nThe priest obeyed.\n\n\"No,\" said Bankei, \"we may talk better if you are on the right side. Step over here.\"\n\nThe priest proudly stepped over to the right.\n\n\"You see,\" observed Bankei, \"you are obeying me and I think you are a very gentle person. Now sit down and listen.\"","d":"De lezingen van meester Bankei werden niet alleen bijgewoond door Zen-studenten maar door mensen van alle rangen en sekten. Hij citeerde nooit soetra's en stortte zich niet in scholastieke verhandelingen. In plaats daarvan werden zijn woorden rechtstreeks vanuit zijn hart gesproken tot de harten van zijn toehoorders.\n\nZijn grote publiek maakte een priester van de Nichiren-sekte kwaad omdat de aanhangers vertrokken waren om over Zen te horen. De egocentrische Nichiren-priester kwam naar de tempel, vastbesloten een debat met Bankei te voeren.\n\n\"Hé, Zen-leraar!\" riep hij. \"Wacht even. Wie u respecteert zal gehoorzamen wat u zegt, maar een man zoals ik respecteert u niet. Kunt u mij laten gehoorzamen?\"\n\n\"Kom naast me staan en ik zal het u laten zien,\" zei Bankei.\n\nTrots baande de priester zich een weg door de menigte naar de leraar.\n\nBankei glimlachte. \"Kom naar mijn linkerkant.\"\n\nDe priester gehoorzaamde.\n\n\"Nee,\" zei Bankei, \"we kunnen misschien beter praten als u aan de rechterkant staat. Kom hier staan.\"\n\nDe priester stapte trots naar rechts.\n\n\"Ziet u,\" merkte Bankei op, \"u gehoorzaamt me en ik denk dat u een heel vriendelijk persoon bent. Ga nu zitten en luister.\"","t":["meester","kracht"],"m":2,"ess":"De Nichiren-priester kwam met woede en debatkunst, maar Bankei had geen tegenaanval nodig. Door de priester uit te nodigen te schreeuwen tot hij uitgeput was, liet hij zien dat woede zichzelf verteert als je er niet tegen duwt.\n\nBankei's kracht was geen retoriek maar aanwezigheid. Hij gaf het conflict geen weerstand en daarmee geen brandstof. De priester versloeg zichzelf. Dit is het verschil tussen iemand overtuigen en iemand laten ervaren."},
{"n":5,"en":"If You Love, Love Openly","nl":"Als je liefhebt, heb dan openlijk lief","e":"Twenty monks and one nun, who was named Eshun, were practicing meditation with a certain Zen master.\n\nEshun was very pretty even though her head was shaved and her dress plain. Several monks secretly fell in love with her. One of them wrote her a love letter, insisting upon a private meeting.\n\nEshun did not reply. The following day the master gave a lecture to the group, and when it was over, Eshun arose. Addressing the one who had written to her, she said: \"If you really love me so much, come and embrace me now.\"","d":"Twintig monniken en één non, die Eshun heette, beoefenden meditatie bij een zekere Zen-meester.\n\nEshun was zeer mooi, ook al was haar hoofd geschoren en haar kleding eenvoudig. Verschillende monniken werden stiekem verliefd op haar. Een van hen schreef haar een liefdesbrief en drong aan op een privéontmoeting.\n\nEshun antwoordde niet. De volgende dag gaf de meester een lezing aan de groep, en toen die voorbij was stond Eshun op. Tot degene die haar had geschreven richtte ze het woord: \"Als je werkelijk zoveel van me houdt, kom me dan nu omarmen.\"","t":["gehechtheid","wijsheid"],"m":1,"ess":"Eshun bracht het verborgene naar het licht. De monnik die in het geheim een liefdesbrief schreef, wilde liefde zonder consequenties — verlangen zonder verantwoordelijkheid.\n\n'Omhels me nu, hier, voor iedereen' was geen vernedering maar een uitnodiging tot eerlijkheid. Authentiek leven betekent dat je niet één persoon bent in het openbaar en een ander in het geheim. Wat je niet in het licht durft te brengen, bezit jou meer dan jij het bezit."},
{"n":6,"en":"No Loving-Kindness","nl":"Geen mededogen","e":"There was an old woman in China who had supported a monk for over twenty years. She had built a little hut for him and fed him while he was meditating. Finally she wondered just what progress he had made in all this time.\n\nTo find out, she obtained the help of a girl rich in desire. \"Go and embrace him,\" she told her, \"and then ask him suddenly: 'What now?'\"\n\nThe girl called upon the monk and without much ado caressed him, asking him what he was going to do about it.\n\n\"An old tree grows on a cold rock in winter,\" replied the monk somewhat poetically. \"Nowhere is there any warmth.\"\n\nThe girl returned and related what he had said.\n\n\"To think I fed that fellow for twenty years!\" exclaimed the old woman in anger. \"He showed no consideration for your needs, no disposition to explain your condition. He need not have responded to passion, but at least he should have evidenced some compassion.\"\n\nShe at once went to the hut of the monk and burned it down.","d":"Er was een oude vrouw in China die een monnik meer dan twintig jaar had onderhouden. Ze had een kleine hut voor hem gebouwd en hem gevoed terwijl hij mediteerde. Uiteindelijk vroeg ze zich af welke vooruitgang hij in al die tijd had geboekt.\n\nOm dat te weten te komen, zocht ze de hulp van een meisje vol begeerte. \"Ga hem omarmen,\" zei ze tegen haar, \"en vraag hem dan plotseling: 'En nu?'\"\n\nHet meisje zocht de monnik op en begon hem zonder veel omhaal te strelen, terwijl ze hem vroeg wat hij daarmee zou doen.\n\n\"Een oude boom groeit op een koude rots in de winter,\" antwoordde de monnik enigszins poëtisch. \"Nergens is er enige warmte.\"\n\nHet meisje keerde terug en vertelde wat hij had gezegd.\n\n\"Te bedenken dat ik die kerel twintig jaar heb gevoed!\" riep de oude vrouw woedend. \"Hij toonde geen begrip voor jouw behoeften, geen neiging om jouw toestand te verklaren. Hij hoefde niet op passie te reageren, maar hij had op zijn minst enig mededogen moeten tonen.\"\n\nZe ging onmiddellijk naar de hut van de monnik en stak hem in brand.","t":["meester","eenvoud"],"m":2,"ess":"De oude vrouw had twintig jaar een monnik ondersteund. Toen ze een meisje stuurde om hem te testen, antwoordde hij met poëzie over koude rotsen. De vrouw joeg hem weg: hij had niets begrepen.\n\nHet probleem was niet dat hij het meisje afwees, maar hoe. 'Nergens warmte' onthulde een dood hart, geen vrij hart. Ware verlichting is geen afstomping van gevoel maar bevrijding ervan. Wie na twintig jaar meditatie geen menselijke warmte meer kan voelen, heeft zijn tijd verspild."},
{"n":7,"en":"Announcement","nl":"Mededeling","e":"Tanzan wrote sixty postal cards on the last day of his life, and asked an attendant to mail them. Then he passed away.\n\nThe cards read:\n\nI am departing from this world.\nThis is my last announcement.\nTanzan\nJuly 27, 1892","d":"Tanzan schreef op de laatste dag van zijn leven zestig briefkaarten en vroeg een bediende ze te versturen. Daarna overleed hij.\n\nDe kaarten luidden:\n\nIk verlaat deze wereld.\nDit is mijn laatste mededeling.\nTanzan\n27 juli 1892","t":["humor","wijsheid"],"m":1,"ess":"Tanzan schreef zestig afscheidskaarten op zijn laatste dag en stierf. Geen drama, geen angst, geen onafgemaakte zaken.\n\nDe eenvoud van dit gebaar is de les. Hij behandelde zijn eigen dood als een mededeling — niet meer, niet minder. Wie zijn leven zo leeft dat het einde slechts een aankondiging vereist, heeft begrepen wat het betekent om elk moment volledig te leven."},
{"n":8,"en":"Great Waves","nl":"Grote golven","e":"In the early days of the Meiji era there lived a well-known wrestler called O-nami, Great Waves.\n\nO-nami was immensely strong and knew the art of wrestling. In his private bouts he defeated even his teacher, but in public he was so bashful that his own pupils threw him.\n\nO-nami felt he should go to a Zen master for help. Hakuju, a wandering teacher, was stopping in a little temple nearby, so O-nami went to see him and told him of his trouble.\n\n\"Great Waves is your name,\" the teacher advised, \"so stay in this temple tonight. Imagine that you are those billows. You are no longer a wrestler who is afraid. You are those huge waves sweeping everything before them, swallowing all in their path. Do this and you will be the greatest wrestler in the land.\"\n\nThe teacher retired. O-nami sat in meditation trying to imagine himself as waves. He thought of many different things. Then gradually he turned more and more to the feeling of the waves. As the night advanced the waves became larger and larger. They swept away the flowers in their vases. Even the Buddha in the shrine was inundated. Before dawn the temple was nothing but the ebb and flow of an immense sea.\n\nIn the morning the teacher found O-nami meditating, a faint smile on his face. He patted the wrestler's shoulder. \"Now nothing can disturb you,\" he said. \"You are those waves. You will sweep everything before you.\"\n\nThe same day O-nami entered the wrestling contests and won. After that, no one in Japan was able to defeat him.","d":"In de beginjaren van de Meiji-periode leefde een bekende worstelaar genaamd O-nami, Grote Golven.\n\nO-nami was enorm sterk en kende de kunst van het worstelen. In zijn privégevechten versloeg hij zelfs zijn eigen leraar, maar in het openbaar was hij zo verlegen dat zijn eigen leerlingen hem konden gooien.\n\nO-nami vond dat hij naar een Zen-meester moest gaan voor hulp. Hakuju, een rondreizende leraar, verbleef in een kleine tempel vlakbij, en zo ging O-nami hem opzoeken en vertelde hem zijn probleem.\n\n\"Grote Golven is uw naam,\" adviseerde de leraar, \"dus blijf vannacht in deze tempel. Stel u voor dat u die golven bent. U bent niet langer een worstelaar die bang is. U bent die enorme golven die alles voor zich uit vegen, alles op hun pad verslinden. Doe dit en u zult de grootste worstelaar van het land zijn.\"\n\nDe leraar trok zich terug. O-nami zat te mediteren en probeerde zich voor te stellen dat hij golven was. Hij dacht aan veel verschillende dingen. Maar geleidelijk keerde hij zich meer en meer naar het gevoel van de golven. Naarmate de nacht vorderde werden de golven groter en groter. Ze vaagden de bloemen in hun vazen weg. Zelfs de Boeddha in het heiligdom werd overspoeld. Voor het aanbreken van de dag was de tempel niets anders meer dan het eb en vloed van een onmetelijke zee.\n\n's Ochtends trof de leraar O-nami mediterend aan, met een flauw glimlachje op zijn gezicht. Hij klopte de worstelaar op zijn schouder. \"Nu kan niets u meer verstoren,\" zei hij. \"U bent die golven. U zult alles voor u uit vegen.\"\n\nDiezelfde dag deed O-nami mee aan de worstelwedstrijden en won. Daarna was niemand in Japan meer in staat hem te verslaan.","t":["stilte","kracht"],"m":3,"ess":"O-nami was sterk genoeg om zijn eigen meester te verslaan, maar verloor in het openbaar. Zijn probleem was niet techniek maar geest — angst en zelfbewustzijn verlamden hem.\n\nDe meester zei niet 'wees niet bang' maar 'word de golven.' Door een hele nacht te mediteren op golven die alles overspoelen, verdween het onderscheid tussen O-nami en zijn kracht. De naam was altijd al de les geweest: wie zichzelf niet meer als apart van zijn kracht ziet, wordt onverslaanbaar."},
{"n":9,"en":"The Moon Cannot Be Stolen","nl":"De maan kan niet worden gestolen","e":"Ryokan, a Zen master, lived the simplest kind of life in a little hut at the foot of a mountain. One evening a thief visited the hut only to discover there was nothing to steal.\n\nRyokan returned and caught him. \"You have come a long way to visit me,\" he told the prowler, \"and you should not return empty-handed. Please take my clothes as a gift.\"\n\nThe thief was bewildered. He took the clothes and slunk away.\n\nRyokan sat naked, watching the moon. \"Poor fellow,\" he mused, \"I wish I could have given him this beautiful moon.\"","d":"Ryokan, een Zen-meester, leefde het eenvoudigste soort leven in een kleine hut aan de voet van een berg. Op een avond bezocht een dief de hut, alleen om te ontdekken dat er niets te stelen viel.\n\nRyokan keerde terug en betrapte hem. \"U heeft een lange weg afgelegd om mij te bezoeken,\" zei hij tegen de indringer, \"en u mag niet met lege handen teruggaan. Neem alstublieft mijn kleren als geschenk.\"\n\nDe dief was verbijsterd. Hij nam de kleren en sloop weg.\n\nRyokan zat naakt en keek naar de maan. \"Arme kerel,\" peinsde hij, \"ik zou hem zo graag deze prachtige maan hebben gegeven.\"","t":["humor","gehechtheid"],"m":1,"ess":"Ryokan gaf zijn kleren aan de dief en wenste dat hij ook de maan had kunnen geven. De dief nam het materiële maar miste het enige van waarde — en dat kun je niet stelen.\n\nWie nergens aan hecht verliest niets en kan alles weggeven. De maan symboliseert wat fundamenteel en universeel is: schoonheid, verlichting, de werkelijkheid zelf. Het contrast is de kern: ware rijkdom zit niet in bezittingen maar in de ogen die de maan kunnen zien."},
{"n":10,"en":"The Last Poem of Hoshin","nl":"Het laatste gedicht van Hoshin","e":"The Zen master Hoshin lived in China many years. Then he returned to the northeastern part of Japan, where he taught his disciples. When he was getting very old, he told them a story he had heard in China. This is the story:\n\nOne year on the twenty-fifth of December, Toku-fu, who was very old, said to his disciples: \"I am not going to be alive next year so you fellows should treat me well this year.\"\n\nThe pupils thought he was joking, but since he was a great-hearted teacher each of them in turn treated him to a feast on succeeding days of the departing year.\n\nOn the eve of the new year, Toku-fu concluded: \"You have been good to me. I shall leave tomorrow afternoon when the snow has stopped.\"\n\nThe disciples laughed, thinking he was aging and talking nonsense since the night was clear and without snow. But at midnight snow began to fall, and the next day they did not find their teacher about. They went to the meditation hall. There he had passed on.\n\nHoshin, who related this story, told his disciples: \"It is not necessary for a Zen master to predict his passing, but if he really wishes to do so, he can.\"\n\n\"Can you?\" someone asked.\n\n\"Yes,\" answered Hoshin. \"I will show you what I can do seven days from now.\"\n\nNone of the disciples believed him, and most of them had even forgotten the conversation when Hoshin called them together.\n\n\"Seven days ago,\" he remarked, \"I said I was going to leave you. It is customary to write a farewell poem, but I am neither a poet nor a calligrapher. Let one of you inscribe my last words.\"\n\nHis followers thought he was joking, but one of them started to write.\n\n\"Are you ready?\" asked Hoshin.\n\n\"Yes sir,\" replied the writer.\n\nThen Hoshin dictated:\n\nI came from brilliancy\nAnd return to brilliancy.\nWhat is this?\n\nThe poem was one line short of the customary four, so the disciple said: \"Master, we are one line short.\"\n\nHoshin, with the roar of a conquering lion, shouted \"Kaa!\" and was gone.","d":"De Zen-meester Hoshin leefde vele jaren in China. Daarna keerde hij terug naar het noordoosten van Japan, waar hij zijn leerlingen onderrichtte. Toen hij heel oud begon te worden, vertelde hij hun een verhaal dat hij in China had gehoord. Dit is dat verhaal:\n\nOp de vijfentwintigste december van een bepaald jaar zei Toku-fu, die zeer oud was, tegen zijn leerlingen: \"Ik zal het volgende jaar niet meer leven, dus jullie zouden dit jaar goed voor me moeten zijn.\"\n\nDe leerlingen dachten dat hij een grapje maakte, maar omdat hij een grootmoedige leraar was, trakteerde ieder van hen hem om beurten op een feestmaal tijdens de opeenvolgende dagen van het stervende jaar.\n\nOp de vooravond van het nieuwe jaar besloot Toku-fu: \"Jullie zijn goed voor me geweest. Ik zal morgenochtend vertrekken wanneer de sneeuw is gestopt.\"\n\nDe leerlingen lachten, denkend dat hij verouderde en wartaal sprak, want de nacht was helder en zonder sneeuw. Maar om middernacht begon het te sneeuwen, en de volgende dag vonden ze hun leraar nergens meer. Ze gingen naar de meditatiezaal. Daar was hij heengegaan.\n\nHoshin, die dit verhaal vertelde, zei tegen zijn leerlingen: \"Het is voor een Zen-meester niet noodzakelijk zijn heengaan te voorspellen, maar als hij het echt wil, kan hij het.\"\n\n\"Kunt u dat?\" vroeg iemand.\n\n\"Ja,\" antwoordde Hoshin. \"Ik zal jullie over zeven dagen laten zien wat ik kan.\"\n\nGeen van de leerlingen geloofde hem, en de meesten waren zelfs het gesprek vergeten toen Hoshin hen bijeenriep.\n\n\"Zeven dagen geleden,\" merkte hij op, \"zei ik dat ik jullie zou verlaten. Het is gebruikelijk een afscheidsgedicht te schrijven, maar ik ben noch dichter noch kalligraaf. Laat een van jullie mijn laatste woorden opschrijven.\"\n\nZijn volgelingen dachten dat hij een grapje maakte, maar een van hen begon te schrijven.\n\n\"Ben je er klaar voor?\" vroeg Hoshin.\n\n\"Ja, meester,\" antwoordde de schrijver.\n\nToen dicteerde Hoshin:\n\nIk kwam uit helderheid\nEn keer terug naar helderheid.\nWat is dit?\n\nHet gedicht was één regel te kort voor het gebruikelijke vierregelige vers, dus de leerling zei: \"Meester, we missen één regel.\"\n\nHoshin slaakte, met het gebrul van een overwinnende leeuw, de kreet \"Kaa!\" en was heen.","t":["dood","verlichting"],"m":4,"ess":"Hoshin bereidde zijn dood voor als een ceremonie, compleet met uitnodigingen. Maar het echte verhaal is de leerling Toku-fu, die zijn eigen vertrek aankondigde en het dan gewoon deed — feestend tot het einde.\n\nDe dood is in Zen geen vijand maar een afspraak. Hoshin's laatste gedicht en kalme vertrek tonen dat wie elke dag als de laatste leeft, op de laatste dag niets anders hoeft te doen dan afscheid nemen. De les zit in de vanzelfsprekendheid, niet in de moed."},
{"n":11,"en":"The Story of Shunkai","nl":"Het verhaal van Shunkai","e":"The exquisite Shunkai whose other name was Suzu was compelled to marry against her wishes when she was quite young. Later, after this marriage had ended, she attended the university, where she studied philosophy.\n\nTo see Shunkai was to fall in love with her. Moreover, wherever she went, she fell in love with others. Love was with her at the university, and afterwards when philosophy did not satisfy her and she visited a temple to learn about Zen, the Zen students fell in love with her. Shunkai's whole life was saturated with love.\n\nAt last in Kyoto she became a real student of Zen. Her brothers in the sub-temple of Kennin praised her sincerity. One of them proved to be a congenial spirit and assisted her in the mastery of Zen.\n\nThe abbot of Kennin, Mokurai, Silent Thunder, was severe. He kept the precepts himself and expected his priests to do so. In modern Japan whatever zeal these priests have lost for Buddhism they seem to have gained for having wives. Mokurai used to take a broom and chase the women away when he found them in any of his temples, but the more wives he swept out, the more seemed to come back.\n\nIn this particular temple the wife of the head priest became jealous of Shunkai's earnestness and beauty. Hearing the students praise her serious Zen made this wife squirm and itch. Finally she spread a rumor about Shunkai and the young man who was her friend. As a consequence he was expelled and Shunkai was removed from the temple.\n\n\"I may have made the mistake of love,\" thought Shunkai, \"but the priest's wife shall not remain in the temple either if my friend is to be treated so unjustly.\"\n\nShunkai the same night with a can of kerosene set fire to the five-hundred-year-old temple and burned it to the ground.\n\nIn the morning she found herself in the hands of the police.\n\nA young lawyer became interested in her and endeavored to make her sentence lighter. \"Do not help me,\" she told him. \"I might decide to do something else which would only imprison me again.\"\n\nAt last a sentence of seven years was completed, and Shunkai was released from the prison, where the sixty-year-old warden also had become enamored of her.\n\nBut now everyone looked upon her as a \"jailbird.\" No one would associate with her. Even the Zen people, who are supposed to believe in enlightenment in this life and with this body, shunned her. Zen, Shunkai found, was one thing and the followers of Zen quite another.\n\nHer relatives would have nothing to do with her. She grew sick, poor, and weak. She met a Shinshu priest who taught her the name of the Buddha of Love, and in this Shunkai found some solace and peace of mind. She passed away when she was still exquisitely beautiful and hardly thirty years old.\n\nShe wrote her own story in a futile endeavor to support herself and some of it she told to a woman writer. So it reached the Japanese people. Those who rejected Shunkai, those who slandered and hated her, now read of her life with tears of remorse.","d":"De voortreffelijke Shunkai, wier andere naam Suzu was, werd tegen haar wil gedwongen te trouwen toen ze nog heel jong was. Later, nadat dit huwelijk was geëindigd, bezocht ze de universiteit waar ze filosofie studeerde.\n\nShunkai zien was verliefd op haar worden. Bovendien raakte zij zelf overal waar ze kwam verliefd op anderen. Liefde was bij haar op de universiteit, en daarna, toen filosofie haar niet bevredigde en ze een tempel bezocht om Zen te leren, werden de Zen-leerlingen verliefd op haar. Shunkai's hele leven was doordrenkt van liefde.\n\nTen slotte werd ze in Kyoto een echte Zen-studente. Haar broeders in de subtempel van Kennin prezen haar oprechtheid. Een van hen bleek een verwante geest te zijn en hielp haar bij het beheersen van Zen.\n\nDe abt van Kennin, Mokurai — Stille Donder — was streng. Hij hield zich zelf aan de voorschriften en verwachtte dat zijn priesters dat ook deden. In het moderne Japan lijkt het enthousiasme dat deze priesters voor het boeddhisme hebben verloren, te zijn gewonnen voor het hebben van echtgenotes. Mokurai greep gewoonlijk een bezem en joeg de vrouwen weg wanneer hij ze in een van zijn tempels aantrof, maar hoe meer vrouwen hij wegveegde, hoe meer er leken terug te komen.\n\nIn deze bepaalde tempel werd de vrouw van de hoofdpriester jaloers op Shunkai's ernst en schoonheid. Dat de leerlingen haar serieuze Zen prezen deed deze vrouw kriebelen en steken. Uiteindelijk verspreidde ze een gerucht over Shunkai en de jonge man die haar vriend was. Als gevolg daarvan werd hij verwijderd en werd Shunkai uit de tempel gezet.\n\n\"Ik heb misschien de fout van de liefde gemaakt,\" dacht Shunkai, \"maar de vrouw van de priester zal ook niet in de tempel blijven als mijn vriend zo onrechtvaardig wordt behandeld.\"\n\nDiezelfde nacht stak Shunkai met een blik kerosine de vijfhonderd jaar oude tempel in brand en brandde hem tot de grond af.\n\n's Ochtends bevond ze zich in handen van de politie.\n\nEen jonge advocaat raakte in haar geïnteresseerd en deed zijn best om haar straf te verlichten. \"Help me niet,\" zei ze tegen hem. \"Ik zou iets anders kunnen besluiten te doen wat me opnieuw gevangen zou zetten.\"\n\nUiteindelijk werd een straf van zeven jaar uitgezeten en Shunkai werd vrijgelaten uit de gevangenis, waar ook de zestigjarige bewaarder verliefd op haar was geworden.\n\nMaar nu zag iedereen haar als een \"gevangene.\" Niemand wilde met haar omgaan. Zelfs de Zen-mensen, die geacht worden te geloven in verlichting in dit leven en met dit lichaam, meden haar. Zen, zo ontdekte Shunkai, was één ding en de volgelingen van Zen een heel ander.\n\nHaar familieleden wilden niets met haar te maken hebben. Ze werd ziek, arm en zwak. Ze ontmoette een Shinshu-priester die haar de naam van de Boeddha van de Liefde leerde, en daarin vond Shunkai enige troost en gemoedsrust. Ze stierf toen ze nog wonderbaarlijk mooi was en nauwelijks dertig jaar oud.\n\nZe schreef haar eigen verhaal in een vergeefse poging zichzelf te onderhouden, en een deel ervan vertelde ze aan een vrouwelijke schrijfster. Zo bereikte het het Japanse volk. Degenen die Shunkai hadden afgewezen, degenen die haar hadden belasterd en gehaat, lazen nu haar levensverhaal met tranen van berouw.","t":["compassie","kracht"],"m":5,"ess":"Shunkai's leven was doorweven met liefde — overal waar ze ging, viel ze lief en werd er van haar gehouden. De wereld bestrafte haar daarvoor. Ze stichtte brand in een tempel en stierf jong.\n\nHaar verhaal is geen moraal maar een spiegel. De maatschappij die verlichting predikt maar een vrouw veroordeelt omdat ze liefheeft, is de echte hypocrisie. Shunkai paste in geen enkele categorie — niet non, niet geliefde, niet student — en juist dat maakte haar onverteerbaar voor een wereld die labels nodig heeft."},
{"n":12,"en":"Happy Chinaman","nl":"De vrolijke Chinees","e":"Anyone walking about Chinatowns in America will observe statues of a stout fellow carrying a linen sack. Chinese merchants call him Happy Chinaman or Laughing Buddha.\n\nThis Hotei lived in the T'ang dynasty. He had no desire to call himself a Zen master or to gather many disciples about him. Instead he walked the streets with a big sack into which he would put gifts of candy, fruit, or doughnuts. These he would give to children who gathered around him in play. He established his street kindergarten.\n\nWhenever he met a Zen devotee he would extend his hand and say: \"Give me one cent.\" And if anyone asked him to return to a temple to teach others, he would reply: \"Give me one cent.\"\n\nOnce as he was about his play-work another Zen master happened along and inquired: \"What is the significance of Zen?\"\n\nHotei immediately plopped his sack down on the ground in silent answer.\n\n\"Then,\" asked the other, \"what is the actualization of Zen?\"\n\nAt once the Happy Chinaman swung the sack over his shoulder and continued on his way.","d":"Ieder die door de Chinese buurten in Amerika wandelt, zal beelden opmerken van een gedrongen figuur die een linnen zak draagt. Chinese kooplieden noemen hem de Vrolijke Chinees of de Lachende Boeddha.\n\nDeze Hotei leefde in de T'ang-dynastie. Hij had geen behoefte zichzelf een Zen-meester te noemen of veel leerlingen om zich heen te verzamelen. In plaats daarvan liep hij door de straten met een grote zak, waarin hij snoep, fruit of donuts stopte. Die gaf hij aan kinderen die rondom hem kwamen spelen. Hij richtte zijn straatkleuterschool op.\n\nTelkens wanneer hij een Zen-beoefenaar tegenkwam, stak hij zijn hand uit en zei: \"Geef me een cent.\" En als iemand hem vroeg naar een tempel terug te keren om anderen te onderwijzen, antwoordde hij: \"Geef me een cent.\"\n\nOp een keer, terwijl hij bezig was met zijn spel-werk, liep een andere Zen-meester langs en vroeg: \"Wat is de betekenis van Zen?\"\n\nHotei gooide zijn zak onmiddellijk zwijgend op de grond als antwoord.\n\n\"En dan,\" vroeg de ander, \"wat is de verwerkelijking van Zen?\"\n\nMeteen zwaaide de Vrolijke Chinees de zak over zijn schouder en vervolgde zijn weg.","t":["dood","humor"],"m":2,"ess":"Hotei droeg geen gewaad van een meester, gaf geen dharma-lezingen, had geen tempel. Hij liep met een zak snoep door de straat en speelde met kinderen.\n\nAls iemand hem vroeg naar de betekenis van Zen, stak hij zijn hand uit: 'Geef me een cent.' Als iemand vroeg wanneer de toekomstige Boeddha zou komen, liet hij zijn zak vallen en stond stil. Als iemand vroeg wat dat betekende, pakte hij zijn zak op en liep verder. De hele leer zit in die drie gebaren: vragen, loslaten, doorgaan."},
{"n":13,"en":"A Buddha","nl":"Een Boeddha","e":"In Tokyo in the Meiji era there lived two prominent teachers of opposite characteristics. One, Unsho, an instructor in Shingon, kept Buddha's precepts scrupulously. He never drank intoxicants, nor did he eat after eleven o'clock in the morning. The other teacher, Tanzan, a professor of philosophy at the Imperial University, never observed the precepts. When he felt like eating he ate, and when he felt like sleeping in the daytime he slept.\n\nOne day Unsho visited Tanzan, who was drinking wine at the time, not even a drop of which is supposed to touch the tongue of a Buddhist.\n\n\"Hello, brother,\" Tanzan greeted him. \"Won't you have a drink?\"\n\n\"I never drink!\" exclaimed Unsho solemnly.\n\n\"One who does not drink is not even human,\" said Tanzan.\n\n\"Do you mean to call me inhuman just because I do not indulge in intoxicating liquids!\" exclaimed Unsho in anger. \"Then if I am not human, what am I?\"\n\n\"A Buddha,\" answered Tanzan.","d":"In Tokio in het Meiji-tijdperk leefden twee prominente leraren met tegengestelde kenmerken. De ene, Unsho, een leraar in het Shingon-boeddhisme, hield zich nauwgezet aan de voorschriften van Boeddha. Hij dronk nooit bedwelmende dranken, noch at hij na elf uur 's ochtends. De andere leraar, Tanzan, hoogleraar filosofie aan de Keizerlijke Universiteit, hield zich nooit aan de voorschriften. Wanneer hij zin had om te eten, at hij, en wanneer hij overdag wilde slapen, sliep hij.\n\nOp een dag bezocht Unsho Tanzan, die op dat moment wijn dronk — waarvan niet eens een druppel de tong van een boeddhist zou mogen raken.\n\n\"Hallo, broeder,\" begroette Tanzan hem. \"Wil je niet een drankje?\"\n\n\"Ik drink nooit!\" riep Unsho plechtig uit.\n\n\"Wie niet drinkt, is niet eens menselijk,\" zei Tanzan.\n\n\"Bedoel je me onmenselijk te noemen alleen omdat ik geen bedwelmende vloeistoffen gebruik!\" riep Unsho woedend uit. \"Als ik dan niet menselijk ben, wat ben ik dan?\"\n\n\"Een Boeddha,\" antwoordde Tanzan.","t":["eenvoud","meester"],"m":2,"ess":"Unsho leefde volgens elke regel: niet drinken, niet eten na elf uur. Tanzan dronk wijn, sliep overdag. Toch was Tanzan de betere leraar.\n\nHet punt is niet dat regels onbelangrijk zijn, maar dat ze een middel zijn, geen doel. Unsho was gehecht aan zijn discipline zoals anderen gehecht zijn aan hun genot. Tanzan was vrij — niet omdat hij de regels brak, maar omdat hij er niet door gebonden was. De vraag is niet hoe je leeft, maar of je gevangen bent in hoe je leeft."},
{"n":14,"en":"Muddy Road","nl":"De modderige weg","e":"Tanzan and Ekido were once traveling together down a muddy road. A heavy rain was still falling.\n\nComing around a bend, they met a lovely girl in a silk kimono and sash, unable to cross the intersection.\n\n\"Come on, girl,\" said Tanzan at once. Lifting her in his arms, he carried her over the mud.\n\nEkido did not speak again until that night when they reached a lodging temple. Then he no longer could restrain himself. \"We monks don't go near females,\" he told Tanzan, \"especially not young and lovely ones. It is dangerous. Why did you do that?\"\n\n\"I left the girl there,\" said Tanzan. \"Are you still carrying her?\"","d":"Tanzan en Ekido reisden eens samen over een modderige weg. De regen viel nog steeds zwaar.\n\nToen ze om een bocht kwamen, troffen ze een bevallig meisje in een zijden kimono en sjerp, dat de kruising niet over kon.\n\n\"Kom maar, meisje,\" zei Tanzan meteen. Hij tilde haar in zijn armen en droeg haar door de modder.\n\nEkido sprak die dag geen woord meer, totdat ze 's avonds een logeertempel bereikten. Toen kon hij zich niet langer beheersen. \"Wij monniken gaan niet in de buurt van vrouwen,\" zei hij tegen Tanzan, \"en zeker niet van jonge en bevallige. Het is gevaarlijk. Waarom heb je dat gedaan?\"\n\n\"Ik heb het meisje daar achtergelaten,\" zei Tanzan. \"Draag jij haar nog steeds?\"","t":["gehechtheid","eenvoud"],"m":1,"ess":"Tanzan droeg het meisje over de modder en zette haar neer. Ekido droeg haar de hele dag in zijn hoofd.\n\nGehechtheid zit niet in de handeling maar in het hoofd. Ekido raakte het meisje niet aan maar was er meer door bezeten dan Tanzan die haar optilde. Wie iets vermijdt uit angst, draagt het zwaarder dan wie het doet en vergeet. De modderige weg is niet de kruising — het is de afstand tussen actie en loslaten."},
{"n":15,"en":"Shoun and His Mother","nl":"Shoun en zijn moeder","e":"Shoun became a teacher of Soto Zen. When he was still a student his father passed away, leaving him to care for his old mother.\n\nWhenever Shoun went to a meditation hall he always took his mother with him. Since she accompanied him, when he visited monasteries he could not live with the monks. So he would build a little house and care for her there. He would copy sutras, Buddhist verses, and in this manner receive a few coins for food.\n\nWhen Shoun bought fish for his mother, the people would scoff at him, for a monk is not supposed to eat fish. But Shoun did not mind. His mother, however, was hurt to see others laugh at her son. Finally she told Shoun: \"I think I will become a nun. I can be vegetarian too.\" She did, and they studied together.\n\nShoun was fond of music and was a master of the harp, which his mother also played. On full-moon nights they used to play together.\n\nOne night a young lady passed by their house and heard music. Deeply touched, she invited Shoun to visit her the next evening and play. He accepted the invitation. A few days later he met the young lady on the street and thanked her for her hospitality. Others laughed at him. He had visited the house of a woman of the streets.\n\nOne day Shoun left for a distant temple to deliver a lecture. A few months afterwards he returned home to find his mother dead. Friends had not known where to reach him, so the funeral was in progress.\n\nShoun walked up and hit the coffin with his staff. \"Mother, your son has returned,\" he said.\n\n\"I am glad to see you have returned, son,\" he answered for his mother.\n\n\"Yes, I am glad too,\" Shoun responded. Then he announced to the people about him: \"The funeral ceremony is over. You may bury the body.\"\n\nWhen Shoun was old he knew his end was approaching. He asked his disciples to gather around him in the morning, telling them he was going to pass on at noon. Burning incense before the picture of his mother and his old teacher, he wrote a poem:\n\nFor fifty-six years I lived as best I could,\nMaking my way in this world.\nNow the rain has ended, the clouds are clearing,\nThe blue sky has a full moon.\n\nHis disciples gathered around him, reciting sutra, and Shoun passed on during the invocation.","d":"Shoun werd een leraar van het Soto Zen. Toen hij nog student was, overleed zijn vader en liet hem achter om voor zijn oude moeder te zorgen.\n\nTelkens wanneer Shoun naar een meditatiezaal ging, nam hij zijn moeder altijd mee. Omdat zij hem vergezelde, kon hij bij bezoeken aan kloosters niet bij de monniken verblijven. Dus bouwde hij een klein huisje en zorgde daar voor haar. Hij kopieerde soetra's, boeddhistische verzen, en ontving op die manier een paar munten voor eten.\n\nWanneer Shoun vis kocht voor zijn moeder, spotten de mensen met hem, want een monnik hoort geen vis te eten. Maar Shoun trok zich er niets van aan. Zijn moeder echter werd gekwetst als ze anderen om haar zoon zag lachen. Uiteindelijk zei ze tegen Shoun: \"Ik denk dat ik non zal worden. Dan kan ik ook vegetariër zijn.\" Dat deed ze, en samen studeerden ze.\n\nShoun hield van muziek en was een meester op de harp, die zijn moeder ook bespeelde. Op volle-maannachten speelden ze samen.\n\nOp een nacht liep een jonge dame langs hun huis en hoorde muziek. Diep geraakt nodigde ze Shoun uit haar de volgende avond te bezoeken en te spelen. Hij aanvaardde de uitnodiging. Een paar dagen later ontmoette hij de jonge dame op straat en bedankte haar voor haar gastvrijheid. Anderen lachten hem uit. Hij had het huis bezocht van een vrouw van lichte zeden.\n\nOp een dag vertrok Shoun naar een verre tempel om een lezing te geven. Een paar maanden later keerde hij naar huis terug om zijn moeder dood aan te treffen. Vrienden hadden niet geweten hoe ze hem moesten bereiken, en dus was de begrafenis al gaande.\n\nShoun liep naar voren en sloeg met zijn staf op de kist. \"Moeder, uw zoon is teruggekeerd,\" zei hij.\n\n\"Ik ben blij dat je teruggekeerd bent, mijn zoon,\" antwoordde hij namens zijn moeder.\n\n\"Ja, ik ook,\" antwoordde Shoun. Toen kondigde hij aan de omstanders aan: \"De begrafenisceremonie is voorbij. U mag het lichaam begraven.\"\n\nToen Shoun oud was, wist hij dat zijn einde naderde. Hij vroeg zijn leerlingen hem 's ochtends te omringen en vertelde hun dat hij 's middags zou heengaan. Terwijl hij wierook brandde voor het portret van zijn moeder en zijn oude leraar, schreef hij een gedicht:\n\nZesenvijftig jaar leefde ik zo goed als ik kon,\nMijn weg makend in deze wereld.\nNu is de regen geëindigd, de wolken klaren op,\nDe blauwe hemel heeft een volle maan.\n\nZijn leerlingen stonden om hem heen, soetra's reciterend, en Shoun ging heen tijdens de aanroeping.","t":["compassie","kunst"],"m":4,"ess":"Shoun brak elke conventie voor zijn moeder: hij nam haar mee naar kloosters, kocht vis voor haar, kopieerde soetra's voor geld. Monniken bespotten hem.\n\nMaar Shoun begreep iets wat zij niet begrepen: compassie begint thuis. Verlichting die je moeder laat verhongeren is geen verlichting. De regels zijn er om lijden te verminderen, niet om ze als schild te gebruiken terwijl de mensen om je heen lijden."},
{"n":16,"en":"Not Far from Buddhahood","nl":"Niet ver van het Boeddhaschap","e":"A university student while visiting Gasan asked him: \"Have you ever read the Christian Bible?\"\n\n\"No, read it to me,\" said Gasan.\n\nThe student opened the Bible and read from St. Matthew: \"And why take ye thought for raiment? Consider the lilies of the field, how they grow. They toil not, neither do they spin, and yet I say unto you that even Solomon in all his glory was not arrayed like one of these... Take therefore no thought for the morrow, for the morrow shall take thought for the things of itself.\"\n\nGasan said: \"Whoever uttered those words I consider an enlightened man.\"\n\nThe student continued reading: \"Ask and it shall be given you, seek and ye shall find, knock and it shall be opened unto you. For everyone that asketh receiveth, and he that seeketh findeth, and to him that knocketh, it shall be opened.\"\n\nGasan remarked: \"That is excellent. Whoever said that is not far from Buddhahood.\"","d":"Een universiteitsstudent die Gasan bezocht vroeg hem: \"Heeft u ooit de christelijke Bijbel gelezen?\"\n\n\"Nee, lees die aan mij voor,\" zei Gasan.\n\nDe student opende de Bijbel en las uit Matteüs: \"En waarom zijt gij bezorgd over de kleding? Aanschouw de lelies des velds, hoe zij groeien. Zij arbeiden niet en spinnen niet, en toch zeg ik u dat zelfs Salomo in al zijn heerlijkheid niet gekleed was als een van deze... Weest dan niet bezorgd voor de dag van morgen, want de dag van morgen zal zijn eigen zorgen hebben.\"\n\nGasan zei: \"Wie deze woorden heeft gesproken, beschouw ik als een verlicht mens.\"\n\nDe student las verder: \"Bidt en u zal gegeven worden, zoekt en gij zult vinden, klopt en u zal opengedaan worden. Want een ieder die bidt, ontvangt, en wie zoekt, vindt, en wie klopt, hem zal opengedaan worden.\"\n\nGasan merkte op: \"Dat is uitstekend. Wie dat heeft gezegd, is niet ver van het Boeddhaschap.\"","t":["wijsheid","humor"],"m":2,"ess":"Gasan hoorde passages uit de Bijbel en herkende er verlichting in. 'Niet ver van het Boeddhaschap,' zei hij.\n\nWaarheid is niet het eigendom van één traditie. De leliën des velds en de Bergrede bevatten dezelfde kern als de hartsoetra: laat los, vertrouw, leef nu. Wie alleen waarheid kan herkennen in de eigen traditie, heeft de waarheid nog niet gevonden. Het is het water dat telt, niet de beker waaruit je drinkt."},
{"n":17,"en":"Stingy in Teaching","nl":"Gierig in het onderwijzen","e":"A young physician in Tokyo named Kusuda met a college friend who had been studying Zen. The young doctor asked him what Zen was.\n\n\"I cannot tell you what it is,\" the friend replied, \"but one thing is certain. If you understand Zen, you will not be afraid to die.\"\n\n\"That's fine,\" said Kusuda. \"I will try it. Where can I find a teacher?\"\n\n\"Go to the master Nan-in,\" the friend told him.\n\nSo Kusuda went to call on Nan-in. He carried a dagger nine and a half inches long to determine whether or not the teacher was afraid to die.\n\nWhen Nan-in saw Kusuda he exclaimed: \"Hello, friend. How are you? We haven't seen each other for a long time!\"\n\nThis perplexed Kusuda, who replied: \"We have never met before.\"\n\n\"That's right,\" answered Nan-in. \"I mistook you for another physician who is receiving instruction here.\"\n\nWith such a beginning, Kusuda lost his chance to test the master, so reluctantly he asked if he might receive Zen instruction.\n\nNan-in said: \"Zen is not a difficult task. If you are a physician, treat your patients with kindness. That is Zen.\"\n\nKusuda visited Nan-in three times. Each time Nan-in told him the same thing. \"A physician should not waste time around here. Go home and take care of your patients.\"\n\nIt was not yet clear to Kusuda how such teaching could remove the fear of death. So on his fourth visit he complained: \"My friend told me when one learns Zen one loses the fear of death. Each time I come here all you tell me is to take care of my patients. I know that much. If that is your so-called Zen, I am not going to visit you anymore.\"\n\nNan-in smiled and patted the doctor. \"I have been too strict with you. Let me give you a koan.\" He presented Kusuda with Joshu's Mu to work over, which is the first mind-enlightening problem in the book called The Gateless Gate.\n\nKusuda pondered this problem of Mu (No-Thing) for two years. At length he thought he had reached certainty of mind. But his teacher commented: \"You are not in yet.\"\n\nKusuda continued in concentration for another year and a half. His mind became placid. Problems dissolved. No-Thing became the truth. He served his patients well and, without even knowing it, he was free from concern over life and death.\n\nThen when he visited Nan-in, his old teacher just smiled.","d":"Een jonge arts in Tokio genaamd Kusuda ontmoette een studievriend die Zen had bestudeerd. De jonge dokter vroeg hem wat Zen was.\n\n\"Ik kan je niet vertellen wat het is,\" antwoordde de vriend, \"maar één ding is zeker. Als je Zen begrijpt, zul je niet bang zijn om te sterven.\"\n\n\"Mooi,\" zei Kusuda. \"Ik zal het proberen. Waar kan ik een leraar vinden?\"\n\n\"Ga naar meester Nan-in,\" vertelde de vriend hem.\n\nDus ging Kusuda op bezoek bij Nan-in. Hij droeg een dolk van negenenhalve inch lang om vast te stellen of de leraar bang was om te sterven.\n\nToen Nan-in Kusuda zag, riep hij uit: \"Hallo, vriend. Hoe gaat het? We hebben elkaar al zo lang niet gezien!\"\n\nDit verbaasde Kusuda, die antwoordde: \"We hebben elkaar nooit eerder ontmoet.\"\n\n\"Dat klopt,\" antwoordde Nan-in. \"Ik vergiste me — ik zag u voor een andere arts aan die hier onderricht ontvangt.\"\n\nDoor zo'n begin verloor Kusuda zijn kans de meester te testen, en dus vroeg hij schoorvoetend of hij Zen-onderricht mocht ontvangen.\n\nNan-in zei: \"Zen is geen moeilijke opgave. Als je arts bent, behandel je patiënten met vriendelijkheid. Dat is Zen.\"\n\nKusuda bezocht Nan-in drie keer. Elke keer zei Nan-in hetzelfde. \"Een arts moet zijn tijd hier niet verspillen. Ga naar huis en zorg voor je patiënten.\"\n\nHet was Kusuda nog niet duidelijk hoe zulk onderricht de angst voor de dood kon wegnemen. Dus bij zijn vierde bezoek klaagde hij: \"Mijn vriend vertelde me dat wie Zen leert zijn angst voor de dood verliest. Elke keer dat ik hier kom, zegt u me alleen voor mijn patiënten te zorgen. Dat weet ik ook wel. Als dat uw zogenaamde Zen is, kom ik niet meer.\"\n\nNan-in glimlachte en klopte de dokter op zijn schouder. \"Ik ben te streng voor u geweest. Laat me u een koan geven.\" Hij gaf Kusuda Joshu's Mu om over na te denken — het eerste geest-verlichtende vraagstuk in het boek genaamd De Poortloze Poort.\n\nKusuda peinsde twee jaar over dit probleem van Mu (Niets). Uiteindelijk dacht hij zekerheid van geest te hebben bereikt. Maar zijn leraar merkte op: \"U bent er nog niet in.\"\n\nKusuda bleef nog anderhalf jaar in concentratie. Zijn geest werd rustig. Problemen losten op. Niets werd de waarheid. Hij diende zijn patiënten goed en, zonder het zelfs te beseffen, was hij vrij van zorgen over leven en dood.\n\nToen hij Nan-in bezocht, glimlachte zijn oude leraar slechts.","t":["meester","paradox"],"m":4,"ess":"Kusuda kwam naar Nan-in met een dolk om te testen of de meester bang was voor de dood. Nan-in negeerde de dolk en praatte over het weer. Pas na maanden serieuze studie gaf Nan-in werkelijk les.\n\nDe 'gierigheid in het onderwijzen' was geen gierigheid maar wijsheid. Je kunt niet onderwijzen wie niet klaar is om te leren. Kusuda moest eerst zijn eigen dolk laten vallen — zijn behoefte om te testen, te bewijzen, te controleren — voordat hij kon ontvangen."},
{"n":18,"en":"A Parable","nl":"Een gelijkenis","e":"Buddha told a parable in a sutra:\n\nA man traveling across a field encountered a tiger. He fled, the tiger after him. Coming to a precipice, he caught hold of the root of a wild vine and swung himself down over the edge. The tiger sniffed at him from above. Trembling, the man looked down to where, far below, another tiger was waiting to eat him. Only the vine sustained him.\n\nTwo mice, one white and one black, little by little started to gnaw away the vine. The man saw a luscious strawberry near him. Grasping the vine with one hand, he plucked the strawberry with the other. How sweet it tasted!","d":"Boeddha vertelde een gelijkenis in een soetra:\n\nEen man die een veld overstak, ontmoette een tijger. Hij vluchtte, de tijger achter hem aan. Bij een afgrond komend, greep hij de wortel van een wilde wijnrank en zwaaide zichzelf over de rand omlaag. De tijger snuffelde van bovenaf naar hem. Bevend keek de man omlaag naar waar, ver beneden, een andere tijger hem wachtte te verslinden. Alleen de rank hield hem in leven.\n\nTwee muizen, een witte en een zwarte, begonnen de rank stukje bij beetje door te knagen. De man zag een sappige aardbei vlak bij hem. Met één hand de rank vastgrijpend, plukte hij de aardbei met de andere. Hoe zoet smaakte die!","t":["paradox","wijsheid"],"m":1,"ess":"De tijgers boven en onder zijn het gevaar waar je voor vlucht en de dood die onvermijdelijk wacht. De muizen — wit en zwart, dag en nacht — knagen je levenstijd weg. Er is geen ontsnapping.\n\nEn toch is daar de aardbei. Het verhaal vraagt niet hoe je ontsnapt aan de dood maar of je kunt proeven terwijl alles vergaat. Dat is geen ontkenning maar het zuiverste ja tegen het leven, uitgesproken op het moment dat elke reden om nee te zeggen aanwezig is."},
{"n":19,"en":"The First Principle","nl":"Het eerste beginsel","e":"When one goes to Obaku temple in Kyoto he sees carved over the gate the words \"The First Principle.\" The letters are unusually large, and those who appreciate calligraphy always admire them as being a masterpiece. They were drawn by Kosen two hundred years ago.\n\nWhen the master drew them he did so on paper, from which workmen made the larger carving in wood. As Kosen sketched the letters a bold pupil was with him who had made several gallons of ink for the calligraphy and who never failed to criticize his master's work.\n\n\"That is not good,\" he told Kosen after his first effort.\n\n\"How is this one?\"\n\n\"Poor. Worse than before,\" pronounced the pupil.\n\nKosen patiently wrote one sheet after another until eighty-four First Principles had accumulated, still without the approval of the pupil.\n\nThen, when the young man stepped outside for a few moments, Kosen thought: \"Now this is my chance to escape his keen eye,\" and he wrote hurriedly, with a mind free from distraction: \"The First Principle.\"\n\n\"A masterpiece,\" pronounced the pupil.","d":"Wie de Obaku-tempel in Kyoto bezoekt, ziet boven de poort de woorden \"Het Eerste Beginsel\" uitgehouwen. De letters zijn ongewoon groot, en wie kalligrafie waardeert, bewondert ze altijd als een meesterwerk. Ze zijn tweehonderd jaar geleden getekend door Kosen.\n\nToen de meester ze tekende, deed hij dat op papier, waarna werklieden de grotere houtsnijding maakten. Terwijl Kosen de letters schetste, was er een vrijmoedige leerling bij hem, die verscheidene liters inkt had aangemaakt voor de kalligrafie en die nooit naliet het werk van zijn meester te bekritiseren.\n\n\"Dat is niet goed,\" zei hij tegen Kosen na diens eerste poging.\n\n\"En deze?\"\n\n\"Slecht. Erger dan daarvoor,\" oordeelde de leerling.\n\nKosen schreef geduldig het ene vel na het andere, totdat er vierentachtig Eerste Beginselen lagen, nog steeds zonder de goedkeuring van de l
